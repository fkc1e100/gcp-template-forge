name: Orphan Cleanup

on:
  schedule:
    - cron: '0 4 * * *'   # 04:00 UTC daily
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state

jobs:
  cleanup-gke-clusters:
    name: Delete orphaned GKE clusters
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
     - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Delete GKE clusters tagged template:* older than 2h
        run: |
          NOW=$(date -u +%s)
          THRESHOLD=$(( NOW - 7200 ))   # 2 hours ago

          echo "=== Scanning for orphaned GKE clusters (template label, age > 2h) ==="

          gcloud container clusters list \
            --project="${{ env.PROJECT_ID }}" \
            --filter="resourceLabels.template:*" \
            --format="csv[no-heading](name,location,createTime)" \
          | while IFS=, read -r NAME LOCATION CREATE_TIME; do
              CREATE_EPOCH=$(date -d "${CREATE_TIME}" +%s 2>/dev/null || echo 0)
              AGE_S=$(( NOW - CREATE_EPOCH ))
              AGE_H=$(( AGE_S / 3600 ))
              if [ "$CREATE_EPOCH" -lt "$THRESHOLD" ]; then
                echo "  DELETING: $NAME ($LOCATION, age ${AGE_H}h)"
                gcloud container clusters update "$NAME" --location="$LOCATION" \
                  --project="${{ env.PROJECT_ID }}" \
                  --no-enable-deletion-protection --quiet 2>/dev/null || true
                gcloud container clusters delete "$NAME" \
                  --location="$LOCATION" \
                  --project="${{ env.PROJECT_ID }}" \
                  --quiet --async || true
              else
                echo "  OK:      $NAME ($LOCATION, age ${AGE_H}h)"
              fi
            done

          echo "=== GKE cluster scan complete ==="

      - name: Verify GKE cluster deletions
        run: |
          echo "=== Verifying GKE clusters after cleanup ==="
          REMAINING=$(gcloud container clusters list \
            --project="${{ env.PROJECT_ID }}" \
            --filter="resourceLabels.template:*" \
            --format="csv[no-heading](name,location,status)" 2>/dev/null || true)
          if [ -z "$REMAINING" ]; then
            echo "  No template-labelled clusters remaining."
          else
            echo "  Clusters still present (may be STOPPING):"
            echo "$REMAINING" | while IFS=, read -r NAME LOCATION STATUS; do
              echo "    $NAME ($LOCATION) — $STATUS"
            done
          fi
          echo "=== Verification complete ==="

  cleanup-tf-state-locks:
    name: Remove stale TF state locks
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
     - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Remove .tflock files older than 2h
        run: |
          echo "=== Scanning for stale TF state locks ==="
          gsutil ls -r "gs://gke-gca-2025-forge-tf-state/**"

          gsutil ls -r "gs://${{ env.TF_STATE_BUCKET }}/**" 2>/dev/null \
            | grep '\.tflock$' \
            | while read -r LOCK_PATH; do
                # Get object creation time
                CREATE_TIME=$(gsutil stat "$LOCK_PATH" 2>/dev/null \
                  | grep 'Creation time:' | sed 's/Creation time:\s*//' || echo "")
                if [ -n "$CREATE_TIME" ]; then
                  CREATE_EPOCH=$(date -d "$CREATE_TIME" +%s 2>/dev/null || echo 0)
                  NOW=$(date -u +%s)
                  AGE_S=$(( NOW - CREATE_EPOCH ))
                  if [ "$AGE_S" -gt 7200 ]; then
                    echo "  REMOVING stale lock: $LOCK_PATH (age ${AGE_S}s)"
                    gsutil rm "$LOCK_PATH" || true
                  else
                    echo "  OK: $LOCK_PATH (age ${AGE_S}s — recent, leaving)"
                  fi
                fi
              done

          echo "=== TF lock scan complete ==="

  cleanup-kcc-orphans:
    name: Delete orphaned KCC resources
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
     - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Delete KCC resources older than 4h
        run: |
          echo "=== KCC orphan check ==="
          # IMPORTANT: deleting the GKE cluster directly (via gcloud) while the
          # KCC ContainerCluster resource still exists will cause Config Connector
          # to immediately re-provision it. We must delete the KCC resource first
          # so that Config Connector performs the cascade deletion.
          NOW=$(date -u +%s)
          THRESHOLD=$(( NOW - 14400 ))  # 4 hours

          DELETED=0
          kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n "${{ env.KCC_NAMESPACE }}" \
            -o json 2>/dev/null \
          | jq -r '.items[] | "\(.metadata.name) \(.metadata.creationTimestamp)"' \
          | while read -r NAME CREATE_TIME; do
              CREATE_EPOCH=$(date -d "${CREATE_TIME}" +%s 2>/dev/null || echo 0)
              AGE_H=$(( ( NOW - CREATE_EPOCH ) / 3600 ))
              if [ "$CREATE_EPOCH" -lt "$THRESHOLD" ]; then
                echo "  DELETING KCC ContainerCluster: $NAME (${AGE_H}h old)"
                kubectl delete containerclusters.container.cnrm.cloud.google.com \
                  "$NAME" -n "${{ env.KCC_NAMESPACE }}" --wait=false 2>&1 || true
                DELETED=$(( DELETED + 1 ))
              else
                echo "  OK: $NAME (${AGE_H}h old)"
              fi
            done

          echo "=== KCC orphan check complete ==="

      - name: Verify KCC deletions took effect
        run: |
          echo "=== Verifying KCC ContainerCluster resources after cleanup ==="
          REMAINING=$(kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n "${{ env.KCC_NAMESPACE }}" \
            -o json 2>/dev/null \
            | jq -r '.items[].metadata.name' | wc -l)
          echo "  KCC ContainerCluster resources remaining: ${REMAINING}"
          kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n "${{ env.KCC_NAMESPACE }}" 2>/dev/null || echo "  (none)"
          echo "=== Verification complete ==="

name: Sandbox Validation (KCC)

on:
  # Post-merge only — validate-kcc.yml handles PR validation.
  # Running both on PRs causes duplicate KCC resource provisioning.
  push:
    branches: [ main ]
    paths:
      - 'templates/**/config-connector/**'
      - 'templates/**/config-connector-workload/**'
      - 'agent-infra/**'

concurrency:
  # Per-PR group for KCC sandbox only; cancel-in-progress stops stale queued runs
  # from blocking KCC validation behind unrelated TF sandbox runs.
  group: sandbox-kcc-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # ── 1. Detect which templates changed ────────────────────────────────────
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      kcc_templates: ${{ steps.find.outputs.kcc_templates }}
      has_kcc_templates: ${{ steps.find.outputs.has_kcc_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed template directories
        id: find
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            PR_HEAD="${{ github.event.pull_request.head.sha }}"
            BASE=$(git merge-base "origin/${{ github.base_ref }}" "$PR_HEAD")
            DIFF_HEAD="$PR_HEAD"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            fi
            DIFF_HEAD=${{ github.sha }}
          fi
          
          CHANGED_FILES=$(git diff --name-only "$BASE" "$DIFF_HEAD")
          DIRS=$(echo "$CHANGED_FILES" \
            | grep '^templates/' \
            | grep -v '\.md$' \
            | awk -F/ '{print $1"/"$2}' \
            | sort -u)
          
          KCC_DIRS=""
          for dir in $DIRS; do
            if ls "$dir/config-connector/"*.yaml >/dev/null 2>&1; then
              if [ ! -f "$dir/.kcc-unsupported" ]; then
                KCC_DIRS="$KCC_DIRS $dir"
              fi
            fi
          done
          KCC_TEMPLATES=$(echo "$KCC_DIRS" | tr ' ' '\n' | sort -u | jq -Rnc '[inputs | select(length>0)]')
          echo "kcc_templates=$KCC_TEMPLATES" >> "$GITHUB_OUTPUT"
          echo "has_kcc_templates=$([ "$KCC_TEMPLATES" = "[]" ] && echo false || echo true)" >> "$GITHUB_OUTPUT"
          echo "KCC supported templates: $KCC_TEMPLATES"

      - name: Remove repo-agent Label on Start
        if: github.event_name == 'pull_request' && steps.find.outputs.has_kcc_templates == 'true'
        run: gh pr edit ${{ github.event.number }} --remove-label "repo-agent" --repo ${{ github.repository }} || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: "Lint KCC (${{ matrix.template }})"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_kcc_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.kcc_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: KCC manifest syntax check
        run: |
          python3 -c "
          import yaml, sys, pathlib
          errors = []
          for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml'):
              try:
                  list(yaml.safe_load_all(p.read_text()))
              except yaml.YAMLError as e:
                  errors.append(str(p) + ': ' + str(e))
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          "
      - name: Check no KCC abandon annotations
        run: |
          if grep -r 'deletion-policy.*abandon' ${{ matrix.template }}/config-connector/ >/dev/null 2>&1; then
            echo "ERROR: cnrm.cloud.google.com/deletion-policy: abandon found"
            exit 1
          fi

  # pre-cleanup removed — cleanup is handled by the openclaw-cleanup K3s CronJob
  # (every 5 min) with PROTECTED_CLUSTERS enforcement.

  kcc-apply:
    name: "KCC Apply (${{ matrix.template }})"
    needs: [ detect-changes, lint ]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.kcc_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Apply KCC manifests
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          find "${{ matrix.template }}"/config-connector* -type f -name "*.yaml" -exec sed -i "s/$(basename "${{ matrix.template }}")/$(basename "${{ matrix.template }}")-${UID_SUFFIX}-kcc/g" {} +
          kubectl apply -n "$KCC_NAMESPACE" -f "${{ matrix.template }}/config-connector/"
      - name: Wait for KCC resources Ready
        run: |
          kubectl wait -n "$KCC_NAMESPACE" --for=condition=Ready --all --timeout=3600s -f "${{ matrix.template }}/config-connector/"

  kcc-test:
    name: "Test KCC (${{ matrix.template }})"
    needs: [ kcc-apply, detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.kcc_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Get Workload Cluster Info and Validate
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          BASE_NAME=$(basename "${{ matrix.template }}")
          CLUSTER_NAME=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n "$KCC_NAMESPACE" -l "template=${BASE_NAME}-${UID_SUFFIX}-kcc" -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || echo "")
          if [ -n "$CLUSTER_NAME" ]; then
            LOCATION=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n "$KCC_NAMESPACE" -l "template=${BASE_NAME}-${UID_SUFFIX}-kcc" -o jsonpath='{.items[0].spec.location}')
            gcloud container clusters get-credentials "$CLUSTER_NAME" --region "$LOCATION" --project ${{ env.PROJECT_ID }}
            kubectl get nodes
            if [ -f "${{ matrix.template }}/validate.sh" ]; then
              export CLUSTER_NAME="$CLUSTER_NAME"
              export REGION="$LOCATION"
              chmod +x ${{ matrix.template }}/validate.sh
              ./${{ matrix.template }}/validate.sh
            fi
          fi

  kcc-teardown:
    name: "KCC Teardown (${{ matrix.template }})"
    needs: [ kcc-apply, kcc-test, detect-changes ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.kcc_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Delete KCC resources
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          find ${{ matrix.template }}/config-connector* -type f -name "*.yaml" -exec sed -i "s/$(basename "${{ matrix.template }}")/$(basename "${{ matrix.template }}")-${UID_SUFFIX}-kcc/g" {} +
          kubectl delete -n "$KCC_NAMESPACE" -f "${{ matrix.template }}/config-connector/" --wait=true --timeout=900s || true

  cleanup-pr-infra:
    name: "Cleanup KCC (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.kcc_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: KCC cleanup
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          find ${{ matrix.template }}/config-connector* -type f -name "*.yaml" -exec sed -i "s/$(basename "${{ matrix.template }}")/$(basename "${{ matrix.template }}")-${UID_SUFFIX}-kcc/g" {} +
          kubectl delete -n "$KCC_NAMESPACE" -f ${{ matrix.template }}/config-connector/ --ignore-not-found --wait=false || true

  label-failure:
    name: "Label Failure"
    needs: [detect-changes, lint, kcc-test]
    if: always() && github.event_name == 'pull_request' && (needs.kcc-test.result == 'failure' || needs.lint.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Add label
        run: gh pr edit ${{ github.event.number }} --add-label "repo-agent" --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    name: "Auto-merge"
    needs: [kcc-test]
    if: github.event_name == 'pull_request' && needs.kcc-test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check All Checks and Merge
        run: |
          PR_NUM=${{ github.event.number }}
          # Wait for API to sync
          sleep 10
          # Check if there are any pending or failed checks (excluding Auto-merge itself).
          # Valid --json fields for gh pr checks: name, state, startedAt, completedAt,
          # bucket, description, event, link, workflow. There is no "status" field.
          INCOMPLETE=$(gh pr checks $PR_NUM --repo ${{ github.repository }} --json name,state \
            | jq '[.[] | select(.name != "Auto-merge") | select(.state != "SUCCESS" and .state != "SKIPPED" and .state != "NEUTRAL")] | length')
          if [ "$INCOMPLETE" -eq 0 ]; then
             gh pr merge $PR_NUM --repo ${{ github.repository }} --merge --delete-branch
          else
             echo "Still $INCOMPLETE checks pending or failed. Skipping auto-merge."
             gh pr checks $PR_NUM --repo ${{ github.repository }}
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


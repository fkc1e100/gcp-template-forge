name: Sandbox Validation (TF)

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'templates/**'
      - 'agent-infra/**'

concurrency:
  group: tf-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: write

env:
  PROJECT_ID: gca-gke-2025
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VAR_project_id: gca-gke-2025
  TF_VAR_service_account: forge-builder@gca-gke-2025.iam.gserviceaccount.com

jobs:
  # ── 1. Detect which templates changed ────────────────────────────────────
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      tf_templates: ${{ steps.find.outputs.tf_templates }}
      has_tf_templates: ${{ steps.find.outputs.has_tf_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed template directories
        id: find
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch origin ${{ github.base_ref }}
            PR_HEAD="${{ github.event.pull_request.head.sha }}"
            BASE=$(git merge-base "origin/${{ github.base_ref }}" "$PR_HEAD")
            DIFF_HEAD="$PR_HEAD"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            fi
            DIFF_HEAD=${{ github.sha }}
          fi
          
          CHANGED_FILES=$(git diff --name-only "$BASE" "$DIFF_HEAD")
          DIRS=$(echo "$CHANGED_FILES" \
            | grep '^templates/' \
            | grep -v '\.md$' \
            | awk -F/ '{print $1"/"$2}' \
            | sort -u)
          
          TF_DIRS=""
          for dir in $DIRS; do
            if [ -f "$dir/terraform-helm/main.tf" ]; then
              TF_DIRS="$TF_DIRS $dir"
            fi
          done
          TF_TEMPLATES=$(echo "$TF_DIRS" | tr ' ' '\n' | sort -u | jq -Rnc '[inputs | select(length>0)]')
          echo "tf_templates=$TF_TEMPLATES" >> "$GITHUB_OUTPUT"
          echo "has_tf_templates=$([ "$TF_TEMPLATES" = "[]" ] && echo false || echo true)" >> "$GITHUB_OUTPUT"
          echo "TF supported templates: $TF_TEMPLATES"

      - name: Remove repo-agent Label on Start
        if: github.event_name == 'pull_request' && steps.find.outputs.has_tf_templates == 'true'
        run: gh pr edit ${{ github.event.number }} --remove-label "repo-agent" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Lint / static analysis (PR + push) ────────────────────────────────
  lint-agent-infra:
    name: "Lint Agent Infra"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Run Thorough Linting
        run: |
          chmod +x agent-infra/local-lint.sh
          ./agent-infra/local-lint.sh agent-infra

  lint:
    name: "Lint TF (${{ matrix.template }})"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_tf_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Run Thorough Linting
        run: |
          chmod +x agent-infra/local-lint.sh
          ./agent-infra/local-lint.sh ${{ matrix.template }}

      - name: Helm template (render + validate YAML)
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then exit 0; fi
          for chart in $CHARTS; do
            echo "=== helm template: $chart ==="
            helm template release "$chart" > /tmp/helm-rendered.yaml
            python3 -c "
          import yaml, sys
          docs = list(yaml.safe_load_all(open('/tmp/helm-rendered.yaml')))
          docs = [d for d in docs if d]
          print(f'Rendered {len(docs)} Kubernetes objects from chart')
          kinds = sorted(set(d.get(\"kind\",\"Unknown\") for d in docs))
          print('Kinds:', ', '.join(kinds))
            "
          done

      - name: Check deletion_protection = false
        run: |
          if grep -r 'google_container_cluster' ${{ matrix.template }}/terraform-helm/ >/dev/null 2>&1; then
            if ! grep -r 'deletion_protection.*=.*false' ${{ matrix.template }}/terraform-helm/ >/dev/null 2>&1; then
              echo "ERROR: google_container_cluster found without deletion_protection = false"
              exit 1
            fi
          fi

      - name: Check no lifecycle prevent_destroy
        run: |
          if grep -r 'prevent_destroy\s*=\s*true' ${{ matrix.template }}/terraform-helm/ >/dev/null 2>&1; then
            echo "ERROR: lifecycle prevent_destroy = true found — this blocks automated teardown"
            exit 1
          fi

  # ── 3. Pre-deploy Quota Cleanup ──────────────────────────────────────────
  pre-cleanup:
    name: "Quota Cleanup"
    needs: [ detect-changes ]
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_tf_templates == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Run Cleanup Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x agent-infra/cleanup-resources.sh
          ./agent-infra/cleanup-resources.sh

  tf-provision:
    name: "Provision TF (${{ matrix.template }})"
    needs: [ detect-changes, lint, pre-cleanup ]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}
    outputs:
      tf_cluster: ${{ steps.tf-outputs.outputs.tf_cluster }}
      tf_location: ${{ steps.tf-outputs.outputs.tf_location }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Break stale TF state lock
        run: |
          gsutil rm "gs://${TF_STATE_BUCKET}/${{ matrix.template }}-${{ github.run_id }}/terraform-helm/default.tflock" 2>/dev/null || true
      - name: Terraform apply
        id: tf-apply
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE_PATH="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE_PATH")
          if [[ "$TEMPLATE_PATH" == *"gke-inference-fuse-cache"* ]]; then
            BASE_NAME="gke-inf-fuse-cache"
          fi
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          export TF_VAR_cluster_name="${BASE_NAME}-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="${BASE_NAME}-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="${BASE_NAME}-${UID_SUFFIX}-tf-subnet"
          export TF_VAR_uid_suffix="${UID_SUFFIX}"
          terraform init -backend-config="bucket=$TF_STATE_BUCKET" -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm"
          terraform apply -auto-approve -input=false
      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          TF_DURATION=$(( $(date -u +%s) - TF_START ))
          echo "tf_duration=${TF_DURATION}" >> $GITHUB_OUTPUT
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "tf_location=${LOCATION}" >> $GITHUB_OUTPUT

  tf-test:
    name: "Test TF (${{ matrix.template }})"
    needs: [ tf-provision, detect-changes ]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Get TF cluster credentials
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE_PATH="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE_PATH")
          if [[ "$TEMPLATE_PATH" == *"gke-inference-fuse-cache"* ]]; then
            BASE_NAME="gke-inf-fuse-cache"
          fi
          CLUSTER_NAME="${BASE_NAME}-${UID_SUFFIX}-tf"
          gcloud container clusters get-credentials "${CLUSTER_NAME}" --region us-central1 --project ${{ env.PROJECT_ID }}
      - name: Verify cluster
        run: kubectl get nodes
      - name: Helm deploy and verify
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then exit 0; fi
          TIMEOUT="60m"
          [ -f "${{ matrix.template }}/.timeout" ] && TIMEOUT=$(cat ${{ matrix.template }}/.timeout)
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          EXTRA_ARGS=""
          if [[ "${{ matrix.template }}" == *"gke-inference-fuse-cache"* ]]; then
            BUCKET_NAME="gke-inf-fuse-cache-tf-${UID_SUFFIX}-bucket"
            KSA_NAME="gke-inf-fuse-cache-${UID_SUFFIX}-sa"
            EXTRA_ARGS="--set templateName=gke-inf-fuse-cache-${UID_SUFFIX} --set bucketName=${BUCKET_NAME} --set serviceAccount.name=${KSA_NAME}"
          fi
          for chart in $CHARTS; do
            helm upgrade --install release "$chart" --wait --timeout="$TIMEOUT" ${EXTRA_ARGS}
          done
          if [ -f "${{ matrix.template }}/validate.sh" ]; then
            export CLUSTER_NAME="${BASE_NAME}-${UID_SUFFIX}-tf"
            export REGION="us-central1"
            chmod +x ${{ matrix.template }}/validate.sh
            ./${{ matrix.template }}/validate.sh
          fi

  tf-teardown:
    name: "Teardown TF (${{ matrix.template }})"
    needs: [ tf-provision, tf-test, detect-changes ]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Cleanup Helm/NEGs
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE_PATH="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE_PATH")
          if [[ "$TEMPLATE_PATH" == *"gke-inference-fuse-cache"* ]]; then
            BASE_NAME="gke-inf-fuse-cache"
          fi
          CLUSTER_NAME="${BASE_NAME}-${UID_SUFFIX}-tf"
          NETWORK_NAME="${BASE_NAME}-${UID_SUFFIX}-tf-vpc"
          gcloud container clusters get-credentials "${CLUSTER_NAME}" --region us-central1 --project ${{ env.PROJECT_ID }} || true
          helm uninstall release --wait --timeout=5m || true
          kubectl delete gateway,ingress --all -A --wait=true --timeout=2m || true
          for _ in {1..20}; do
            NEGS=$(gcloud compute network-endpoint-groups list --filter="network:($NETWORK_NAME)" --project="${{ env.PROJECT_ID }}" --format="value(name)" 2>/dev/null || true)
            [ -z "$NEGS" ] && break
            sleep 15
          done
      - name: Terraform destroy
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE_PATH="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE_PATH")
          if [[ "$TEMPLATE_PATH" == *"gke-inference-fuse-cache"* ]]; then
            BASE_NAME="gke-inf-fuse-cache"
          fi
          export TF_VAR_cluster_name="${BASE_NAME}-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="${BASE_NAME}-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="${BASE_NAME}-${UID_SUFFIX}-tf-subnet"
          export TF_VAR_uid_suffix="${UID_SUFFIX}"
          terraform init -backend-config="bucket=$TF_STATE_BUCKET" -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm"
          terraform destroy -auto-approve -input=false
      - name: Fallback delete
        if: failure()
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE_PATH="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE_PATH")
          if [[ "$TEMPLATE_PATH" == *"gke-inference-fuse-cache"* ]]; then
            BASE_NAME="gke-inf-fuse-cache"
          fi
          gcloud container clusters delete "${BASE_NAME}-${UID_SUFFIX}-tf" --location="us-central1" --project="${{ env.PROJECT_ID }}" --quiet --async || true

  cleanup-pr-infra:
    name: "Cleanup TF (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform destroy
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE_PATH="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE_PATH")
          if [[ "$TEMPLATE_PATH" == *"gke-inference-fuse-cache"* ]]; then
            BASE_NAME="gke-inf-fuse-cache"
          fi
          export TF_VAR_cluster_name="${BASE_NAME}-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="${BASE_NAME}-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="${BASE_NAME}-${UID_SUFFIX}-tf-subnet"
          export TF_VAR_uid_suffix="${UID_SUFFIX}"
          terraform init -backend-config="bucket=$TF_STATE_BUCKET" -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm" || exit 0
          terraform destroy -auto-approve || true

  validate-tf-helm:
    name: "Post-merge Validate TF (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip if already validated
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          [ ! -f "$TEMPLATE/.validated" ] && echo "skip=false" >> $GITHUB_OUTPUT && exit 0
          V_COMMIT=$(grep '^commit:' "$TEMPLATE/.validated" | awk '{print $2}')
          CHANGED=$(git diff --name-only "$V_COMMIT" HEAD -- "$TEMPLATE/" | grep -vE '\.validated$|README\.md$' || true)
          [ -n "$CHANGED" ] && echo "skip=false" >> $GITHUB_OUTPUT || echo "skip=true" >> $GITHUB_OUTPUT
      - name: Auth
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Setup Terraform
        if: steps.skip-check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
      - name: Terraform apply
        id: tf-apply
        if: steps.skip-check.outputs.skip != 'true'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE_PATH="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE_PATH")
          if [[ "$TEMPLATE_PATH" == *"gke-inference-fuse-cache"* ]]; then
            BASE_NAME="gke-inf-fuse-cache"
          fi
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          export TF_VAR_cluster_name="${BASE_NAME}-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="${BASE_NAME}-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="${BASE_NAME}-${UID_SUFFIX}-tf-subnet"
          export TF_VAR_uid_suffix="${UID_SUFFIX}"
          terraform init -backend-config="bucket=$TF_STATE_BUCKET" -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm"
          terraform apply -auto-approve -input=false
      - name: Capture outputs
        id: tf-outputs
        if: steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          TF_DURATION=$(( $(date -u +%s) - TF_START ))
          echo "tf_duration=${TF_DURATION}" >> $GITHUB_OUTPUT
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "tf_location=${LOCATION}" >> $GITHUB_OUTPUT
      - name: Get credentials
        if: steps.tf-outputs.outputs.tf_cluster != ''
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.tf-outputs.outputs.tf_cluster }}
          location: ${{ steps.tf-outputs.outputs.tf_location }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Helm and validate
        if: steps.tf-outputs.outputs.tf_cluster != ''
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          for chart in $CHARTS; do
            helm upgrade --install release "$chart" --wait --timeout=60m
          done
          if [ -f "${{ matrix.template }}/validate.sh" ]; then
            export CLUSTER_NAME="${{ steps.tf-outputs.outputs.tf_cluster }}"
            export REGION="${{ steps.tf-outputs.outputs.tf_location }}"
            chmod +x ${{ matrix.template }}/validate.sh
            ./${{ matrix.template }}/validate.sh
          fi
      - name: Teardown
        if: always() && steps.tf-outputs.outputs.tf_cluster != ''
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          helm uninstall release --wait || true
          terraform destroy -auto-approve || true
      - name: Save results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/tf-results
          cat > /tmp/tf-results/result.json << 'EOF'
          {
            "status":   "${{ steps.tf-apply.outcome == 'success' && 'success' || 'failure' }}",
            "duration": "${{ steps.tf-outputs.outputs.tf_duration || '' }}",
            "cluster":  "${{ steps.tf-outputs.outputs.tf_cluster  || '' }}",
            "location": "${{ steps.tf-outputs.outputs.tf_location || '' }}"
          }
          EOF
      - name: Upload results
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tf-results-${{ github.run_id }}-${{ strategy.job-index }}
          path: /tmp/tf-results/result.json
          retention-days: 1

  publish-validated:
    name: "Publish TF (${{ matrix.template }})"
    needs: [detect-changes, validate-tf-helm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CODEBOT_PAT }}
          fetch-depth: 0

      - name: Download TF results artifact
        uses: actions/download-artifact@v4
        with:
          pattern: tf-results-${{ github.run_id }}-*
          merge-multiple: true
          path: /tmp/tf-artifacts/
        continue-on-error: true

      - name: Update README and mark validated (with retry)
        env:
          GITHUB_TOKEN: ${{ secrets.CODEBOT_PAT }}
        run: |
          set -e
          TEMPLATE="${{ matrix.template }}"
          COMMIT=${{ github.sha }}
          
          # Prepare results from this run
          TF_RESULT_FILE=$(ls /tmp/tf-artifacts/result.json 2>/dev/null | head -1 || true)
          if [ -n "$TF_RESULT_FILE" ]; then
            export THIS_TF_STATUS=$(python3  -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('status',''))")
            export THIS_TF_DURATION=$(python3 -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('duration',''))")
            export THIS_TF_CLUSTER=$(python3  -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('cluster',''))")
            export THIS_TF_LOCATION=$(python3 -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('location',''))")
            export THIS_TF_ZONES=$(python3    -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('zones',''))")
          else
            export THIS_TF_STATUS="skipped"
            export THIS_TF_DURATION=""; export THIS_TF_CLUSTER=""; export THIS_TF_LOCATION=""; export THIS_TF_ZONES=""
          fi

          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@users.noreply.github.com"

          MAX_RETRIES=5
          for i in $(seq 1 $MAX_RETRIES); do
            echo "Attempt $i to update and push..."
            git fetch origin main
            git reset --hard origin/main
            
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            DATE=$(date -u +"%Y-%m-%d")

            # Load current KCC status from existing .validated file
            KCC_STATUS="pending"
            if [ -f "${TEMPLATE}/.validated" ]; then
              KCC_STATUS=$(grep '^kcc:' "${TEMPLATE}/.validated" | awk '{print $2}' || echo "pending")
              V_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}' || echo "")
              if [ "$V_COMMIT" != "$COMMIT" ] && [ "$KCC_STATUS" != "skipped" ]; then
                 KCC_STATUS="pending"
              fi
            fi
            if [ -f "${TEMPLATE}/.kcc-unsupported" ] || ! ls "${TEMPLATE}/config-connector/"*.yaml >/dev/null 2>&1; then
              KCC_STATUS="skipped"
            fi

            TF_STATUS="$THIS_TF_STATUS"
            TF_DURATION="$THIS_TF_DURATION"
            TF_CLUSTER="$THIS_TF_CLUSTER"
            TF_LOCATION="$THIS_TF_LOCATION"
            TF_ZONES="$THIS_TF_ZONES"

            fmt_duration() { local s=$1; [ -z "$s" ] && echo "n/a" || echo "$((s/60))m $((s%60))s"; }
            TF_DUR=$(fmt_duration "$TF_DURATION")
            KCC_DUR="n/a"
            REGION="${TF_LOCATION:-us-central1}"
            ZONES="${TF_ZONES:-${REGION}}"

            README="${TEMPLATE}/README.md"
            if [ ! -f "$README" ]; then
              printf "# %s\n\n> README auto-generated by CI.\n" "$(basename $TEMPLATE)" > "$README"
            fi

            # Strip any existing validation record section
            python3 -c "
            import sys, re
            content = open(sys.argv[1]).read()
            content = re.sub(r'\n## Validation Record.*', '', content, flags=re.DOTALL).rstrip()
            open(sys.argv[1], 'w').write(content)
            " "$README"

            # Accumulate metrics
            python3 - "$TEMPLATE" << 'ACCUMPY'
            import json, os, sys, datetime
            template = sys.argv[1]
            metrics_file      = f'{template}/.agent-metrics'
            cumulative_file   = f'{template}/.agent-metrics-cumulative'
            current = {}
            if os.path.exists(metrics_file):
                try:    current = json.load(open(metrics_file))
                except: pass
            cumulative = {'total_input_tokens': 0, 'total_output_tokens': 0, 'total_cost_usd': 0.0, 'sessions': []}
            if os.path.exists(cumulative_file):
                try:    cumulative = json.load(open(cumulative_file))
                except: pass
            session_start    = current.get('session_start', '')
            already_counted  = session_start and any(s.get('session_start') == session_start for s in cumulative.get('sessions', []))
            if session_start and not already_counted:
                in_tok, out_tok = current.get('input_tokens'), current.get('output_tokens')
                cost = float(current.get('estimated_cost_usd') or 0)
                if isinstance(in_tok, (int, float)) and in_tok:
                    cumulative['total_input_tokens']  += int(in_tok)
                    cumulative['total_output_tokens'] += int(out_tok or 0)
                    cumulative['total_cost_usd']       = round(cumulative['total_cost_usd'] + cost, 4)
                    cumulative.setdefault('sessions', []).append({'session_start': session_start, 'input_tokens': int(in_tok), 'output_tokens': int(out_tok or 0), 'estimated_cost_usd': str(cost), 'model': current.get('model', ''), 'counted_at': datetime.datetime.now(datetime.timezone.utc).isoformat()})
                    json.dump(cumulative, open(cumulative_file, 'w'), indent=2)
ACCUMPY

            # Read cumulative totals
            eval "$(python3 - "$TEMPLATE" << 'READPY'
            import json, os, sys
            template = sys.argv[1]
            f = f'{template}/.agent-metrics-cumulative'
            d = json.load(open(f)) if os.path.exists(f) else {}
            n, in_t, out_t, cost = len(d.get('sessions', [])), d.get('total_input_tokens', 0), d.get('total_output_tokens', 0), d.get('total_cost_usd', 0.0)
            if n > 0 and in_t > 0:
                print(f'INPUT_TOKENS="{in_t:,}"'); print(f'OUTPUT_TOKENS="{out_t:,}"'); print(f'AGENT_COST="{cost}"'); print(f'SESSION_SUFFIX=" ({n} session{"s" if n != 1 else ""})"')
            else:
                print('INPUT_TOKENS=""'); print('OUTPUT_TOKENS=""'); print('AGENT_COST=""'); print('SESSION_SUFFIX=""')
READPY
            )"
            TOKEN_STR="${INPUT_TOKENS:+${INPUT_TOKENS} in / ${OUTPUT_TOKENS} out${SESSION_SUFFIX}}"
            COST_STR="${AGENT_COST:+\$${AGENT_COST}}"

            python3 - "$README" "$DATE" "$TF_STATUS" "$KCC_STATUS" "$TF_DUR" "$KCC_DUR" \
                "$REGION" "$ZONES" "${TF_CLUSTER:---}" "${COMMIT:0:8}" \
                "${TOKEN_STR:-not recorded}" "${COST_STR:--}" << 'PYEOF'
            import sys
            readme, date, tf_s, kcc_s, tf_d, kcc_d, region, zones, cluster, commit, tokens, cost = sys.argv[1:]
            sep = " | "
            rows = [
                ("**Status**",         tf_s,      kcc_s),
                ("**Date**",           date,      date),
                ("**Duration**",       tf_d,      kcc_d),
                ("**Region**",         region,    "us-central1 (KCC cluster)"),
                ("**Zones**",          zones,     "forge-management namespace"),
                ("**Cluster**",        cluster,   "krmapihost-kcc-instance"),
                ("**Agent tokens**",   tokens,    "(shared session)"),
                ("**Estimated cost**", cost,      "--"),
                ("**Commit**",         commit,    commit),
            ]
            header = sep.join(["", "", "Terraform + Helm", "Config Connector", ""]).strip()
            divider = sep.join(["", "---", "---", "---", ""]).strip()
            lines = ["\n\n## Validation Record\n", header, divider]
            for label, tf_val, kcc_val in rows:
                lines.append(sep.join(["", label, tf_val, kcc_val, ""]).strip())
            lines.append("")
            with open(readme, "a") as f:
                f.write("\n".join(lines) + "\n")
PYEOF

            printf "validated_at: %s\ncommit: %s\ntf_helm: %s\nkcc: %s\n" \
              "$TIMESTAMP" "$COMMIT" "$TF_STATUS" "$KCC_STATUS" \
              > "${TEMPLATE}/.validated"

            git add "${TEMPLATE}/README.md" "${TEMPLATE}/.validated"
            [ -f "${TEMPLATE}/.agent-metrics-cumulative" ] && git add "${TEMPLATE}/.agent-metrics-cumulative"
            git commit -m "ci: validate TF ${TEMPLATE} [skip ci]" || true
            git push && break || sleep 10
          done

  label-failure:
    name: "Label Failure"
    needs: [detect-changes, lint, tf-test]
    if: always() && github.event_name == 'pull_request' && (needs.tf-test.result == 'failure' || needs.lint.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add label
        run: gh pr edit ${{ github.event.number }} --add-label "repo-agent" --repo ${{ github.repository }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  auto-merge:
    name: "Auto-merge"
    needs: [tf-test]
    if: github.event_name == 'pull_request' && needs.tf-test.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check All Checks and Merge
        run: |
          PR_NUM=${{ github.event.number }}
          # Wait for API to sync
          sleep 10
          # Check if there are any non-completed or failed checks (excluding Auto-merge itself)
          # We also exclude "Label Failure" and "Cleanup TF" as they might be skipped or irrelevant
          INCOMPLETE=$(gh pr checks $PR_NUM --json name,state,status | jq '[.[] | select(.name != "Auto-merge") | select(.status != "COMPLETED" or (.state != "SUCCESS" and .state != "SKIPPED" and .state != "NEUTRAL"))] | length')
          if [ "$INCOMPLETE" -eq 0 ]; then
             gh pr merge $PR_NUM --merge --delete-branch
          else
             echo "Still $INCOMPLETE checks pending or failed. Skipping auto-merge."
             gh pr checks $PR_NUM
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.CODEBOT_PAT }}

name: Cleanup Orphaned Infrastructure
on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  sweep:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
      actions: 'read'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'forge-builder@gca-gke-2025.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'

      - name: Install gke-gcloud-auth-plugin
        run: |
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Find and Delete Orphaned Resources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          PROJECT="gca-gke-2025"
          REGION="us-central1"
          ERROR_FOUND=false

          gcloud version

          echo "Capturing Quota Status before cleanup..."
          gcloud compute project-info describe --project=$PROJECT --format="json" > /tmp/quota_before.json || true
          echo "Quota Status Before Cleanup:"
          python3 -c "import sys, json; data = json.load(open('/tmp/quota_before.json')); print(f\"{'Metric':<40} {'Usage':<10} {'Limit':<10}\"); print('-'*60); [print(f\"{q.get('metric','N/A'):<40} {q.get('usage',0):<10.1f} {q.get('limit',0):<10.1f}\") for q in data.get('quotas', []) if q.get('usage', 0) > 0]" || true

          # Helper function to delete resources and ignore benign errors
          delete_resource() {
            local cmd="$1"
            local desc="$2"
            echo "Attempting to delete $desc..."
            local out
            out=$($cmd 2>&1)
            local status=$?
            if [ $status -ne 0 ]; then
              if [[ "${out,,}" =~ "could not fetch resource" || "${out,,}" =~ "not found" || "${out,,}" =~ "is already being used" || "${out,,}" =~ "running incompatible operation" || "${out,,}" =~ "is not ready" || "${out,,}" =~ "permission" ]]; then
                echo "Ignored benign error for $desc: $out"
              else
                echo "ERROR deleting $desc: $out"
                ERROR_FOUND=true
              fi
            else
              echo "Successfully deleted $desc"
            fi
          }

          echo "Checking for active GitHub Actions runs..."
          # Get list of active/queued runs to avoid deleting their resources
          ACTIVE_RUNS=$(gh run list --status in_progress --json databaseId --repo ${{ github.repository }} -q '.[].databaseId' || true)
          QUEUED_RUNS=$(gh run list --status queued --json databaseId --repo ${{ github.repository }} -q '.[].databaseId' || true)
          
          # Also get commit SHAs for active runs (Terraform uses SHA prefix)
          ACTIVE_SHAS=$(gh run list --status in_progress --json headSha --repo ${{ github.repository }} -q '.[].headSha' | cut -c1-5 || true)
          QUEUED_SHAS=$(gh run list --status queued --json headSha --repo ${{ github.repository }} -q '.[].headSha' | cut -c1-5 || true)
          
          # Get last 6 digits of run IDs (resources use this as suffix)
          ACTIVE_SUFFIXES=$(gh run list --status in_progress --json databaseId --repo ${{ github.repository }} -q '.[].databaseId' | awk '{if (length($0) >= 6) print substr($0, length($0)-5); else print $0}' || true)
          QUEUED_SUFFIXES=$(gh run list --status queued --json databaseId --repo ${{ github.repository }} -q '.[].databaseId' | awk '{if (length($0) >= 6) print substr($0, length($0)-5); else print $0}' || true)
          
          ALL_ACTIVE="$ACTIVE_RUNS $QUEUED_RUNS $ACTIVE_SHAS $QUEUED_SHAS $ACTIVE_SUFFIXES $QUEUED_SUFFIXES"

          if [ -n "$ALL_ACTIVE" ]; then
            echo "Found active/queued runs/patterns: $ALL_ACTIVE. Cleanup will skip these."
          fi

          # 1. Clean up KCC Clusters and other resources FIRST
          echo "Connecting to Management Cluster..."
          gcloud container clusters get-credentials krmapihost-kcc-instance --region $REGION --project $PROJECT
          
          echo "Deleting all KCC-managed resources with project=gcp-template-forge label..."
          KCC_TYPES="containercluster,computenetwork,computesubnetwork,computerouter,computerouternat,computefirewall"
          KCC_RESOURCES=$(kubectl get $KCC_TYPES -n forge-management -l project=gcp-template-forge -o name | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete" || true)
          
          for RES in $KCC_RESOURCES; do
            SKIP=false
            for RUN_ID in $ALL_ACTIVE; do
              if [[ "$RES" == *"$RUN_ID"* ]]; then
                echo "Skipping active resource: $RES"
                SKIP=true
                break
              fi
            done
            if [ "$SKIP" = false ]; then
              echo "Deleting orphaned KCC resource: $RES"
              kubectl delete $RES -n forge-management --wait=false
            fi
          done

          # 2. Clean up GKE Clusters (Terraform)
          echo "Searching for orphaned Terraform clusters..."
          TF_CLUSTERS=$(gcloud container clusters list \
            --project=$PROJECT \
            --filter="name != repo-agent-standard AND name != krmapihost-kcc-instance AND name != kcc-dash-dont-delete" \
            --format="value(name, zone.scope())")

          while read -r CLUSTER C_LOC; do
            [ -z "$CLUSTER" ] && continue
            
            # Check safe-list
            if [[ "$CLUSTER" =~ "repo-agent-standard" || "$CLUSTER" =~ "krmapihost-kcc-instance" || "$CLUSTER" =~ "kcc-dash-dont-delete" ]]; then
              echo "Skipping protected cluster: $CLUSTER"
              continue
            fi

            # Check active runs
            SKIP=false
            for PAT in $ALL_ACTIVE; do
              if [ -n "$PAT" ] && [[ "$CLUSTER" == *"$PAT"* ]]; then
                echo "Skipping active cluster: $CLUSTER (matches $PAT)"
                SKIP=true
                break
              fi
            done
            [ "$SKIP" = true ] && continue

            echo "Deleting orphaned TF cluster: $CLUSTER in $C_LOC"
            delete_resource "gcloud container clusters delete $CLUSTER --location=$C_LOC --project=$PROJECT --quiet" "cluster $CLUSTER" &
          done <<< "$TF_CLUSTERS"
          wait

          # 2.5 Clean up Network Endpoint Groups (NEGs)
          echo "Cleaning up orphaned Network Endpoint Groups (NEGs)..."
          ALL_NEGS=$(gcloud compute network-endpoint-groups list --project=$PROJECT --format="value(name, zone, network)" || true)
          
          while read -r NEG_NAME NEG_ZONE NEG_NET; do
            [ -z "$NEG_NAME" ] && continue
            
            # Check safe-list (Generic exclusion)
            if [[ "$NEG_NET" =~ "repo-agent-standard" || "$NEG_NET" =~ "krmapihost-kcc-instance" || "$NEG_NET" =~ "kcc-dash-dont-delete" || "$NEG_NET" =~ "default" || "$NEG_NET" =~ "gke-network-a64ea3f1" ]]; then
              continue
            fi
              
              # Check active runs
              SKIP=false
              for PAT in $ALL_ACTIVE; do
                if [ -n "$PAT" ] && [[ "$NEG_NET" == *"$PAT"* ]]; then
                  echo "Skipping active NEG: $NEG_NAME (matches $PAT)"
                  SKIP=true
                  break
                fi
              done
              [ "$SKIP" = true ] && continue
              
              ZONE_NAME="${NEG_ZONE##*/}"
              echo "Deleting orphaned NEG: $NEG_NAME in $ZONE_NAME"
              if [ -n "$ZONE_NAME" ]; then
                delete_resource "gcloud compute network-endpoint-groups delete $NEG_NAME --zone=$ZONE_NAME --project=$PROJECT --quiet" "NEG $NEG_NAME" &
              else
                delete_resource "gcloud compute network-endpoint-groups delete $NEG_NAME --global --project=$PROJECT --quiet" "NEG $NEG_NAME" &
              fi
          done <<< "$ALL_NEGS"
          wait

          # 3. Clean up Networking resources (matching pattern)
          echo "Cleaning up orphaned Networking resources (matching pattern)..."
          
          # Firewalls (Generic exclusion)
          FIREWALLS=$(gcloud compute firewall-rules list --project=$PROJECT --format="value(name)" | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete|default|gke-network-a64ea3f1|^k8s-fw-" || true)
          for F in $FIREWALLS; do
            SKIP=false
            for PAT in $ALL_ACTIVE; do
              if [ -n "$PAT" ] && [[ "$F" == *"$PAT"* ]]; then
                echo "Skipping active firewall: $F"
                SKIP=true
                break
              fi
            done
            [ "$SKIP" = true ] && continue
            
            delete_resource "gcloud compute firewall-rules delete $F --project=$PROJECT --quiet" "firewall $F" &
          done
          wait

          # Routers and NATs across all regions
          echo "Cleaning up routers across all regions..."
          REGIONS=$(gcloud compute regions list --project=$PROJECT --format="value(name)")
          ALL_ROUTERS=$(gcloud compute routers list --project=$PROJECT --format="value(name, region)")
          
          for RGN in $REGIONS; do
            ROUTERS=$(echo "$ALL_ROUTERS" | grep "$RGN" | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete|default|gke-network-a64ea3f1" | awk '{print $1}' || true)
            for R in $ROUTERS; do
              SKIP=false
              for PAT in $ALL_ACTIVE; do
                if [ -n "$PAT" ] && [[ "$R" == *"$PAT"* ]]; then
                  echo "Skipping active router: $R"
                  SKIP=true
                  break
                fi
              done
              [ "$SKIP" = true ] && continue

              echo "Checking NATs for router $R in $RGN"
              NATS=$(gcloud compute routers describe $R --project=$PROJECT --region=$RGN --format="value(nats.name)" | tr ';' ' ')
              if [ -n "$NATS" ]; then
                for NAT in $NATS; do
                  delete_resource "gcloud compute routers nats delete $NAT --router=$R --region=$RGN --project=$PROJECT --quiet" "NAT $NAT on router $R" &
                done
                wait
              fi
              delete_resource "gcloud compute routers delete $R --region=$RGN --project=$PROJECT --quiet" "router $R" &
            done
          done
          wait

          # Subnets across all regions
          echo "Cleaning up subnets across all regions..."
          ALL_SUBNETS=$(gcloud compute networks subnets list --project=$PROJECT --format="value(name, region)")
          
          for RGN in $REGIONS; do
            SUBNETS=$(echo "$ALL_SUBNETS" | grep "$RGN" | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete|default|gke-network-a64ea3f1" | awk '{print $1}' || true)
            for S in $SUBNETS; do
              SKIP=false
              for PAT in $ALL_ACTIVE; do
                if [ -n "$PAT" ] && [[ "$S" == *"$PAT"* ]]; then
                  echo "Skipping active subnet: $S"
                  SKIP=true
                  break
                fi
              done
              [ "$SKIP" = true ] && continue

              delete_resource "gcloud compute networks subnets delete $S --region=$RGN --project=$PROJECT --quiet" "subnet $S" &
            done
          done
          wait

          # Networks (VPCs)
          echo "Listing all networks in project..."
          gcloud compute networks list --project=$PROJECT

          NETWORKS=$(gcloud compute networks list --project=$PROJECT --format="value(name)" | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete|default|gke-network-a64ea3f1" || true)
          for N in $NETWORKS; do
            SKIP=false
            for PAT in $ALL_ACTIVE; do
              if [ -n "$PAT" ] && [[ "$N" == *"$PAT"* ]]; then
                echo "Skipping active network: $N"
                SKIP=true
                break
              fi
            done
            [ "$SKIP" = true ] && continue

            delete_resource "gcloud compute networks delete $N --project=$PROJECT --quiet" "network $N" &
          done
          wait

          echo "Capturing Quota Status after cleanup..."
          gcloud compute project-info describe --project=$PROJECT --format="json" > /tmp/quota_after.json || true

          echo "Quota Comparison (Before vs After):"
          python3 -c "
          import sys, json, textwrap
          code = '''
          try:
              before = json.load(open('/tmp/quota_before.json'))
              after = json.load(open('/tmp/quota_after.json'))
          except Exception as e:
              print(f'Error loading quota files: {e}')
              sys.exit(0)

          before_quotas = {q['metric']: q for q in before.get('quotas', [])}
          after_quotas = {q['metric']: q for q in after.get('quotas', [])}

          all_metrics = set(before_quotas.keys()).union(set(after_quotas.keys()))

          print(f\"{'Metric':<40} {'Before':<10} {'After':<10} {'Diff':<10} {'Limit':<10}\")
          print('-' * 80)

          for metric in sorted(all_metrics):
              b = before_quotas.get(metric, {})
              a = after_quotas.get(metric, {})
              
              b_usage = b.get('usage', 0.0)
              a_usage = a.get('usage', 0.0)
              limit = b.get('limit', 0.0) or a.get('limit', 0.0)
              
              diff = a_usage - b_usage
              
              if b_usage > 0 or a_usage > 0 or diff != 0:
                  print(f\"{metric:<40} {b_usage:<10.1f} {a_usage:<10.1f} {diff:<10.1f} {limit:<10.1f}\")
          '''
          exec(textwrap.dedent(code))
          " || true

          echo "Cleanup complete."

          if [ "$ERROR_FOUND" = true ]; then
            echo "Errors occurred during cleanup!"
            exit 1
          fi

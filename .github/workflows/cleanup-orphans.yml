name: Cleanup Orphaned Infrastructure
on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  sweep:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
      actions: 'read'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'forge-builder@gca-gke-2025.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'

      - name: Install gke-gcloud-auth-plugin
        run: |
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Find and Delete Orphaned Resources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROJECT="gca-gke-2025"
          REGION="us-central1"

          gcloud version

          echo "Checking for active GitHub Actions runs..."
          # Get list of active/queued runs to avoid deleting their resources
          ACTIVE_RUNS=$(gh run list --status in_progress --json databaseId -q '.[].databaseId')
          QUEUED_RUNS=$(gh run list --status queued --json databaseId -q '.[].databaseId')
          ALL_ACTIVE="$ACTIVE_RUNS $QUEUED_RUNS"

          if [ -n "$ALL_ACTIVE" ]; then
            echo "Found active/queued runs: $ALL_ACTIVE. Cleanup will proceed but be careful."
          fi

          # 1. Clean up KCC Clusters and other resources FIRST
          echo "Connecting to Management Cluster..."
          gcloud container clusters get-credentials krmapihost-kcc-instance --region $REGION --project $PROJECT
          
          echo "Deleting all KCC-managed resources with project=gcp-template-forge label..."
          KCC_TYPES="containercluster,computenetwork,computevpc,computesubnetwork,computerouter,computerouternat,computefirewall"
          KCC_RESOURCES=$(kubectl get $KCC_TYPES -n forge-management -l project=gcp-template-forge -o name || true)
          
          if [ -n "$KCC_RESOURCES" ]; then
            echo "Deleting orphaned KCC resources: $KCC_RESOURCES"
            kubectl delete $KCC_RESOURCES -n forge-management --wait=false
          fi

          # 2. Clean up GKE Clusters (Terraform)
          echo "Searching for orphaned Terraform clusters..."
          TF_CLUSTERS=$(gcloud container clusters list \
            --project=$PROJECT \
            --location=$REGION \
            --filter="resourceLabels.project=gcp-template-forge OR name ~ ^latest-gke-features- OR name ~ ^enterprise-gke- OR name ~ ^basic-gke-" \
            --format="value(name)")

          for CLUSTER in $TF_CLUSTERS; do
            echo "Deleting orphaned TF cluster: $CLUSTER"
            gcloud beta container clusters update $CLUSTER --location=$REGION --project=$PROJECT --no-deletion-protection --quiet || true
            gcloud container clusters delete $CLUSTER --location=$REGION --project=$PROJECT --quiet --async || true
          done

          # 3. Clean up Networking resources (matching pattern)
          echo "Cleaning up orphaned Networking resources (matching pattern)..."
          
          # Firewalls
          FIREWALLS=$(gcloud compute firewall-rules list --project=$PROJECT --format="value(name)" --filter="name ~ ^latest-gke-features- OR name ~ ^enterprise-gke- OR name ~ ^basic-gke-")
          for F in $FIREWALLS; do
            echo "Deleting firewall: $F"
            gcloud compute firewall-rules delete $F --project=$PROJECT --quiet || true
          done

          # Routers and NATs
          ROUTERS=$(gcloud compute routers list --project=$PROJECT --format="value(name, region.scope())" --filter="name ~ ^latest-gke-features- OR name ~ ^enterprise-gke- OR name ~ ^basic-gke-")
          while read -r R R_REGION; do
            [ -z "$R" ] && continue
            echo "Checking NATs for router $R in $R_REGION"
            NATS=$(gcloud compute routers describe $R --project=$PROJECT --region=$R_REGION --format="value(nats.name)" | tr ';' ' ')
            if [ -n "$NATS" ]; then
              for NAT in $NATS; do
                echo "Deleting NAT $NAT from router $R"
                gcloud compute routers nats delete $NAT --router=$R --region=$R_REGION --project=$PROJECT --quiet || true
              done
            fi
            echo "Deleting router $R"
            gcloud compute routers delete $R --region=$R_REGION --project=$PROJECT --quiet || true
          done <<< "$ROUTERS"

          # Subnets
          SUBNETS=$(gcloud compute networks subnets list --project=$PROJECT --format="value(name, region.scope())" --filter="name ~ ^latest-gke-features- OR name ~ ^enterprise-gke- OR name ~ ^basic-gke-")
          while read -r S S_REGION; do
            [ -z "$S" ] && continue
            echo "Deleting subnet $S in $S_REGION"
            gcloud compute networks subnets delete $S --region=$S_REGION --project=$PROJECT --quiet || true
          done <<< "$SUBNETS"

          # Networks (VPCs)
          echo "Listing all networks in project..."
          gcloud compute networks list --project=$PROJECT

          NETWORKS=$(gcloud compute networks list --project=$PROJECT --filter="name ~ ^latest-gke-features- OR name ~ ^enterprise-gke- OR name ~ ^basic-gke-" --format="value(name)")
          for N in $NETWORKS; do
            echo "Deleting network $N"
            gcloud compute networks delete $N --project=$PROJECT --quiet || true
          done

          echo "Cleanup complete."

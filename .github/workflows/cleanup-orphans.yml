name: Cleanup Orphaned Infrastructure
on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  sweep:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: forge-builder@gca-gke-2025.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: |
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Clean up GKE Clusters and Networks
        run: |
          PROJECT="gca-gke-2025"
          REGION="us-central1"

          # 1. Clean up KCC-provisioned ContainerClusters FIRST (so they don't immediately rebuild)
          echo "Connecting to Management Cluster (krmapihost-kcc-instance)..."
          gcloud container clusters get-credentials krmapihost-kcc-instance --region us-central1 --project $PROJECT
          KCC_CLUSTERS=$(kubectl get containercluster -n forge-management -l project=gcp-template-forge -o name || true)
          if [ -n "$KCC_CLUSTERS" ]; then
            echo "Deleting orphaned KCC resources..."
            kubectl delete $KCC_CLUSTERS -n forge-management --wait=false
          fi

          # 2. Clean up GKE Clusters (Terraform & Leftover KCC nodes)
          echo "Searching for orphaned GKE clusters..."
          # Delete any cluster with the project label OR containing the word "-tf" or "-kcc"
          CLUSTERS=$(gcloud container clusters list --project=$PROJECT --region=$REGION --format="value(name)" | grep -E "latest-gke|enterprise-gke|basic-gke|-tf|-kcc" || true)

          for CLUSTER in $CLUSTERS; do
            echo "Disabling deletion protection for $CLUSTER..."
            gcloud container clusters update $CLUSTER --location=$REGION --project=$PROJECT --no-deletion-protection --quiet || true
            echo "Deleting cluster: $CLUSTER"
            gcloud container clusters delete $CLUSTER --location=$REGION --project=$PROJECT --quiet --async || true
          done

          # 3. Clean up Networking Resources
          # We run these with || true so that if a cluster is still spinning down, the network delete fails silently and will be picked up on the next 10min cron loop.
          echo "Cleaning up orphaned Networking resources..."
          
          # Delete Firewalls
          FIREWALLS=$(gcloud compute firewall-rules list --project=$PROJECT --format="value(name)" | grep -E "gke-latest-gke|gke-enterprise-gke|gke-basic-gke" || true)
          for FW in $FIREWALLS; do
            gcloud compute firewall-rules delete $FW --project=$PROJECT --quiet || true
          done

          # Delete Routers and NATs
          ROUTERS=$(gcloud compute routers list --project=$PROJECT --format="value(name, region)" | grep -E "latest-gke|enterprise-gke|basic-gke" || true)
          while read -r R R_REGION; do
            [ -z "$R" ] && continue
            gcloud compute routers delete $R --region=$R_REGION --project=$PROJECT --quiet || true
          done <<< "$ROUTERS"

          # Delete Subnets
          SUBNETS=$(gcloud compute networks subnets list --project=$PROJECT --format="value(name, region)" | grep -E "latest-gke|enterprise-gke|basic-gke" || true)
          while read -r S S_REGION; do
            [ -z "$S" ] && continue
            gcloud compute networks subnets delete $S --region=$S_REGION --project=$PROJECT --quiet || true
          done <<< "$SUBNETS"

          # Delete VPC Networks
          NETWORKS=$(gcloud compute networks list --project=$PROJECT --format="value(name)" | grep -E "latest-gke|enterprise-gke|basic-gke" || true)
          for N in $NETWORKS; do
            gcloud compute networks delete $N --project=$PROJECT --quiet || true
          done
          
          echo "Cleanup complete."

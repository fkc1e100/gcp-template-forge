name: Cleanup Orphaned Infrastructure
on:
  schedule:
    - cron: '*/10 * * * *' # Runs every 10 minutes
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

jobs:
  sweep:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'
      actions: 'read'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: 'projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github'
          service_account: 'forge-builder@gca-gke-2025.iam.gserviceaccount.com'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          version: 'latest'

      - name: Install gke-gcloud-auth-plugin
        run: |
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update
          sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Find and Delete Orphaned Resources
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PROJECT="gca-gke-2025"
          REGION="us-central1"
          ERROR_FOUND=false

          gcloud version

          echo "Current Quota Status:"
          gcloud compute project-info describe --project=$PROJECT --format="json" | python3 -c "import sys, json; data = json.load(sys.stdin); print(f\"{'Metric':<40} {'Usage':<10} {'Limit':<10}\"); print('-'*60); [print(f\"{q.get('metric','N/A'):<40} {q.get('usage',0):<10.1f} {q.get('limit',0):<10.1f}\") for q in data.get('quotas', []) if q.get('usage', 0) > 0]" || true

          # Helper function to delete resources and ignore benign errors
          delete_resource() {
            local cmd="$1"
            local desc="$2"
            echo "Attempting to delete $desc..."
            local out
            out=$($cmd 2>&1)
            local status=$?
            if [ $status -ne 0 ]; then
              if [[ "$out" =~ "Could not fetch resource" || "$out" =~ "not found" || "$out" =~ "is already being used" || "$out" =~ "running incompatible operation" || "$out" =~ "is not ready" || "$out" =~ "permission" ]]; then
                echo "Ignored benign error for $desc: $out"
              else
                echo "ERROR deleting $desc: $out"
                ERROR_FOUND=true
              fi
            else
              echo "Successfully deleted $desc"
            fi
          }

          echo "Checking for active GitHub Actions runs..."
          # Get list of active/queued runs to avoid deleting their resources
          ACTIVE_RUNS=$(gh run list --status in_progress --json databaseId -q '.[].databaseId')
          QUEUED_RUNS=$(gh run list --status queued --json databaseId -q '.[].databaseId')
          ALL_ACTIVE="$ACTIVE_RUNS $QUEUED_RUNS"

          if [ -n "$ALL_ACTIVE" ]; then
            echo "Found active/queued runs: $ALL_ACTIVE. Cleanup will proceed but be careful."
          fi

          # 1. Clean up KCC Clusters and other resources FIRST
          echo "Connecting to Management Cluster..."
          gcloud container clusters get-credentials krmapihost-kcc-instance --region $REGION --project $PROJECT
          
          echo "Deleting all KCC-managed resources with project=gcp-template-forge label..."
          KCC_TYPES="containercluster,computenetwork,computevpc,computesubnetwork,computerouter,computerouternat,computefirewall"
          KCC_RESOURCES=$(kubectl get $KCC_TYPES -n forge-management -l project=gcp-template-forge -o name | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete" || true)
          
          for RES in $KCC_RESOURCES; do
            SKIP=false
            for RUN_ID in $ALL_ACTIVE; do
              if [[ "$RES" == *"$RUN_ID"* ]]; then
                echo "Skipping active resource: $RES"
                SKIP=true
                break
              fi
            done
            if [ "$SKIP" = false ]; then
              echo "Deleting orphaned KCC resource: $RES"
              kubectl delete $RES -n forge-management --wait=false
            fi
          done

          # 2. Clean up GKE Clusters (Terraform)
          echo "Searching for orphaned Terraform clusters..."
          TF_CLUSTERS=$(gcloud container clusters list \
            --project=$PROJECT \
            --filter="resourceLabels.project=gcp-template-forge OR name ~ latest-gke-features- OR name ~ enterprise-gke- OR name ~ basic-gke-" \
            --format="value(name, zone.scope())")

          while read -r CLUSTER C_LOC; do
            [ -z "$CLUSTER" ] && continue
            
            # Check safe-list
            if [[ "$CLUSTER" =~ "repo-agent-standard" || "$CLUSTER" =~ "krmapihost-kcc-instance" || "$CLUSTER" =~ "kcc-dash-dont-delete" ]]; then
              echo "Skipping protected cluster: $CLUSTER"
              continue
            fi

            echo "Deleting orphaned TF cluster: $CLUSTER in $C_LOC"
            delete_resource "gcloud container clusters delete $CLUSTER --location=$C_LOC --project=$PROJECT --quiet" "cluster $CLUSTER"
          done <<< "$TF_CLUSTERS"

          # 3. Clean up Networking resources (matching pattern)
          echo "Cleaning up orphaned Networking resources (matching pattern)..."
          
          # Firewalls (BROADER PATTERN to catch gke- prefix)
          FIREWALLS=$(gcloud compute firewall-rules list --project=$PROJECT --format="value(name)" | grep -E "latest-gke-features-|enterprise-gke-|basic-gke-" | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete" || true)
          for F in $FIREWALLS; do
            delete_resource "gcloud compute firewall-rules delete $F --project=$PROJECT --quiet" "firewall $F"
          done

          # Routers and NATs across all regions
          echo "Cleaning up routers across all regions..."
          REGIONS=$(gcloud compute regions list --project=$PROJECT --format="value(name)")
          ALL_ROUTERS=$(gcloud compute routers list --project=$PROJECT --format="value(name, region)")
          
          for RGN in $REGIONS; do
            ROUTERS=$(echo "$ALL_ROUTERS" | grep "$RGN" | grep -E "latest-gke-features-|enterprise-gke-|basic-gke-" | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete" | awk '{print $1}' || true)
            for R in $ROUTERS; do
              echo "Checking NATs for router $R in $RGN"
              NATS=$(gcloud compute routers describe $R --project=$PROJECT --region=$RGN --format="value(nats.name)" | tr ';' ' ')
              if [ -n "$NATS" ]; then
                for NAT in $NATS; do
                  delete_resource "gcloud compute routers nats delete $NAT --router=$R --region=$RGN --project=$PROJECT --quiet" "NAT $NAT on router $R"
                done
              fi
              delete_resource "gcloud compute routers delete $R --region=$RGN --project=$PROJECT --quiet" "router $R"
            done
          done

          # Subnets across all regions
          echo "Cleaning up subnets across all regions..."
          ALL_SUBNETS=$(gcloud compute networks subnets list --project=$PROJECT --format="value(name, region)")
          
          for RGN in $REGIONS; do
            SUBNETS=$(echo "$ALL_SUBNETS" | grep "$RGN" | grep -E "latest-gke-features-|enterprise-gke-|basic-gke-" | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete" | awk '{print $1}' || true)
            for S in $SUBNETS; do
              delete_resource "gcloud compute networks subnets delete $S --region=$RGN --project=$PROJECT --quiet" "subnet $S"
            done
          done

          # Networks (VPCs)
          echo "Listing all networks in project..."
          gcloud compute networks list --project=$PROJECT

          NETWORKS=$(gcloud compute networks list --project=$PROJECT --format="value(name)" | grep -E "latest-gke-features-|enterprise-gke-|basic-gke-" | grep -v -E "repo-agent-standard|krmapihost-kcc-instance|kcc-dash-dont-delete" || true)
          for N in $NETWORKS; do
            delete_resource "gcloud compute networks delete $N --project=$PROJECT --quiet" "network $N"
          done

          echo "Cleanup complete."

          if [ "$ERROR_FOUND" = true ]; then
            echo "Errors occurred during cleanup!"
            exit 1
          fi

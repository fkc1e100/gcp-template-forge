name: KCC PR Validation

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]

    paths:
      - 'templates/**/config-connector/**'
      - 'templates/**/config-connector-workload/**'
      - '.github/workflows/validate-kcc.yml'
      - '.github/actions/**'
      - 'agent-infra/**'

concurrency:
  group: gke-cluster-provisioning
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: ${{ vars.GCP_WIF_PROVIDER }}
  WIF_SERVICE_ACCOUNT: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}
  TF_STATE_BUCKET: ${{ vars.GCP_TF_STATE_BUCKET }}
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_service_account: ${{ vars.GCP_CI_SERVICE_ACCOUNT }}

jobs:
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    if: github.event.action != 'closed'
    outputs:
      templates: ${{ steps.detect.outputs.templates }}
      tf_templates: ${{ steps.detect.outputs.tf_templates }}
      kcc_templates: ${{ steps.detect.outputs.kcc_templates }}
      has_templates: ${{ steps.detect.outputs.has_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        uses: ./.github/actions/detect-changes
      - name: Remove repo-agent Label on Start
        run: gh pr edit "${{ github.event.number }}" --remove-label "repo-agent" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint:
    name: Lint (${{ matrix.template }})
    needs: detect-changes
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.has_templates == 'true'
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Set up Helm
        run: curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      - name: Run Thorough Linting
        run: |
          chmod +x agent-infra/local-lint.sh
          ./agent-infra/local-lint.sh "${{ matrix.template }}"
      - name: Actionlint
        run: |
          if [ -f "./actionlint" ]; then
            ./actionlint
          fi

  kcc-validation:
    name: KCC (${{ matrix.template }})
    needs: [detect-changes, lint]
    runs-on: ubuntu-latest
    if: needs.detect-changes.outputs.kcc_templates != '[]' && needs.detect-changes.outputs.kcc_templates != ''
    timeout-minutes: 100
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.kcc_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Apply and Wait
        id: kcc-apply-wait
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE="${{ matrix.template }}"
          BASE_NAME=$(python3 -c "import yaml; print(yaml.safe_load(open('${TEMPLATE}/template.yaml')).get('shortName', ''))" 2>/dev/null)
          [ -z "$BASE_NAME" ] && BASE_NAME=$(basename "$TEMPLATE")
          find "${TEMPLATE}"/config-connector* -type f -name "*.yaml" -exec sed -i "s/${BASE_NAME}/${BASE_NAME}-${UID_SUFFIX}/g" {} +

          set +e
          {
            kubectl apply -n "$KCC_NAMESPACE" -f "${TEMPLATE}/config-connector/" && \
            kubectl wait -n "$KCC_NAMESPACE" --for=condition=Ready --all --timeout=5400s \
              -f "${TEMPLATE}/config-connector/"
          } 2>&1 | tee /tmp/kcc.log
          KCC_EXIT=${PIPESTATUS[0]}
          set -e

          if [ "$KCC_EXIT" -ne 0 ]; then
            # Capture recent KCC resource status for failure diagnostics
            {
              echo "=== kubectl apply/wait output (last 40 lines) ==="
              tail -40 /tmp/kcc.log
              echo ""
              echo "=== KCC resource conditions ==="
              kubectl get -n "$KCC_NAMESPACE" -f "${TEMPLATE}/config-connector/" \
                -o custom-columns='NAME:.metadata.name,KIND:.kind,READY:.status.conditions[?(@.type=="Ready")].status,REASON:.status.conditions[?(@.type=="Ready")].reason,MSG:.status.conditions[?(@.type=="Ready")].message' \
                2>/dev/null || true
            } > /tmp/kcc-failure.txt || true
            exit "$KCC_EXIT"
          fi

      - name: Upload KCC failure log
        if: failure() && steps.kcc-apply-wait.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: kcc-failure-log-${{ github.run_id }}-${{ strategy.job-index }}
          path: /tmp/kcc-failure.txt
          if-no-files-found: ignore
          retention-days: 3

      - name: Teardown KCC
        if: always()
        run: |
          TEMPLATE="${{ matrix.template }}"
          kubectl delete -n "$KCC_NAMESPACE" -f "${TEMPLATE}/config-connector/" --wait=true --timeout=900s || true

  circuit-breaker:
    name: Circuit Breaker
    needs: [kcc-validation]
    if: always() && (needs.kcc-validation.result == 'failure')
    runs-on: ubuntu-latest
    steps:
      - name: Download KCC failure log
        uses: actions/download-artifact@v4
        with:
          pattern: kcc-failure-log-${{ github.run_id }}-*
          merge-multiple: true
          path: /tmp/
        continue-on-error: true

      - name: Check Retry Count and Label
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUM="${{ github.event.number }}"
          REPO="${{ github.repository }}"
          COMMENTS=$(gh pr view "$PR_NUM" --repo "$REPO" --json comments -q '.comments[].body')
          FAIL_COUNT=$(echo "$COMMENTS" | grep -c "Infrastructure failure detected" || echo "0")

          # Build failure excerpt section if log was captured
          EXCERPT_SECTION=""
          if [ -f "/tmp/kcc-failure.txt" ]; then
            EXCERPT=$(head -50 /tmp/kcc-failure.txt)
            if [ -n "$EXCERPT" ]; then
              EXCERPT_SECTION=$(printf '\n\n<details><summary>KCC failure details — use this to guide the fix</summary>\n\n```\n%s\n```\n\n</details>' "$EXCERPT")
            fi
          fi

          if [ "$FAIL_COUNT" -ge 3 ]; then
            printf '🚨 **Circuit Breaker Tripped**: This PR has failed KCC validation 3+ times. Stopping automated retries. Human intervention required.%s' \
              "$EXCERPT_SECTION" > /tmp/cb-comment.txt
            gh pr comment "$PR_NUM" --repo "$REPO" --body-file /tmp/cb-comment.txt
          else
            printf '⚠️ **Infrastructure failure detected** (Attempt %s). Re-adding repo-agent label for automated retry.%s' \
              "$((FAIL_COUNT + 1))" "$EXCERPT_SECTION" > /tmp/cb-comment.txt
            gh pr comment "$PR_NUM" --repo "$REPO" --body-file /tmp/cb-comment.txt
            gh pr edit "$PR_NUM" --repo "$REPO" --add-label "repo-agent"
          fi

  cleanup-orphans:
    name: Cleanup Orphans
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Run Cleanup Script
        run: |
          chmod +x agent-infra/cleanup-resources.sh
          ./agent-infra/cleanup-resources.sh

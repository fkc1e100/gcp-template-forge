name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install Checkov
      run: pip install checkov
    - name: Run Checkov
      run: checkov -d templates/6-enterprise-gke
      continue-on-error: true # Checkov might fail on KCC manifests if not fully supported, so we allow it to continue for now

  kcc-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    - name: Get GKE Credentials
      uses: google-github-actions/get-gke-credentials@v2
      with:
        cluster_name: ${{ secrets.GKE_CLUSTER_NAME }}
        location: ${{ secrets.GKE_LOCATION }}
    - name: KCC Client-Side Dry-Run
      run: |
        if [ -d "templates/6-enterprise-gke/kcc" ] && [ "$(find templates/6-enterprise-gke/kcc -name '*.yaml' -o -name '*.yml')" ]; then
          kubectl apply --dry-run=client -f templates/6-enterprise-gke/kcc/
        else
          echo "Error: No KCC manifests found in kcc directory!"
          exit 1
        fi

  helm-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Helm
      uses: azure/setup-helm@v4
    - name: Helm Lint
      run: |
        cd templates/6-enterprise-gke/Terraform_HELM/workload
        helm lint .
    - name: Helm Template
      run: |
        cd templates/6-enterprise-gke/Terraform_HELM/workload
        helm template .

  terraform-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Authenticate to GCP
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
    - name: Terraform Init
      run: |
        if [ -d "templates/6-enterprise-gke/Terraform_HELM/terraform" ] && [ "$(find templates/6-enterprise-gke/Terraform_HELM/terraform -name '*.tf')" ]; then
          cd templates/6-enterprise-gke/Terraform_HELM/terraform
          terraform init -backend=false
        else
          echo "Error: No terraform files found in directory!"
          exit 1
        fi
    - name: Terraform Validate
      run: |
        if [ -d "templates/6-enterprise-gke/Terraform_HELM/terraform" ]; then
          cd templates/6-enterprise-gke/Terraform_HELM/terraform
          terraform validate
        else
          echo "Error: No terraform directory found!"
          exit 1
        fi
    - name: Terraform Dry-Run (Plan)
      timeout-minutes: 5
      run: |
        if [ -d "templates/6-enterprise-gke/Terraform_HELM/terraform" ]; then
          cd templates/6-enterprise-gke/Terraform_HELM/terraform
          terraform plan
        else
          echo "Error: No terraform directory found!"
          exit 1
        fi
      continue-on-error: true # Might fail without credentials

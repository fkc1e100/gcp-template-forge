name: CI

on:
  pull_request:
    branches: [ main ]

jobs:
  static-analysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'
    - name: Install Checkov
      run: pip install checkov
    - name: Run Checkov
      run: checkov -d templates/6-enterprise-gke
      continue-on-error: true # Checkov might fail on KCC manifests if not fully supported, so we allow it to continue for now

  kcc-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: KCC Client-Side Dry-Run
      run: |
        if [ -d "templates/6-enterprise-gke/cluster" ]; then
          kubectl apply --dry-run=client -f templates/6-enterprise-gke/cluster/
        else
          echo "Error: No KCC cluster directory found!"
          exit 1
        fi

  helm-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Helm
      uses: azure/setup-helm@v4
    - name: Helm Lint
      run: |
        cd templates/6-enterprise-gke/workload
        helm lint .
    - name: Helm Template
      run: |
        cd templates/6-enterprise-gke/workload
        helm template .

  terraform-validation:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v3
    - name: Terraform Init
      run: |
        if [ -d "templates/6-enterprise-gke/terraform" ]; then
          cd templates/6-enterprise-gke/terraform
          terraform init -backend=false
        else
          echo "Error: No terraform directory found!"
          exit 1
        fi
    - name: Terraform Validate
      run: |
        if [ -d "templates/6-enterprise-gke/terraform" ]; then
          cd templates/6-enterprise-gke/terraform
          terraform validate
        else
          echo "Error: No terraform directory found!"
          exit 1
        fi
    - name: Terraform Dry-Run (Plan)
      run: |
        if [ -d "templates/6-enterprise-gke/terraform" ]; then
          cd templates/6-enterprise-gke/terraform
          terraform plan
        else
          echo "Error: No terraform directory found!"
          exit 1
        fi
      continue-on-error: true # Might fail without credentials

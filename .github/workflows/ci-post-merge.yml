name: Post-Merge Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'
      - '.github/workflows/**'
      - '.github/actions/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  actions: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VAR_project_id: gca-gke-2025
  TF_VAR_service_account: forge-builder@gca-gke-2025.iam.gserviceaccount.com

jobs:
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.detect.outputs.templates }}
      tf_templates: ${{ steps.detect.outputs.tf_templates }}
      kcc_templates: ${{ steps.detect.outputs.kcc_templates }}
      has_templates: ${{ steps.detect.outputs.has_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        uses: ./.github/actions/detect-changes

  validate-tf-helm:
    name: Validate TF+Helm (${{ matrix.template }})
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip check
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          GITHUB_SHA="${{ github.sha }}"
          if [ ! -f "${TEMPLATE}/.validated" ]; then echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          VALIDATED_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}')
          if [ "$VALIDATED_COMMIT" = "$GITHUB_SHA" ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; else echo "skip=false" >> "$GITHUB_OUTPUT"; fi
      
      - name: Auth and Setup GKE
        if: steps.skip-check.outputs.skip != 'true'
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      
      - name: Setup Terraform
        if: steps.skip-check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3

      - name: TF Apply with Zonal Fallback
        id: tf-apply
        if: steps.skip-check.outputs.skip != 'true'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          echo "TF_START=$(date -u +%s)" >> "$GITHUB_ENV"
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE")
          if [[ "$TEMPLATE" == *"gke-inference-fuse-cache"* ]]; then BASE_NAME="gke-inf-fuse-cache"; fi
          export TF_VAR_cluster_name="${BASE_NAME}-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="${BASE_NAME}-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="${BASE_NAME}-${UID_SUFFIX}-tf-subnet"
          export TF_VAR_uid_suffix="${UID_SUFFIX}"
          terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TEMPLATE}-post-merge/terraform-helm"
          
          REGIONS=("us-central1" "us-east1" "us-west1")
          SUCCESS=false
          for REGION in "${REGIONS[@]}"; do
            echo "Attempting deployment in $REGION..."
            export TF_VAR_region="$REGION"
            
            set +e
            terraform apply -auto-approve -input=false 2>&1 | tee /tmp/tf.log
            TF_EXIT=${PIPESTATUS[0]}
            set -e

            if [ "$TF_EXIT" -eq 0 ]; then
              SUCCESS=true; break
            else
              if grep -iE "RESOURCE_EXHAUSTED|ZONE_RESOURCE_POOL_EXHAUSTED|QUOTA_EXCEEDED|stockout" /tmp/tf.log; then
                echo "Retryable error in $REGION. Trying next..."
                continue
              else
                exit 1
              fi
            fi
          done
          [ "$SUCCESS" = true ] || exit 1

      - name: Capture TF outputs
        id: tf-outputs
        if: always() && steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          TF_DURATION=$(( $(date -u +%s) - TF_START ))
          echo "tf_duration=${TF_DURATION}" >> "$GITHUB_OUTPUT"
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> "$GITHUB_OUTPUT"
          echo "tf_location=${LOCATION}" >> "$GITHUB_OUTPUT"

      - name: Terraform Destroy
        if: always() && steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: terraform destroy -auto-approve -input=false || true

      - name: Save TF results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/tf-results
          cat > /tmp/tf-results/result.json << EOF
          {
            "status":   "${{ steps.tf-apply.outcome == 'success' && 'success' || 'failure' }}",
            "duration": "${{ steps.tf-outputs.outputs.tf_duration || '' }}",
            "cluster":  "${{ steps.tf-outputs.outputs.tf_cluster  || '' }}",
            "location": "${{ steps.tf-outputs.outputs.tf_location || '' }}"
          }
          EOF

      - name: Set Slug
        id: slug
        run: echo "template_slug=$(echo "${{ matrix.template }}" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload TF results artifact
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tf-results-${{ steps.slug.outputs.template_slug }}
          path: /tmp/tf-results/result.json
          retention-days: 1

  validate-kcc:
    name: Validate KCC (${{ matrix.template }})
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.kcc_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: KCC Apply and Wait
        id: kcc-wait
        run: |
          KCC_START=$(date -u +%s)
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE="${{ matrix.template }}"
          BASE_NAME=$(basename "$TEMPLATE")
          find "${TEMPLATE}"/config-connector* -type f -name "*.yaml" -exec sed -i "s/${BASE_NAME}/${BASE_NAME}-${UID_SUFFIX}/g" {} +
          kubectl apply -n "$KCC_NAMESPACE" -f "${TEMPLATE}/config-connector/"
          kubectl wait -n "$KCC_NAMESPACE" --for=condition=Ready --all --timeout=5400s -f "${TEMPLATE}/config-connector/"
          KCC_DURATION=$(( $(date -u +%s) - KCC_START ))
          echo "kcc_duration=${KCC_DURATION}" >> "$GITHUB_OUTPUT"
      - name: KCC Teardown
        if: always()
        run: |
          TEMPLATE="${{ matrix.template }}"
          kubectl delete -n "$KCC_NAMESPACE" -f "${TEMPLATE}/config-connector/" --wait=true --timeout=900s || true

      - name: Save KCC results
        if: always()
        run: |
          mkdir -p /tmp/kcc-results
          cat > /tmp/kcc-results/result.json << EOF
          {
            "status":   "${{ steps.kcc-wait.outcome || 'skipped' }}",
            "duration": "${{ steps.kcc-wait.outputs.kcc_duration || '' }}"
          }
          EOF

      - name: Set Slug
        id: slug
        run: echo "template_slug=$(echo "${{ matrix.template }}" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload KCC results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kcc-results-${{ steps.slug.outputs.template_slug }}
          path: /tmp/kcc-results/result.json
          retention-days: 1

  publish-validated:
    name: Publish Results
    needs: [detect-changes, validate-tf-helm, validate-kcc]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts/
        continue-on-error: true

      - name: Update READMEs and .validated files
        run: |
          TEMPLATES='${{ needs.detect-changes.outputs.templates }}'
          echo "$TEMPLATES" | jq -r '.[]' | while read -r TEMPLATE; do
            [ -z "$TEMPLATE" ] && continue
            echo "Updating $TEMPLATE..."
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            DATE=$(date -u +"%Y-%m-%d")
            COMMIT="${{ github.sha }}"

            SLUG=$(echo "$TEMPLATE" | tr '/' '-')
            TF_RES="/tmp/artifacts/tf-results-${SLUG}/result.json"
            KCC_RES="/tmp/artifacts/kcc-results-${SLUG}/result.json"

            TF_STATUS="skipped"; TF_DUR="n/a"
            if [ -f "$TF_RES" ]; then
              TF_STATUS=$(jq -r .status "$TF_RES" || echo "unknown")
              TF_DUR_S=$(jq -r .duration "$TF_RES" || echo "")
              [ -n "$TF_DUR_S" ] && TF_DUR="${TF_DUR_S%.*}s" || true
            fi

            KCC_STATUS="skipped"; KCC_DUR="n/a"
            if [ -f "$KCC_RES" ]; then
              KCC_STATUS=$(jq -r .status "$KCC_RES" || echo "unknown")
              KCC_DUR_S=$(jq -r .duration "$KCC_RES" || echo "")
              [ -n "$KCC_DUR_S" ] && KCC_DUR="${KCC_DUR_S%.*}s" || true
            fi

            printf "validated_at: %s\ncommit: %s\ntf_helm: %s\nkcc: %s\n" \
              "$TIMESTAMP" "$COMMIT" "$TF_STATUS" "$KCC_STATUS" \
              > "${TEMPLATE}/.validated"

            README="${TEMPLATE}/README.md"
            if [ -f "$README" ]; then
              python3 -c "
import sys, re
content = open(sys.argv[1]).read()
content = re.sub(r'\n## Validation Record.*', '', content, flags=re.DOTALL).rstrip()
open(sys.argv[1], 'w').write(content)
" "$README"
              printf '\n\n## Validation Record\n\n| Path | Status | Date | Duration |\n| --- | --- | --- | --- |\n| Terraform+Helm | %s | %s | %s |\n| Config Connector | %s | %s | %s |\n' \
                "$TF_STATUS" "$DATE" "$TF_DUR" \
                "$KCC_STATUS" "$DATE" "$KCC_DUR" >> "$README"
            fi
          done

          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@sfle.ca"
          git add -A templates/
          git commit -m "ci: update validation records [skip ci]" || true
          git push origin main || (git pull --rebase origin main && git push origin main)

      - name: Regenerate template index in root README
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - "${{ github.sha }}" "${{ github.repository }}" << 'PYEOF'
          import sys, pathlib, yaml, json, re, subprocess, datetime

          commit_sha, repo = sys.argv[1], sys.argv[2]
          templates_dir = pathlib.Path("templates")
          rows = []

          for tmpl_dir in sorted(templates_dir.iterdir()):
              if not tmpl_dir.is_dir():
                  continue
              tname = tmpl_dir.name
              if tname.startswith('.') or tname == 'README.md':
                  continue

              # Read template.yaml for metadata
              meta_file = tmpl_dir / "template.yaml"
              meta = {}
              if meta_file.exists():
                  try:
                      meta = yaml.safe_load(meta_file.read_text()) or {}
                  except Exception:
                      pass

              display = meta.get("displayName") or tname
              desc    = meta.get("description") or ""
              cost    = meta.get("estimatedMonthlyCost") or "—"
              services = ", ".join(meta.get("gcpServices") or []) or "GKE"
              issue_num = meta.get("issueNumber") or ""

              # Read .validated for status
              validated_file = tmpl_dir / ".validated"
              tf_status  = "—"
              kcc_status = "—"
              val_date   = "—"
              if validated_file.exists():
                  for line in validated_file.read_text().splitlines():
                      if line.startswith("tf_helm:"):
                          tf_status = line.split(":", 1)[1].strip()
                      elif line.startswith("kcc:"):
                          kcc_status = line.split(":", 1)[1].strip()
                      elif line.startswith("validated_at:"):
                          val_date = line.split(":", 1)[1].strip()[:10]

              tf_icon  = "✅" if tf_status  == "success" else ("⏭" if tf_status  == "skipped" else ("❌" if tf_status  == "failure" else "⏳"))
              kcc_icon = "✅" if kcc_status == "success" else ("⏭" if kcc_status == "skipped" else ("❌" if kcc_status == "failure" else "⏳"))
              if (tmpl_dir / ".kcc-unsupported").exists():
                  kcc_icon = "⏭ (unsupported)"

              issue_link = f"[#{issue_num}](https://github.com/{repo}/issues/{issue_num})" if issue_num else "—"
              tmpl_link  = f"[`{tname}`](templates/{tname}/)"

              rows.append((tmpl_link, display, desc, services, tf_icon, kcc_icon, cost, val_date, issue_link))

          if not rows:
              print("No templates found — skipping index update.")
              sys.exit(0)

          header = "| Template | Display Name | Description | GCP Services | TF+Helm | KCC | Est. Cost/mo | Last Validated | Issue |"
          divider = "|---|---|---|---|:---:|:---:|---|---|---|"
          table_lines = [header, divider]
          for r in rows:
              table_lines.append("| " + " | ".join(str(x) for x in r) + " |")

          table = "\n".join(table_lines)
          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")
          section = f"\n\n## Published Templates\n\n*Auto-generated by CI on {now} from commit `{commit_sha[:8]}`.*\n\n{table}\n"

          readme = pathlib.Path("README.md")
          if readme.exists():
              content = readme.read_text()
              content = re.sub(r'\n## Published Templates.*', '', content, flags=re.DOTALL).rstrip()
              readme.write_text(content + section)
              print(f"Updated README.md with {len(rows)} template(s).")
          else:
              readme.write_text(f"# GCP Template Forge\n{section}")
              print(f"Created README.md with {len(rows)} template(s).")
          PYEOF

          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@sfle.ca"
          git add README.md
          git commit -m "ci: regenerate template index [skip ci]" || true
          git push origin main || (git pull --rebase origin main && git push origin main)

  on-failure:
    name: File Recovery Issue on Failure
    needs: [detect-changes, validate-tf-helm, validate-kcc]
    if: >
      always() && !cancelled() &&
      (needs.validate-tf-helm.result == 'failure' || needs.validate-kcc.result == 'failure')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: File recovery issue for each failed template
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEMPLATES='${{ needs.detect-changes.outputs.templates }}'
          TF_RESULT='${{ needs.validate-tf-helm.result }}'
          KCC_RESULT='${{ needs.validate-kcc.result }}'
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          COMMIT="${{ github.sha }}"
          REPO="${{ github.repository }}"

          echo "$TEMPLATES" | jq -r '.[]' | while read -r TEMPLATE; do
            [ -z "$TEMPLATE" ] && continue
            TNAME=$(basename "$TEMPLATE")

            # Determine which path(s) failed
            FAILED_PATHS=""
            [ "$TF_RESULT" = "failure" ] && FAILED_PATHS="${FAILED_PATHS} Terraform+Helm"
            [ "$KCC_RESULT" = "failure" ] && FAILED_PATHS="${FAILED_PATHS} Config-Connector"

            TITLE="[CI-BUG] Post-merge validation failure: ${TNAME}"

            # Check if an open issue with this title already exists to avoid duplicates
            EXISTING=$(gh issue list --repo "$REPO" \
              --state open --search "$TITLE" --json number -q '.[0].number' || echo "")
            if [ -n "$EXISTING" ]; then
              echo "Issue already exists (#${EXISTING}) for ${TNAME} — skipping."
              continue
            fi

            gh issue create \
              --repo "$REPO" \
              --title "$TITLE" \
              --label "repo-agent,ci-bug" \
              --body "Post-merge CI failed for \`${TEMPLATE}\` at commit \`${COMMIT:0:8}\`.

**Failed paths:**${FAILED_PATHS}

**Workflow run:** ${RUN_URL}

The previous validation passed (PR gate), but the post-merge re-validation failed.
Possible causes: GKE API version change, quota exhaustion, GCP service deprecation,
or template-specific regression.

## Agent Instructions

1. Check the workflow run linked above for the specific error.
2. Read the circuit-breaker failure excerpt if present.
3. Fix the root cause in \`${TEMPLATE}/\`.
4. Run \`terraform validate\` and \`local-lint.sh\` locally before pushing.
5. Open a PR to main with title: \`fix: restore post-merge validation for ${TNAME}\`
6. Run \`gh pr merge --auto --merge\` on the PR."
            echo "Filed recovery issue for ${TNAME}."
          done

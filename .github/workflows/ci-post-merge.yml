name: Post-Merge Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'
      - '.github/workflows/**'
      - '.github/actions/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  actions: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VAR_project_id: gca-gke-2025
  TF_VAR_service_account: forge-builder@gca-gke-2025.iam.gserviceaccount.com

jobs:
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.detect.outputs.templates }}
      tf_templates: ${{ steps.detect.outputs.tf_templates }}
      kcc_templates: ${{ steps.detect.outputs.kcc_templates }}
      has_templates: ${{ steps.detect.outputs.has_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: detect
        uses: ./.github/actions/detect-changes

  validate-tf-helm:
    name: Validate TF+Helm (${{ matrix.template }})
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.tf_templates) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip check
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          GITHUB_SHA="${{ github.sha }}"
          if [ ! -f "${TEMPLATE}/.validated" ]; then echo "skip=false" >> "$GITHUB_OUTPUT"; exit 0; fi
          VALIDATED_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}')
          if [ "$VALIDATED_COMMIT" = "$GITHUB_SHA" ]; then echo "skip=true" >> "$GITHUB_OUTPUT"; else echo "skip=false" >> "$GITHUB_OUTPUT"; fi
      
      - name: Auth and Setup GKE
        if: steps.skip-check.outputs.skip != 'true'
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      
      - name: Setup Terraform
        if: steps.skip-check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3

      - name: TF Apply with Zonal Fallback
        id: tf-apply
        if: steps.skip-check.outputs.skip != 'true'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          echo "TF_START=$(date -u +%s)" >> "$GITHUB_ENV"
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE="${{ matrix.template }}"
          SHORT_NAME=$(yq e '.shortName' "../template.yaml")
          export TF_VAR_cluster_name="${SHORT_NAME}-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="${SHORT_NAME}-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="${SHORT_NAME}-${UID_SUFFIX}-tf-subnet"
          export TF_VAR_uid_suffix="${UID_SUFFIX}"
          terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TEMPLATE}-post-merge/terraform-helm"
          
          REGIONS=("us-central1" "us-east1" "us-west1")
          SUCCESS=false
          for REGION in "${REGIONS[@]}"; do
            echo "Attempting deployment in $REGION..."
            export TF_VAR_region="$REGION"
            
            set +e
            terraform apply -auto-approve -input=false 2>&1 | tee /tmp/tf.log
            TF_EXIT=${PIPESTATUS[0]}
            set -e

            if [ "$TF_EXIT" -eq 0 ]; then
              SUCCESS=true; break
            else
              if grep -iE "RESOURCE_EXHAUSTED|ZONE_RESOURCE_POOL_EXHAUSTED|QUOTA_EXCEEDED|stockout" /tmp/tf.log; then
                echo "Retryable error in $REGION. Trying next..."
                continue
              else
                exit 1
              fi
            fi
          done
          [ "$SUCCESS" = true ] || exit 1

      - name: Capture TF outputs
        id: tf-outputs
        if: always() && steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          TF_DURATION=$(( $(date -u +%s) - TF_START ))
          echo "tf_duration=${TF_DURATION}" >> "$GITHUB_OUTPUT"
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> "$GITHUB_OUTPUT"
          echo "tf_location=${LOCATION}" >> "$GITHUB_OUTPUT"

      - name: Terraform Destroy
        if: always() && steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: terraform destroy -auto-approve -input=false || true

      - name: Save TF results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/tf-results
          cat > /tmp/tf-results/result.json << EOF
          {
            "status":   "${{ steps.tf-apply.outcome == 'success' && 'success' || 'failure' }}",
            "duration": "${{ steps.tf-outputs.outputs.tf_duration || '' }}",
            "cluster":  "${{ steps.tf-outputs.outputs.tf_cluster  || '' }}",
            "location": "${{ steps.tf-outputs.outputs.tf_location || '' }}"
          }
          EOF

      - name: Set Slug
        id: slug
        run: echo "template_slug=$(echo "${{ matrix.template }}" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload TF results artifact
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tf-results-${{ steps.slug.outputs.template_slug }}
          path: /tmp/tf-results/result.json
          retention-days: 1

  validate-kcc:
    name: Validate KCC (${{ matrix.template }})
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.kcc_templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}
      - name: KCC Apply and Wait
        id: kcc-wait
        run: |
          KCC_START=$(date -u +%s)
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          TEMPLATE="${{ matrix.template }}"
          SHORT_NAME=$(yq e '.shortName' "${TEMPLATE}/template.yaml")
          find "${TEMPLATE}"/config-connector* -type f -name "*.yaml" -exec sed -i "s/${SHORT_NAME}/${SHORT_NAME}-${UID_SUFFIX}/g" {} +
          kubectl apply -n "$KCC_NAMESPACE" -f "${TEMPLATE}/config-connector/"
          kubectl wait -n "$KCC_NAMESPACE" --for=condition=Ready --all --timeout=5400s -f "${TEMPLATE}/config-connector/"
          KCC_DURATION=$(( $(date -u +%s) - KCC_START ))
          echo "kcc_duration=${KCC_DURATION}" >> "$GITHUB_OUTPUT"
      - name: KCC Teardown
        if: always()
        run: |
          TEMPLATE="${{ matrix.template }}"
          kubectl delete -n "$KCC_NAMESPACE" -f "${TEMPLATE}/config-connector/" --wait=true --timeout=900s || true

      - name: Save KCC results
        if: always()
        run: |
          mkdir -p /tmp/kcc-results
          cat > /tmp/kcc-results/result.json << EOF
          {
            "status":   "${{ steps.kcc-wait.outcome || 'skipped' }}",
            "duration": "${{ steps.kcc-wait.outputs.kcc_duration || '' }}"
          }
          EOF

      - name: Set Slug
        id: slug
        run: echo "template_slug=$(echo "${{ matrix.template }}" | tr '/' '-')" >> "$GITHUB_OUTPUT"

      - name: Upload KCC results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kcc-results-${{ steps.slug.outputs.template_slug }}
          path: /tmp/kcc-results/result.json
          retention-days: 1

  publish-validated:
    name: Publish Results
    needs: [detect-changes, validate-tf-helm, validate-kcc]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: /tmp/artifacts/
        continue-on-error: true

      - name: Update READMEs and .validated files
        run: |
          TEMPLATES='${{ needs.detect-changes.outputs.templates }}'
          echo "$TEMPLATES" | jq -r '.[]' | while read -r TEMPLATE; do
            [ -z "$TEMPLATE" ] && continue
            echo "Updating $TEMPLATE..."
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            DATE=$(date -u +"%Y-%m-%d")
            COMMIT="${{ github.sha }}"
            
            # Fetch results from artifacts if they exist
            SLUG=$(echo "$TEMPLATE" | tr '/' '-')
            TF_RES="/tmp/artifacts/tf-results-${SLUG}/result.json"
            KCC_RES="/tmp/artifacts/kcc-results-${SLUG}/result.json"
            
            TF_STATUS="skipped"; TF_DUR="n/a"; TF_LOCATION="us-central1"; TF_CLUSTER="--"
            if [ -f "$TF_RES" ]; then
              TF_STATUS=$(jq -r .status "$TF_RES")
              TF_DUR_SEC=$(jq -r .duration "$TF_RES")
              if [ -n "$TF_DUR_SEC" ] && [ "$TF_DUR_SEC" != "null" ]; then
                TF_DUR="$((TF_DUR_SEC/60))m $((TF_DUR_SEC%60))s"
              fi
              TF_LOCATION=$(jq -r .location "$TF_RES" | grep -v null || echo "us-central1")
              TF_CLUSTER=$(jq -r .cluster "$TF_RES" | grep -v null || echo "--")
            elif [ -f "${TEMPLATE}/.validated" ]; then
              TF_STATUS=$(grep '^tf_helm:' "${TEMPLATE}/.validated" | awk '{print $2}' || echo "skipped")
            fi
            
            KCC_STATUS="skipped"; KCC_DUR="n/a"
            if [ -f "$KCC_RES" ]; then
              KCC_STATUS=$(jq -r .status "$KCC_RES")
              KCC_DUR_SEC=$(jq -r .duration "$KCC_RES")
              if [ -n "$KCC_DUR_SEC" ] && [ "$KCC_DUR_SEC" != "null" ]; then
                KCC_DUR="$((KCC_DUR_SEC/60))m $((KCC_DUR_SEC%60))s"
              fi
            elif [ -f "${TEMPLATE}/.validated" ]; then
              KCC_STATUS=$(grep '^kcc:' "${TEMPLATE}/.validated" | awk '{print $2}' || echo "skipped")
            fi
            
            # Write .validated file
            printf "validated_at: %s\ncommit: %s\ntf_helm: %s\nkcc: %s\n" \
              "$TIMESTAMP" "$COMMIT" "$TF_STATUS" "$KCC_STATUS" \
              > "${TEMPLATE}/.validated"

            # Accumulate metrics
            python3 - "$TEMPLATE" << 'ACCUMPY'
import json, os, sys, datetime
template = sys.argv[1]
metrics_file      = f'{template}/.agent-metrics'
cumulative_file   = f'{template}/.agent-metrics-cumulative'
current = {}
if os.path.exists(metrics_file):
    try:    current = json.load(open(metrics_file))
    except: pass
cumulative = {'total_input_tokens': 0, 'total_output_tokens': 0, 'total_cost_usd': 0.0, 'sessions': []}
if os.path.exists(cumulative_file):
    try:    cumulative = json.load(open(cumulative_file))
    except: pass
session_start    = current.get('session_start', '')
already_counted  = session_start and any(s.get('session_start') == session_start for s in cumulative.get('sessions', []))
if session_start and not already_counted:
    in_tok, out_tok = current.get('input_tokens'), current.get('output_tokens')
    cost = float(current.get('estimated_cost_usd') or 0)
    if isinstance(in_tok, (int, float)) and in_tok:
        cumulative['total_input_tokens']  += int(in_tok)
        cumulative['total_output_tokens'] += int(out_tok or 0)
        cumulative['total_cost_usd']       = round(cumulative['total_cost_usd'] + cost, 4)
        cumulative.setdefault('sessions', []).append({'session_start': session_start, 'input_tokens': int(in_tok), 'output_tokens': int(out_tok or 0), 'estimated_cost_usd': str(cost), 'model': current.get('model', ''), 'counted_at': datetime.datetime.now(datetime.timezone.utc).isoformat()})
        json.dump(cumulative, open(cumulative_file, 'w'), indent=2)
ACCUMPY

            # Read cumulative totals
            eval "$(python3 - "$TEMPLATE" << 'READPY'
import json, os, sys
template = sys.argv[1]
f = f'{template}/.agent-metrics-cumulative'
d = json.load(open(f)) if os.path.exists(f) else {}
n, in_t, out_t, cost = len(d.get('sessions', [])), d.get('total_input_tokens', 0), d.get('total_output_tokens', 0), d.get('total_cost_usd', 0.0)
if n > 0 and in_t > 0:
    print(f'INPUT_TOKENS="{in_t:,}"'); print(f'OUTPUT_TOKENS="{out_t:,}"'); print(f'AGENT_COST="{cost}"'); print(f'SESSION_SUFFIX=" ({n} session{"s" if n != 1 else ""})"')
else:
    print('INPUT_TOKENS=""'); print('OUTPUT_TOKENS=""'); print('AGENT_COST=""'); print('SESSION_SUFFIX=""')
READPY
            )"
            TOKEN_STR="${INPUT_TOKENS:+${INPUT_TOKENS} in / ${OUTPUT_TOKENS} out${SESSION_SUFFIX}}"
            COST_STR="${AGENT_COST:+\$${AGENT_COST}}"
              
            # Update README
            README="${TEMPLATE}/README.md"
            if [ -f "$README" ]; then
              # Robust truncation and standardized table generation using Python
              python3 - "$README" "$DATE" "$TF_STATUS" "$KCC_STATUS" "$TF_DUR" "$KCC_DUR" \
                "$TF_LOCATION" "$TF_CLUSTER" "${COMMIT:0:8}" "${TOKEN_STR:-not recorded}" "${COST_STR:--}" << 'PYEOF'
import sys, os
readme, date, tf_s, kcc_s, tf_d, kcc_d, region, cluster, commit, tokens, cost = sys.argv[1:]

# Standardized vertical table format
rows = [
    ("**Status**",         tf_s,      kcc_s),
    ("**Date**",           date,      date),
    ("**Duration**",       tf_d,      kcc_d),
    ("**Region**",         region,    "us-central1 (KCC cluster)"),
    ("**Zones**",          "-",       "forge-management namespace"),
    ("**Cluster**",        cluster,   "krmapihost-kcc-instance"),
    ("**Agent tokens**",   tokens,    "(shared session)"),
    ("**Estimated cost**", cost,      "--"),
    ("**Commit**",         commit,    commit),
]

sep = " | "
header = sep.join(["", "", "Terraform + Helm", "Config Connector", ""]).strip()
divider = sep.join(["", "---", "---", "---", ""]).strip()
lines = ["\n## Validation Record\n", header, divider]
for label, tf_val, kcc_val in rows:
    lines.append(sep.join(["", label, tf_val, kcc_val, ""]).strip())

# Truncate after the CI marker
content = []
with open(readme, 'r') as f:
    for line in f:
        content.append(line)
        if '<!-- CI: validation record' in line:
            break

with open(readme, 'w') as f:
    f.writelines(content)
    f.write("\n".join(lines) + "\n")
PYEOF
            fi
          done
          
          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@sfle.ca"
          git add templates/
          git status
          git commit -m "ci: bulk validate templates [skip ci]" || true
          git push origin main || (git pull --rebase origin main && git push origin main)

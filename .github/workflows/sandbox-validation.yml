name: Sandbox Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'templates/**'
      - 'agent-infra/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  TF_VAR_project_id: gca-gke-2025
  TF_VAR_service_account: forge-builder@gca-gke-2025.iam.gserviceaccount.com

jobs:
  # ── 1. Detect which templates changed ────────────────────────────────────
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      templates: ${{ steps.find.outputs.templates }}
      has_templates: ${{ steps.find.outputs.has_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed template directories
        id: find
        run: |
          git fetch origin ${{ github.base_ref }}
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_HEAD="${{ github.event.pull_request.head.sha }}"
            BASE=$(git merge-base "origin/${{ github.base_ref }}" "$PR_HEAD")
            DIFF_HEAD="$PR_HEAD"
          else
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            fi
            DIFF_HEAD=${{ github.sha }}
          fi
          DIRS=$(git diff --name-only "$BASE" "$DIFF_HEAD" \
            | grep '^templates/' \
            | grep -v '\.md$' \
            | awk -F/ '{print $1"/"$2}' \
            | sort -u \
            | jq -Rnc '[inputs | select(length>0)]')
          echo "templates=$DIRS" >> $GITHUB_OUTPUT
          echo "has_templates=$([ "$DIRS" = "[]" ] && echo false || echo true)" >> $GITHUB_OUTPUT
          echo "Changed templates: $DIRS"

      - name: Add Hold Label
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        run: gh pr edit ${{ github.event.number }} --add-label "hold"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove repo-agent Label on Start
        if: github.event_name == 'pull_request' && github.event.action != 'closed'
        run: gh pr edit ${{ github.event.number }} --remove-label "repo-agent" || true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Lint / static analysis (PR + push) ────────────────────────────────
  lint-agent-infra:
    name: "Lint Agent Infra"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Run Thorough Linting
        run: |
          chmod +x agent-infra/local-lint.sh
          ./agent-infra/local-lint.sh agent-infra

  lint:
    name: "Lint (${{ matrix.template }})"
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Run Thorough Linting
        run: |
          chmod +x agent-infra/local-lint.sh
          ./agent-infra/local-lint.sh ${{ matrix.template }}

      - name: Helm template (render + validate YAML)
        if: "hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''"
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then exit 0; fi
          for chart in $CHARTS; do
            echo "=== helm template: $chart ==="
            helm template release "$chart" > /tmp/helm-rendered.yaml
            python3 -c "
          import yaml, sys
          docs = list(yaml.safe_load_all(open('/tmp/helm-rendered.yaml')))
          docs = [d for d in docs if d]
          print(f'Rendered {len(docs)} Kubernetes objects from chart')
          kinds = sorted(set(d.get(\"kind\",\"Unknown\") for d in docs))
          print('Kinds:', ', '.join(kinds))
            "
          done

      - name: KCC manifest syntax check
        if: "hashFiles(format('{0}/config-connector/**', matrix.template)) != ''"
        run: |
          python3 -c "
          import yaml, sys, pathlib, os
          errors = []
          for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml'):
              try:
                  yaml.safe_load_all(p.read_text())
              except yaml.YAMLError as e:
                  errors.append(str(p) + ': ' + str(e))
          if errors:
              print('YAML errors found:')
              for e in errors: print(' ', e)
              sys.exit(1)
          print('All KCC manifests parse OK')
          "

      - name: Report lint failure to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `### CI Lint failure: \`${template}\``,
                ``,
                `One or more lint checks failed — see [run logs](${runUrl}) for the exact error.`,
                ``,
                `Please investigate the lint failure, fix the issue, and push a new commit.`,
              ].join('\n'),
            });

  # ── 3. Pre-deploy Quota Cleanup ──────────────────────────────────────────
  pre-cleanup:
    name: "Quota Cleanup"
    needs: [ detect-changes ]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Run Cleanup Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x agent-infra/cleanup-resources.sh
          ./agent-infra/cleanup-resources.sh

  # ── 4a. PR: TF+Helm Validation (Atomic) ──────────────────────────────────
  tf-validate-pr:
    name: "Validate TF PR (${{ matrix.template }})"
    needs: [ detect-changes, lint, pre-cleanup ]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Break stale TF state lock
        if: "hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''"
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          gsutil rm "gs://${TF_STATE_BUCKET}/${{ matrix.template }}-${{ github.run_id }}/terraform-helm/default.tflock" \
            2>/dev/null && echo "Stale state lock removed" || echo "No stale lock present"

      - name: Terraform apply
        id: tf-apply
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          export TF_VAR_cluster_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-subnet"
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm"
          terraform apply -auto-approve -input=false
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> $GITHUB_ENV
          echo "tf_location=${LOCATION}" >> $GITHUB_ENV

      - name: Get TF credentials
        if: steps.tf-apply.outcome == 'success' && env.tf_cluster != ''
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.tf_cluster }}
          location: ${{ env.tf_location }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Wait for Gateway API CRDs
        if: steps.tf-apply.outcome == 'success' && env.tf_cluster != '' && contains(matrix.template, 'topology-aware-routing')
        run: |
          echo "Waiting for Gateway API CRDs to be ready..."
          for i in {1..12}; do
            if kubectl get crd gateways.gateway.networking.k8s.io >/dev/null 2>&1; then
              echo "Gateway API CRDs found."
              break
            fi
            echo "Waiting for Gateway API CRDs (attempt $i/12)..."
            sleep 10
          done

      - name: Helm deploy and verify
        if: steps.tf-apply.outcome == 'success' && env.tf_cluster != ''
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then echo "No Helm charts found"; else
            TIMEOUT="60m"
            [ -f "${{ matrix.template }}/.timeout" ] && TIMEOUT=$(cat ${{ matrix.template }}/.timeout)
            for chart in $CHARTS; do
              # Apply CRDs first with server-side apply to handle large ones (Helm 3 doesn't support --server-side)
              if [ -d "$chart/crds" ]; then
                echo "Applying CRDs from $chart/crds using server-side apply..."
                kubectl apply --server-side -f "$chart/crds" --recursive
              fi
              helm upgrade --install release "$chart" --wait --timeout="$TIMEOUT"
            done
          fi
          if [ -f "${{ matrix.template }}/validate.sh" ]; then
            export CLUSTER_NAME="${{ env.tf_cluster }}"
            export REGION="${{ env.tf_location }}"
            chmod +x ${{ matrix.template }}/validate.sh
            ./${{ matrix.template }}/validate.sh
          fi

      - name: Cleanup (Helm uninstall + TF destroy)
        if: always() && steps.tf-apply.outcome != 'skipped'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          if [ -n "${{ env.tf_cluster }}" ]; then
            helm uninstall release --wait --timeout=5m || true
            if kubectl get crd gateways.gateway.networking.k8s.io >/dev/null 2>&1; then
              kubectl delete gateway --all -A --wait=true --timeout=2m || true
            fi
            kubectl delete ingress --all -A --wait=true --timeout=2m || true
          fi
          terraform destroy -auto-approve -input=false || true

      - name: Fallback gcloud cluster delete
        if: always() && steps.tf-apply.outcome == 'success' && env.tf_cluster != ''
        run: |
          gcloud container clusters delete "${{ env.tf_cluster }}" \
            --location="${{ env.tf_location }}" \
            --project="${{ env.PROJECT_ID }}" --quiet --async || true

  # ── 4b. PR: KCC Validation (Atomic) ──────────────────────────────────────
  kcc-validate-pr:
    name: "Validate KCC PR (${{ matrix.template }})"
    needs: [ detect-changes, lint, pre-cleanup ]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4

      - name: Auth and Setup GKE
        uses: ./.github/actions/gcp-gke-auth
        with:
          wif_provider: ${{ env.WIF_PROVIDER }}
          wif_service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Get KCC management cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply KCC manifests
        id: kcc-apply
        if: "hashFiles(format('{0}/config-connector/**', matrix.template)) != ''"
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          find ${{ matrix.template }}/config-connector -type f -name "*.yaml" -exec sed -i "s/$(basename ${{ matrix.template }})/$(basename ${{ matrix.template }})-${UID_SUFFIX}/g" {} +
          kubectl apply -n $KCC_NAMESPACE -f ${{ matrix.template }}/config-connector/

      - name: Wait for KCC resources Ready
        if: steps.kcc-apply.outcome == 'success'
        run: |
          kubectl wait -n $KCC_NAMESPACE --for=condition=Ready --all --timeout=3600s -f ${{ matrix.template }}/config-connector/

      - name: Get KCC Workload Cluster Info and Validate
        if: steps.kcc-apply.outcome == 'success'
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          CLUSTER_NAME=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          LOCATION=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} -o jsonpath='{.items[0].spec.location}' 2>/dev/null || true)
          
          if [ -n "$CLUSTER_NAME" ]; then
            gcloud container clusters get-credentials "$CLUSTER_NAME" --location "$LOCATION" --project ${{ env.PROJECT_ID }}
            if [ -f "${{ matrix.template }}/validate.sh" ]; then
              export CLUSTER_NAME="$CLUSTER_NAME"
              export REGION="$LOCATION"
              chmod +x ${{ matrix.template }}/validate.sh
              ./${{ matrix.template }}/validate.sh
            fi
          fi

      - name: Delete KCC resources
        if: always() && steps.kcc-apply.outcome == 'success'
        run: |
          kubectl delete -n $KCC_NAMESPACE -f ${{ matrix.template }}/config-connector/ --wait=true --timeout=900s || true

  # ── 4c. PR close: cleanup orphaned infra ──────────────────────────────────
  cleanup-pr-infra:
    name: "Cleanup orphaned PR infra (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Install GKE Auth Plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Setup Terraform
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform cleanup
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          export TF_VAR_cluster_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-subnet"
          terraform init -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm" -input=false 2>/dev/null || exit 0
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || true)
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || true)
          if [ -n "$CLUSTER" ]; then
            gcloud container clusters update "$CLUSTER" --location="$LOCATION" --project="${{ env.PROJECT_ID }}" --no-enable-deletion-protection --quiet || true
          fi
          terraform destroy -auto-approve -input=false || true

      - name: KCC cleanup
        if: "hashFiles(format('{0}/config-connector/**', matrix.template)) != ''"
        run: |
          gcloud container clusters get-credentials ${{ env.KCC_CLUSTER }} --location ${{ env.KCC_REGION }} --project ${{ env.PROJECT_ID }}
          kubectl delete -n ${{ env.KCC_NAMESPACE }} -f ${{ matrix.template }}/config-connector/ --ignore-not-found --wait=false || true

  # ── 5a. Post-merge: Validate TF+Helm (Main) ──────────────────────────────
  validate-tf-helm:
    name: "Validate TF+Helm (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Skip check
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          if [ ! -f "${TEMPLATE}/.validated" ]; then echo "skip=false" >> $GITHUB_OUTPUT; exit 0; fi
          VALIDATED_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}' || true)
          [ -z "$VALIDATED_COMMIT" ] && echo "skip=false" >> $GITHUB_OUTPUT || echo "skip=$(git diff --name-only "$VALIDATED_COMMIT" HEAD -- "${TEMPLATE}/" | grep -v '\.validated$' | grep -v 'README\.md$' >/dev/null && echo false || echo true)" >> $GITHUB_OUTPUT

      - name: Auth
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Install Plugin
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin
      - name: Setup TF
        if: steps.skip-check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3
      - name: Break lock
        if: steps.skip-check.outputs.skip != 'true' && hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          gsutil rm "gs://${TF_STATE_BUCKET}/${{ matrix.template }}-${{ github.run_id }}/terraform-helm/default.tflock" 2>/dev/null || true
      - name: Apply
        id: tf-apply
        if: steps.skip-check.outputs.skip != 'true' && hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          export TF_VAR_cluster_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-subnet"
          terraform init -backend-config="bucket=$TF_STATE_BUCKET" -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm"
          terraform apply -auto-approve -input=false
      - name: Outputs
        id: tf-outputs
        if: steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          echo "tf_duration=$(( $(date -u +%s) - ${TF_START} ))" >> $GITHUB_OUTPUT
          echo "tf_cluster=$(terraform output -raw cluster_name 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          echo "tf_location=$(terraform output -raw cluster_location 2>/dev/null || echo '')" >> $GITHUB_OUTPUT
          [ -n "$(terraform output -raw cluster_name 2>/dev/null || echo '')" ] && echo "tf_zones=$(gcloud container clusters describe $(terraform output -raw cluster_name) --location=$(terraform output -raw cluster_location) --format='value(locations)' | tr ';' ', ')" >> $GITHUB_OUTPUT || true
      - name: Creds
        if: steps.tf-outputs.outcome == 'success' && steps.tf-outputs.outputs.tf_cluster != ''
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.tf-outputs.outputs.tf_cluster }}
          location: ${{ steps.tf-outputs.outputs.tf_location }}
          project_id: ${{ env.PROJECT_ID }}
      - name: Verify
        if: steps.tf-outputs.outputs.tf_cluster != ''
        run: kubectl get nodes
      - name: Deploy
        if: steps.tf-outputs.outputs.tf_cluster != '' && hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          TIMEOUT="60m"; [ -f "${{ matrix.template }}/.timeout" ] && TIMEOUT=$(cat ${{ matrix.template }}/.timeout)
          for chart in $CHARTS; do
            if [ -d "$chart/crds" ]; then
              echo "Applying CRDs from $chart/crds using server-side apply..."
              kubectl apply --server-side -f "$chart/crds" --recursive
            fi
            helm upgrade --install release "$chart" --wait --timeout="$TIMEOUT"
          done
          [ -f "${{ matrix.template }}/validate.sh" ] && { export CLUSTER_NAME="${{ steps.tf-outputs.outputs.tf_cluster }}"; export REGION="${{ steps.tf-outputs.outputs.tf_location }}"; chmod +x ${{ matrix.template }}/validate.sh; ./${{ matrix.template }}/validate.sh; }
      - name: Teardown
        if: always() && steps.tf-apply.outcome != 'skipped'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          if [ -n "${{ steps.tf-outputs.outputs.tf_cluster }}" ]; then
            helm uninstall release --wait --timeout=5m || true
            if kubectl get crd gateways.gateway.networking.k8s.io >/dev/null 2>&1; then
              kubectl delete gateway --all -A --wait=true --timeout=2m || true
            fi
            kubectl delete ingress --all -A --wait=true --timeout=2m || true
          fi
          terraform destroy -auto-approve -input=false || true
      - name: Fallback
        if: always() && steps.tf-apply.outcome == 'success' && steps.tf-outputs.outputs.tf_cluster != ''
        run: gcloud container clusters delete "${{ steps.tf-outputs.outputs.tf_cluster }}" --location="${{ steps.tf-outputs.outputs.tf_location }}" --project="${{ env.PROJECT_ID }}" --quiet --async || true
      - name: Results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/tf-results
          echo "{\"status\": \"${{ job.status }}\", \"duration\": \"${{ steps.tf-outputs.outputs.tf_duration }}\", \"cluster\": \"${{ steps.tf-outputs.outputs.tf_cluster }}\", \"location\": \"${{ steps.tf-outputs.outputs.tf_location }}\", \"zones\": \"${{ steps.tf-outputs.outputs.tf_zones }}\"}" > /tmp/tf-results/result.json
      - name: Upload
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with: { name: "tf-results-${{ github.run_id }}-${{ strategy.job-index }}", path: "/tmp/tf-results/result.json" }

  # ── 5b. Post-merge: Validate KCC (Main) ──────────────────────────────────
  validate-kcc:
    name: "Validate KCC (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}
    steps:
      - uses: actions/checkout@v4
      - name: Skip check
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          if [ ! -f "${TEMPLATE}/.validated" ]; then echo "skip=false" >> $GITHUB_OUTPUT; exit 0; fi
          VALIDATED_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}' || true)
          [ -z "$VALIDATED_COMMIT" ] && echo "skip=false" >> $GITHUB_OUTPUT || echo "skip=$(git diff --name-only "$VALIDATED_COMMIT" HEAD -- "${TEMPLATE}/" | grep -v '\.validated$' | grep -v 'README\.md$' >/dev/null && echo false || echo true)" >> $GITHUB_OUTPUT
      - name: Auth
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with: { workload_identity_provider: "${{ env.WIF_PROVIDER }}", service_account: "${{ env.WIF_SERVICE_ACCOUNT }}" }
      - name: Plugin
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin
      - name: Creds
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with: { cluster_name: "${{ env.KCC_CLUSTER }}", location: "${{ env.KCC_REGION }}", project_id: "${{ env.PROJECT_ID }}" }
      - name: Apply
        id: kcc-apply
        if: steps.skip-check.outputs.skip != 'true' && hashFiles(format('{0}/config-connector/**', matrix.template)) != ''
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          echo "KCC_START=$(date -u +%s)" >> $GITHUB_ENV
          find ${{ matrix.template }}/config-connector -type f -name "*.yaml" -exec sed -i "s/$(basename ${{ matrix.template }})/$(basename ${{ matrix.template }})-${UID_SUFFIX}/g" {} +
          kubectl apply -n $KCC_NAMESPACE -f ${{ matrix.template }}/config-connector/
      - name: Wait
        id: kcc-wait
        if: steps.kcc-apply.outcome == 'success'
        run: |
          kubectl wait -n $KCC_NAMESPACE --for=condition=Ready --all --timeout=3600s -f ${{ matrix.template }}/config-connector/
          echo "kcc_duration=$(( $(date -u +%s) - ${KCC_START} ))" >> $GITHUB_OUTPUT
      - name: Workload
        if: steps.kcc-wait.outcome == 'success'
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          CLUSTER_NAME=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          LOCATION=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} -o jsonpath='{.items[0].spec.location}' 2>/dev/null || true)
          if [ -n "$CLUSTER_NAME" ]; then
            gcloud container clusters get-credentials "$CLUSTER_NAME" --location "$LOCATION" --project ${{ env.PROJECT_ID }}
            [ -f "${{ matrix.template }}/validate.sh" ] && { export CLUSTER_NAME="$CLUSTER_NAME"; export REGION="$LOCATION"; chmod +x ${{ matrix.template }}/validate.sh; ./${{ matrix.template }}/validate.sh; }
          fi
      - name: Teardown
        if: always() && steps.kcc-apply.outcome == 'success'
        run: |
          gcloud container clusters get-credentials ${{ env.KCC_CLUSTER }} --location ${{ env.KCC_REGION }} --project ${{ env.PROJECT_ID }}
          kubectl delete -n $KCC_NAMESPACE -f ${{ matrix.template }}/config-connector/ --wait=true --timeout=900s || true
      - name: Results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/kcc-results
          echo "{\"status\": \"${{ job.status }}\", \"duration\": \"${{ steps.kcc-wait.outputs.kcc_duration }}\"}" > /tmp/kcc-results/result.json
      - name: Upload
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with: { name: "kcc-results-${{ github.run_id }}-${{ strategy.job-index }}", path: "/tmp/kcc-results/result.json" }

  publish-validated:
    name: "Publish (${{ matrix.template }})"
    needs: [detect-changes, validate-tf-helm, validate-kcc]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CODEBOT_PAT }}

      - name: Download TF results artifact
        uses: actions/download-artifact@v4
        with:
          pattern: tf-results-${{ github.run_id }}-*
          merge-multiple: true
          path: /tmp/tf-artifacts/
        continue-on-error: true

      - name: Download KCC results artifact
        uses: actions/download-artifact@v4
        with:
          pattern: kcc-results-${{ github.run_id }}-*
          merge-multiple: true
          path: /tmp/kcc-artifacts/
        continue-on-error: true

      - name: Update README and mark validated
        env:
          TF_JOB_RESULT:  ${{ needs.validate-tf-helm.result }}
          KCC_JOB_RESULT: ${{ needs.validate-kcc.result }}
        run: |
          set -e
          TEMPLATE="${{ matrix.template }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE=$(date -u +"%Y-%m-%d")
          COMMIT=${{ github.sha }}

          # Parse per-template artifact results (fall back to job-level result)
          TF_RESULT_FILE=$(ls /tmp/tf-artifacts/result.json 2>/dev/null | head -1 || true)
          KCC_RESULT_FILE=$(ls /tmp/kcc-artifacts/result.json 2>/dev/null | head -1 || true)

          if [ -n "$TF_RESULT_FILE" ]; then
            TF_STATUS=$(python3  -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('status',''))")
            TF_DURATION=$(python3 -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('duration',''))")
            TF_CLUSTER=$(python3  -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('cluster',''))")
            TF_LOCATION=$(python3 -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('location',''))")
            TF_ZONES=$(python3    -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('zones',''))")
          else
            TF_STATUS="$TF_JOB_RESULT"; TF_DURATION=""; TF_CLUSTER=""; TF_LOCATION=""; TF_ZONES=""
          fi

          if [ -n "$KCC_RESULT_FILE" ]; then
            KCC_STATUS=$(python3   -c "import json; d=json.load(open('$KCC_RESULT_FILE')); print(d.get('status',''))")
            KCC_DURATION=$(python3 -c "import json; d=json.load(open('$KCC_RESULT_FILE')); print(d.get('duration',''))")
          else
            KCC_STATUS="$KCC_JOB_RESULT"; KCC_DURATION=""
          fi

          fmt_duration() { local s=$1; [ -z "$s" ] && echo "n/a" || echo "$((s/60))m $((s%60))s"; }
          TF_DUR=$(fmt_duration "$TF_DURATION")
          KCC_DUR=$(fmt_duration "$KCC_DURATION")
          REGION="${TF_LOCATION:-us-central1}"
          ZONES="${TF_ZONES:-${REGION}}"

          README="${TEMPLATE}/README.md"
          if [ ! -f "$README" ]; then
            printf "# %s\n\n> README auto-generated by CI.\n" "$(basename $TEMPLATE)" > "$README"
          fi

          # Strip any existing validation record section
          python3 -c "
          import sys, re
          content = open(sys.argv[1]).read()
          content = re.sub(r'\n## Validation Record.*', '', content, flags=re.DOTALL).rstrip()
          open(sys.argv[1], 'w').write(content)
          " "$README"

          # Accumulate agent metrics across all sandbox sessions.
          python3 - "$TEMPLATE" << 'ACCUMPY'
          import json, os, sys, datetime
          template = sys.argv[1]
          metrics_file      = f'{template}/.agent-metrics'
          cumulative_file   = f'{template}/.agent-metrics-cumulative'

          current = {}
          if os.path.exists(metrics_file):
              try:    current = json.load(open(metrics_file))
              except: pass

          cumulative = {'total_input_tokens': 0, 'total_output_tokens': 0,
                        'total_cost_usd': 0.0, 'sessions': []}
          if os.path.exists(cumulative_file):
              try:    cumulative = json.load(open(cumulative_file))
              except: pass

          session_start    = current.get('session_start', '')
          already_counted  = session_start and any(
              s.get('session_start') == session_start
              for s in cumulative.get('sessions', [])
          )

          if session_start and not already_counted:
              in_tok  = current.get('input_tokens')
              out_tok = current.get('output_tokens')
              cost    = float(current.get('estimated_cost_usd') or 0)
              if isinstance(in_tok, (int, float)) and in_tok:
                  cumulative['total_input_tokens']  += int(in_tok)
                  cumulative['total_output_tokens'] += int(out_tok or 0)
                  cumulative['total_cost_usd']       = round(
                      cumulative['total_cost_usd'] + cost, 4)
                  cumulative.setdefault('sessions', []).append({
                      'session_start':     session_start,
                      'input_tokens':      int(in_tok),
                      'output_tokens':     int(out_tok or 0),
                      'estimated_cost_usd': str(cost),
                      'model':             current.get('model', ''),
                      'counted_at':        datetime.datetime.now(
                          datetime.timezone.utc).isoformat()
                  })
                  json.dump(cumulative, open(cumulative_file, 'w'), indent=2)
                  print(f"Counted session {session_start}: "
                        f"{in_tok:,}+{out_tok:,} tokens, ${cost}")
              else:
                  print("Session tokens are null — skipping accumulation")
          elif already_counted:
              print(f"Session {session_start} already counted — skipping")
          else:
              print("No session_start in .agent-metrics — skipping")
          ACCUMPY

          # Read cumulative totals for README display
          eval "$(python3 - "$TEMPLATE" << 'READPY'
          import json, os, sys
          template = sys.argv[1]
          f = f'{template}/.agent-metrics-cumulative'
          d = json.load(open(f)) if os.path.exists(f) else {}
          n      = len(d.get('sessions', []))
          in_t   = d.get('total_input_tokens',  0)
          out_t  = d.get('total_output_tokens', 0)
          cost   = d.get('total_cost_usd',      0.0)
          if n > 0 and in_t > 0:
              suffix = f" ({n} session{'s' if n != 1 else ''})"
              print(f'INPUT_TOKENS="{in_t:,}"')
              print(f'OUTPUT_TOKENS="{out_t:,}"')
              print(f'AGENT_COST="{cost}"')
              print(f'SESSION_SUFFIX="{suffix}"')
          else:
              print('INPUT_TOKENS=""')
              print('OUTPUT_TOKENS=""')
              print('AGENT_COST=""')
              print('SESSION_SUFFIX=""')
          READPY
          )"
          TOKEN_STR="${INPUT_TOKENS:+${INPUT_TOKENS} in / ${OUTPUT_TOKENS} out${SESSION_SUFFIX}}"
          TOKEN_STR="${TOKEN_STR:-not recorded}"
          COST_STR="${AGENT_COST:+\$${AGENT_COST}}"
          COST_STR="${COST_STR:--}"

          python3 - "$README" "$DATE" "$TF_STATUS" "$KCC_STATUS" "$TF_DUR" "$KCC_DUR" \
              "$REGION" "$ZONES" "${TF_CLUSTER:---}" "${COMMIT:0:8}" \
              "$TOKEN_STR" "$COST_STR" << 'PYEOF'
          import sys
          readme, date, tf_s, kcc_s, tf_d, kcc_d, region, zones, cluster, commit, tokens, cost = sys.argv[1:]
          sep = " | "
          rows = [
              ("**Status**",         tf_s,      kcc_s),
              ("**Date**",           date,      date),
              ("**Duration**",       tf_d,      kcc_d),
              ("**Region**",         region,    "us-central1 (KCC cluster)"),
              ("**Zones**",          zones,     "forge-management namespace"),
              ("**Cluster**",        cluster,   "krmapihost-kcc-instance"),
              ("**Agent tokens**",   tokens,    "(shared session)"),
              ("**Estimated cost**", cost,      "--"),
              ("**Commit**",         commit,    commit),
          ]
          header = sep.join(["", "", "Terraform + Helm", "Config Connector", ""]).strip()
          divider = sep.join(["", "---", "---", "---", ""]).strip()
          lines = ["\n\n## Validation Record\n", header, divider]
          for label, tf_val, kcc_val in rows:
              lines.append(sep.join(["", label, tf_val, kcc_val, ""]).strip())
          lines.append("")
          with open(readme, "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

          printf "validated_at: %s\ncommit: %s\ntf_helm: %s\nkcc: %s\n" \
            "$TIMESTAMP" "$COMMIT" "$TF_STATUS" "$KCC_STATUS" \
            > "${TEMPLATE}/.validated"

          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@users.noreply.github.com"
          cp "${TEMPLATE}/README.md" /tmp/ci-readme.md
          cp "${TEMPLATE}/.validated" /tmp/ci-validated.md
          [ -f "${TEMPLATE}/.agent-metrics-cumulative" ] && \
            cp "${TEMPLATE}/.agent-metrics-cumulative" /tmp/ci-metrics-cumulative.json || true
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/ci-readme.md "${TEMPLATE}/README.md"
          cp /tmp/ci-validated.md "${TEMPLATE}/.validated"
          [ -f /tmp/ci-metrics-cumulative.json ] && \
            cp /tmp/ci-metrics-cumulative.json "${TEMPLATE}/.agent-metrics-cumulative" || true
          git add "${TEMPLATE}/README.md" "${TEMPLATE}/.validated"
          [ -f "${TEMPLATE}/.agent-metrics-cumulative" ] && \
            git add "${TEMPLATE}/.agent-metrics-cumulative"
          git commit -m "ci: validate ${TEMPLATE} [skip ci]" || true
          git push

  # ── 6. PR Completion Marker ──────────────────────────────────────────────
  pr-completion:
    name: "PR Completion"
    needs: [detect-changes, lint, pre-cleanup, tf-validate-pr, kcc-validate-pr]
    if: always() && github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Label on failure
        if: failure()
        run: gh pr edit ${{ github.event.number }} --add-label "repo-agent"
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }
      - name: Remove Hold on Success
        if: success()
        run: gh pr edit ${{ github.event.number }} --remove-label "hold"
        env: { GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}" }

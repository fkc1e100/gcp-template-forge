name: Sandbox Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'templates/**'
      - 'agent-infra/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write
  actions: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  # Inject project-specific values so variables.tf has no hardcoded defaults
  TF_VAR_project_id: gca-gke-2025
  TF_VAR_service_account: forge-builder@gca-gke-2025.iam.gserviceaccount.com

jobs:
  # ── 1. Detect which templates changed ────────────────────────────────────
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      templates: ${{ steps.find.outputs.templates }}
      has_templates: ${{ steps.find.outputs.has_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed template directories
        id: find
        run: |
          git fetch origin ${{ github.base_ref }}
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_HEAD="${{ github.event.pull_request.head.sha }}"
            BASE=$(git merge-base "origin/${{ github.base_ref }}" "$PR_HEAD")
            DIFF_HEAD="$PR_HEAD"
          else
            # For push, use the 'before' SHA, or HEAD^1 if missing (first push)
            BASE="${{ github.event.before }}"
            if [ -z "$BASE" ] || [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
              BASE=$(git rev-parse HEAD~1 2>/dev/null || git rev-list --max-parents=0 HEAD)
            fi
            DIFF_HEAD=${{ github.sha }}
          fi
          DIRS=$(git diff --name-only "$BASE" "$DIFF_HEAD" \
            | grep '^templates/' \
            | awk -F/ '{print $1"/"$2}' \
            | sort -u \
            | jq -Rnc '[inputs | select(length>0)]')
          echo "templates=$DIRS" >> $GITHUB_OUTPUT
          echo "has_templates=$([ "$DIRS" = "[]" ] && echo false || echo true)" >> $GITHUB_OUTPUT
          echo "Changed templates: $DIRS"

      - name: Add Hold Label
        if: github.event_name == 'pull_request'
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "hold"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Lint / static analysis (PR + push) ────────────────────────────────
  lint-agent-infra:
    name: "Lint Agent Infra"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Run Thorough Linting
        run: |
          chmod +x agent-infra/local-lint.sh
          ./agent-infra/local-lint.sh agent-infra

  lint:
    name: "Lint (${{ matrix.template }})"
    needs: detect-changes
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: true
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Run Thorough Linting
        run: |
          chmod +x agent-infra/local-lint.sh
          ./agent-infra/local-lint.sh ${{ matrix.template }}

      - name: Helm template (render + validate YAML)
        if: "hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''"
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then exit 0; fi
          for chart in $CHARTS; do
            echo "=== helm template: $chart ==="
            helm template release "$chart" > /tmp/helm-rendered.yaml
            # Validate the rendered YAML parses cleanly
            python3 -c "
          import yaml, sys
          docs = list(yaml.safe_load_all(open('/tmp/helm-rendered.yaml')))
          docs = [d for d in docs if d]
          print(f'Rendered {len(docs)} Kubernetes objects from chart')
          kinds = sorted(set(d.get(\"kind\",\"Unknown\") for d in docs))
          print('Kinds:', ', '.join(kinds))
            "
          done

      - name: KCC manifest syntax check
        if: "hashFiles(format('{0}/config-connector/**', matrix.template)) != ''"
        run: |
          # Basic YAML syntax validation
          python3 -c "
          import yaml, sys, pathlib, os
          errors = []
          for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml'):
              try:
                  yaml.safe_load_all(p.read_text())
              except yaml.YAMLError as e:
                  errors.append(str(p) + ': ' + str(e))
          if errors:
              print('YAML errors found:')
              for e in errors: print(' ', e)
              sys.exit(1)
          print('All KCC manifests parse OK')
          "


      - name: Check deletion_protection = false
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        run: |
          if grep -r 'google_container_cluster' ${{ matrix.template }}/terraform-helm/ >/dev/null 2>&1; then
            if ! grep -r 'deletion_protection.*=.*false' ${{ matrix.template }}/terraform-helm/ >/dev/null 2>&1; then
              echo "ERROR: google_container_cluster found without deletion_protection = false"
              exit 1
            fi
          fi

      - name: Check no KCC abandon annotations
        if: "hashFiles(format('{0}/config-connector', matrix.template)) != ''"
        run: |
          if grep -r 'deletion-policy.*abandon' ${{ matrix.template }}/config-connector/ >/dev/null 2>&1; then
            echo "ERROR: cnrm.cloud.google.com/deletion-policy: abandon found -- this orphans GCP resources"
            exit 1
          fi

      - name: Check no lifecycle prevent_destroy
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        run: |
          if grep -r 'prevent_destroy\s*=\s*true' ${{ matrix.template }}/terraform-helm/ >/dev/null 2>&1; then
            echo "ERROR: lifecycle prevent_destroy = true found — this blocks automated teardown"
            exit 1
          fi

      - name: Report lint failure to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `### CI Lint failure: \`${template}\``,
                ``,
                `One or more lint checks failed — see [run logs](${runUrl}) for the exact error.`,
                ``,
                `**Common causes:**`,
                `- Template directory named \`Terraform_HELM/\` or similar instead of \`terraform-helm/\``,
                `- \`google_container_cluster\` missing \`deletion_protection = false\``,
                `- Terraform fmt or validate error`,
                `- KCC manifest YAML syntax error`,
                ``,
                `Please investigate the lint failure, fix the issue, and push a new commit.`,
              ].join('\n'),
            });

  # ── 3. Pre-deploy Quota Cleanup ──────────────────────────────────────────
  pre-cleanup:
    name: "Quota Cleanup"
    needs: [ detect-changes ]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}
      - name: Run Cleanup Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x agent-infra/cleanup-resources.sh
          ./agent-infra/cleanup-resources.sh

  # ── 4. PR deploy-and-test: full apply+verify+destroy ─────────────────────
  # ── 4a. PR: TF+Helm deploy → verify → destroy (parallel with deploy-test-kcc) ──
  deploy-test-tf:
    name: "Deploy & Test TF+Helm (${{ matrix.template }})"
    needs: [ detect-changes, lint, pre-cleanup ]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install GKE Auth Plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Break stale TF state lock (if any)
        if: "hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''"
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          gsutil rm "gs://${TF_STATE_BUCKET}/${{ matrix.template }}-${{ github.run_id }}/terraform-helm/default.tflock" \
            2>/dev/null && echo "Stale state lock removed" || echo "No stale lock present"

      - name: Terraform apply
        id: tf-apply
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          export TF_VAR_cluster_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-subnet"
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm"
          terraform apply -auto-approve -input=false

      - name: Capture Terraform outputs
        id: tf-outputs
        if: steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          TF_DURATION=$(( $(date -u +%s) - ${TF_START} ))
          echo "tf_duration=${TF_DURATION}" >> $GITHUB_OUTPUT
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "tf_location=${LOCATION}" >> $GITHUB_OUTPUT

      - name: Get TF cluster credentials
        id: tf-creds
        if: >-
          steps.tf-outputs.outcome == 'success' &&
          steps.tf-outputs.outputs.tf_cluster != ''
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.tf-outputs.outputs.tf_cluster }}
          location: ${{ steps.tf-outputs.outputs.tf_location }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Verify Terraform cluster is RUNNING
        id: tf-verify
        if: steps.tf-creds.outcome == 'success'
        run: |
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          kubectl get nodes
          gcloud container clusters describe "$CLUSTER" --location="$LOCATION" \
            --format="value(status)" | grep -q RUNNING

      - name: Set up Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Helm deploy and verify
        id: helm-deploy
        if: >-
          steps.tf-verify.outcome == 'success' &&
          hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then echo "No Helm charts found -- skipping"; exit 0; fi
          TIMEOUT="60m"
          if [ -f "${{ matrix.template }}/.timeout" ]; then
            TIMEOUT=$(cat ${{ matrix.template }}/.timeout)
          fi
          for chart in $CHARTS; do
            echo "=== Helm deploy: $chart ==="
            helm upgrade --install release "$chart" --wait --timeout="$TIMEOUT"
          done

          # Run template-specific validation if present
          if [ -f "${{ matrix.template }}/validate.sh" ]; then
            echo "=== Running template-specific validation: ${{ matrix.template }}/validate.sh ==="
            RUN_ID="${{ github.run_id }}"
            UID_SUFFIX="${RUN_ID: -6}"
            export CLUSTER_NAME="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf"
            chmod +x ${{ matrix.template }}/validate.sh
            ./${{ matrix.template }}/validate.sh
          fi


      - name: Security scan — GCP native (On-Demand Scanning + Security Posture)
        id: security-scan
        continue-on-error: true
        if: steps.tf-verify.outcome == 'success'
        run: |
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          PROJECT="${{ env.PROJECT_ID }}"
          SCAN_WARNINGS=0

          # ── GKE Security Posture ─────────────────────────────────────────
          echo "=== GKE Security Posture configuration ==="
          gcloud container clusters describe "$CLUSTER" --location="$LOCATION" \
            --project="$PROJECT" --format="yaml(securityPostureConfig)"

          echo "=== GKE Security Posture findings (HIGH/CRITICAL) ==="
          POSTURE_OUT=$(gcloud beta container clusters list-security-posture-findings \
            "$CLUSTER" --location="$LOCATION" --project="$PROJECT" \
            --filter="severity=HIGH OR severity=CRITICAL" \
            --format="table(severity,findingType,resourceUri,description)" 2>/dev/null || true)
          echo "$POSTURE_OUT"
          if echo "$POSTURE_OUT" | grep -qiE 'HIGH|CRITICAL'; then
            echo "::warning::GKE Security Posture HIGH/CRITICAL findings detected"
            SCAN_WARNINGS=1
          fi

          # ── On-Demand Scanning: workload images ──────────────────────────
          echo "=== On-Demand Scanning: workload images ==="
          gcloud services enable ondemandscanning.googleapis.com \
            --project="$PROJECT" --quiet 2>/dev/null || true

          IMAGES=$(kubectl get pods --all-namespaces -o json 2>/dev/null \
            | jq -r '.items[] | select(.metadata.namespace | IN("kube-system","kube-public","kube-node-lease","gke-gmp-system","gke-managed-metrics-server","config-management-system") | not) | [(.spec.containers//[]),(.spec.initContainers//[])] | add//[] | .[].image' 2>/dev/null \
            | sort -u) || true

          if [ -z "$IMAGES" ]; then
            echo "No workload images found outside system namespaces — skipping image scan"
          else
            echo "Images to scan:"
            echo "$IMAGES"
            while IFS= read -r IMAGE; do
              [ -z "$IMAGE" ] && continue
              echo "--- Scanning: $IMAGE ---"
              SCAN_OUT=$(gcloud artifacts docker images scan "$IMAGE" --remote \
                --project="$PROJECT" --quiet 2>&1) || {
                echo "::warning::On-Demand Scan failed for $IMAGE"
                continue
              }
              echo "$SCAN_OUT"
              SCAN_NAME=$(echo "$SCAN_OUT" | grep '^name:' | head -1 | awk '{print $2}' || true)
              if [ -n "$SCAN_NAME" ]; then
                VULNS=$(gcloud artifacts docker images list-vulnerabilities "$SCAN_NAME" \
                  --project="$PROJECT" \
                  --filter="vulnerability.effectiveSeverity=HIGH OR vulnerability.effectiveSeverity=CRITICAL" \
                  --format="table(vulnerability.effectiveSeverity,vulnerability.packageIssue[0].affectedPackage,vulnerability.shortDescription)" \
                  2>/dev/null || true)
                if [ -n "$VULNS" ]; then
                  echo "$VULNS"
                  echo "::warning::HIGH/CRITICAL vulnerabilities in $IMAGE"
                  SCAN_WARNINGS=1
                else
                  echo "No HIGH/CRITICAL vulnerabilities found in $IMAGE"
                fi
              fi
            done <<< "$IMAGES"
          fi

          echo ""
          [ "$SCAN_WARNINGS" -eq 0 ] \
            && echo "Security scan complete — no HIGH/CRITICAL findings." \
            || echo "::warning::Security findings detected — review output above (non-blocking)"

      - name: Determine teardown scope
        id: teardown-check
        if: always()
        run: |
          # Destroy if TF apply itself failed (clean up partial state)
          # OR if all downstream verification passed (normal successful cleanup)
          # Leave cluster up if TF apply succeeded but a downstream step failed —
          # next push will terraform apply (no-op) and re-run the failing step.
          TF_APPLY="${{ steps.tf-apply.outcome }}"
          TF_VERIFY="${{ steps.tf-verify.outcome }}"
          HELM="${{ steps.helm-deploy.outcome }}"

          if [ "$TF_APPLY" = "failure" ]; then
            echo "should_destroy=true"  >> $GITHUB_OUTPUT
            echo "Reason: TF apply failed — destroying partial state"
          elif [ "$TF_VERIFY" = "success" ] && { [ "$HELM" = "success" ] || [ "$HELM" = "skipped" ]; }; then
            echo "should_destroy=true"  >> $GITHUB_OUTPUT
            echo "Reason: All verification passed — performing normal teardown"
          else
            echo "should_destroy=true" >> $GITHUB_OUTPUT
            echo "::notice::Forcing cluster teardown on failure. Deployments are now dynamic per commit."
          fi


      - name: Helm uninstall (teardown)
        if: always() && steps.teardown-check.outputs.should_destroy == 'true' && steps.tf-apply.outcome != 'skipped'
        run: |
          echo "Uninstalling Helm release to clean up NEGs and LoadBalancers..."
          helm uninstall release --wait --timeout=5m || true
          kubectl delete gateway,ingress --all -A --wait=true --timeout=2m || true
          echo "Waiting for NEGs to be cleaned up..."
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          NETWORK_NAME="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-vpc"
          for i in {1..20}; do
            NEGS=$(gcloud compute network-endpoint-groups list --filter="network:($NETWORK_NAME)" --project="${{ env.PROJECT_ID }}" --format="value(name)" 2>/dev/null || true)
            if [ -z "$NEGS" ]; then
              echo "All NEGs cleaned up."
              break
            fi
            echo "NEGs still exist. Waiting 15s..."
            sleep 15
          done

      - name: Terraform destroy
        id: tf-destroy
        if: always() && steps.teardown-check.outputs.should_destroy == 'true' && steps.tf-apply.outcome != 'skipped'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          terraform destroy -auto-approve -input=false || \
          terraform destroy -auto-approve -input=false

      - name: Fallback gcloud cluster delete
        if: always() && steps.teardown-check.outputs.should_destroy == 'true' && steps.tf-destroy.outcome == 'failure' && steps.tf-outputs.outputs.tf_cluster != ''
        run: |
          echo "terraform destroy failed — falling back to gcloud for cluster deletion"
          gcloud container clusters delete "${{ steps.tf-outputs.outputs.tf_cluster }}" \
            --location="${{ steps.tf-outputs.outputs.tf_location }}" \
            --project="${{ env.PROJECT_ID }}" --quiet --async || true
          echo "::warning::Cluster deletion initiated via gcloud fallback. VPC may need manual cleanup."

      - name: Post TF+Helm summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const tfResult = '${{ steps.tf-verify.outcome || 'skipped' }}';
            const helmResult = '${{ steps.helm-deploy.outcome || 'skipped' }}';
            const failed = [tfResult, helmResult].some(r => r === 'failure');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `### Deploy & Test TF+Helm: \`${template}\``,
              `| Step | Result |`,
              `|---|---|`,
              `| Terraform apply + cluster verify | **${tfResult}** |`,
              `| Helm deploy + verify | **${helmResult}** |`,
              ...(failed ? ['', `TF+Helm test failed — see [run logs](${runUrl}) for details.`] : []),
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Remove Hold Label on Failure
        if: failure() && github.event_name == 'pull_request'
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label "hold"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cancel workflow on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run cancel ${{ github.run_id }}

  # ── 4b. PR: KCC deploy → wait → delete (parallel with deploy-test-tf) ─────
  deploy-test-kcc:
    name: "Deploy & Test KCC (${{ matrix.template }})"
    needs: [ detect-changes, lint, pre-cleanup ]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install GKE Auth Plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply KCC manifests
        id: kcc-apply
        if: "hashFiles(format('{0}/config-connector/**', matrix.template)) != ''"
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          echo "KCC_START=$(date -u +%s)" >> $GITHUB_ENV
          find ${{ matrix.template }}/config-connector -type f -name "*.yaml" -exec sed -i "s/$(basename ${{ matrix.template }})/$(basename ${{ matrix.template }})-${UID_SUFFIX}/g" {} +
          kubectl apply -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/

      - name: Wait for KCC resources Ready
        id: kcc-wait
        if: steps.kcc-apply.outcome == 'success'
        run: |
          kubectl wait \
            -n $KCC_NAMESPACE \
            --for=condition=Ready \
            --all \
            --timeout=3600s \
            -f ${{ matrix.template }}/config-connector/
          echo "kcc_duration=$(( $(date -u +%s) - ${KCC_START} ))" >> $GITHUB_OUTPUT

      - name: Dump KCC Resource Status on Failure
        if: failure() && steps.kcc-wait.outcome == 'failure'
        run: |
          echo "KCC Wait failed. Dumping resource status..."
          kubectl get -n $KCC_NAMESPACE -f ${{ matrix.template }}/config-connector/ -o custom-columns=KIND:.kind,NAME:.metadata.name,READY:.status.conditions[?(@.type=="Ready")].status,REASON:.status.conditions[?(@.type=="Ready")].reason || true

      - name: Verify KCC ContainerCluster Ready
        id: kcc-cluster-ready
        if: steps.kcc-apply.outcome == 'success'
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          # Check if this template includes a ContainerCluster
          CLUSTER_COUNT=$(kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n $KCC_NAMESPACE --no-headers 2>/dev/null | wc -l || echo "0")

          if [ "$CLUSTER_COUNT" -eq 0 ]; then
            echo "No ContainerCluster resources — teardown can proceed"
            exit 0
          fi

          STATUS=$(kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} \
            -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' \
            2>/dev/null | tr ' ' '\n' | grep "True" | wc -l)

          if [ "$STATUS" -gt 0 ]; then
            echo "ContainerCluster is Ready — teardown can proceed"
          else
            echo "::notice::ContainerCluster not yet Ready — leaving KCC resources up for next iteration. Resources will be cleaned up on next successful run or PR close."
            exit 1
          fi

      - name: Get KCC Workload Cluster Info
        id: kcc-workload-info
        if: steps.kcc-wait.outcome == 'success' || steps.kcc-cluster-ready.outcome == 'success'
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          CLUSTER_COUNT=$(kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} --no-headers 2>/dev/null | wc -l || echo "0")
          if [ "$CLUSTER_COUNT" -eq 0 ]; then
             CLUSTER_COUNT=$(python3 -c "import yaml, pathlib; docs=[d for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml') if p.is_file() for d in yaml.safe_load_all(p.read_text()) if d and d.get('kind')=='ContainerCluster']; print(len(docs))")
          fi
          if [ "$CLUSTER_COUNT" -eq 0 ]; then
            echo "has_cluster=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CLUSTER_NAME=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          LOCATION=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} -o jsonpath='{.items[0].spec.location}' 2>/dev/null || true)
          if [ -z "$CLUSTER_NAME" ]; then
             CLUSTER_NAME=$(python3 -c "import yaml, pathlib; docs=[d for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml') if p.is_file() for d in yaml.safe_load_all(p.read_text()) if d and d.get('kind')=='ContainerCluster']; print(docs[0]['metadata']['name'] if docs else '')")
             LOCATION=$(python3 -c "import yaml, pathlib; docs=[d for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml') if p.is_file() for d in yaml.safe_load_all(p.read_text()) if d and d.get('kind')=='ContainerCluster']; print(docs[0]['spec']['location'] if docs else '')")
          fi
          echo "has_cluster=true" >> $GITHUB_OUTPUT
          echo "cluster_name=${CLUSTER_NAME}" >> $GITHUB_OUTPUT
          echo "location=${LOCATION}" >> $GITHUB_OUTPUT

      - name: Get KCC Workload Cluster Credentials
        id: kcc-workload-creds
        if: steps.kcc-workload-info.outputs.has_cluster == 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.kcc-workload-info.outputs.cluster_name }}
          location: ${{ steps.kcc-workload-info.outputs.location }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Helm (KCC)
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        if: steps.kcc-workload-creds.outcome == 'success'

      - name: Helm deploy and verify (KCC)
        id: helm-deploy-kcc
        if: steps.kcc-workload-creds.outcome == 'success' && hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then echo "No Helm charts found -- skipping"; exit 0; fi
          TIMEOUT="60m"
          if [ -f "${{ matrix.template }}/.timeout" ]; then
            TIMEOUT=$(cat ${{ matrix.template }}/.timeout)
          fi
          for chart in $CHARTS; do
            echo "=== Helm deploy: $chart ==="
            helm upgrade --install release "$chart" --wait --timeout="$TIMEOUT"
          done

          # Run template-specific validation if present
          if [ -f "${{ matrix.template }}/validate.sh" ]; then
            echo "=== Running template-specific validation (KCC): ${{ matrix.template }}/validate.sh ==="
            export CLUSTER_NAME="${{ steps.kcc-workload-info.outputs.cluster_name }}"
            chmod +x ${{ matrix.template }}/validate.sh
            ./${{ matrix.template }}/validate.sh
          fi


      - name: Security scan — GCP native (On-Demand Scanning + Security Posture) (KCC)
        id: security-scan-kcc
        continue-on-error: true
        if: steps.kcc-workload-creds.outcome == 'success'
        run: |
          CLUSTER="${{ steps.kcc-workload-info.outputs.cluster_name }}"
          LOCATION="${{ steps.kcc-workload-info.outputs.location }}"
          PROJECT="${{ env.PROJECT_ID }}"
          SCAN_WARNINGS=0

          echo "=== GKE Security Posture configuration ==="
          gcloud container clusters describe "$CLUSTER" --location="$LOCATION" \
            --project="$PROJECT" --format="yaml(securityPostureConfig)"

          echo "=== GKE Security Posture findings (HIGH/CRITICAL) ==="
          POSTURE_OUT=$(gcloud beta container clusters list-security-posture-findings \
            "$CLUSTER" --location="$LOCATION" --project="$PROJECT" \
            --filter="severity=HIGH OR severity=CRITICAL" \
            --format="table(severity,findingType,resourceUri,description)" 2>/dev/null || true)
          echo "$POSTURE_OUT"
          if echo "$POSTURE_OUT" | grep -qiE 'HIGH|CRITICAL'; then
            echo "::warning::GKE Security Posture HIGH/CRITICAL findings detected"
            SCAN_WARNINGS=1
          fi

          echo "=== On-Demand Scanning: workload images ==="
          gcloud services enable ondemandscanning.googleapis.com \
            --project="$PROJECT" --quiet 2>/dev/null || true

          IMAGES=$(kubectl get pods --all-namespaces -o json 2>/dev/null \
            | jq -r '.items[] | select(.metadata.namespace | IN("kube-system","kube-public","kube-node-lease","gke-gmp-system","gke-managed-metrics-server","config-management-system") | not) | [(.spec.containers//[]),(.spec.initContainers//[])] | add//[] | .[].image' 2>/dev/null \
            | sort -u) || true

          if [ -z "$IMAGES" ]; then
            echo "No workload images found outside system namespaces — skipping image scan"
          else
            echo "Images to scan:"
            echo "$IMAGES"
            while IFS= read -r IMAGE; do
              [ -z "$IMAGE" ] && continue
              echo "--- Scanning: $IMAGE ---"
              SCAN_OUT=$(gcloud artifacts docker images scan "$IMAGE" --remote \
                --project="$PROJECT" --quiet 2>&1) || {
                echo "::warning::On-Demand Scan failed for $IMAGE"
                continue
              }
              echo "$SCAN_OUT"
              SCAN_NAME=$(echo "$SCAN_OUT" | grep '^name:' | head -1 | awk '{print $2}' || true)
              if [ -n "$SCAN_NAME" ]; then
                VULNS=$(gcloud artifacts docker images list-vulnerabilities "$SCAN_NAME" \
                  --project="$PROJECT" \
                  --filter="vulnerability.effectiveSeverity=HIGH OR vulnerability.effectiveSeverity=CRITICAL" \
                  --format="table(vulnerability.effectiveSeverity,vulnerability.packageIssue[0].affectedPackage,vulnerability.shortDescription)" \
                  2>/dev/null || true)
                if [ -n "$VULNS" ]; then
                  echo "$VULNS"
                  echo "::warning::HIGH/CRITICAL vulnerabilities in $IMAGE"
                  SCAN_WARNINGS=1
                else
                  echo "No HIGH/CRITICAL vulnerabilities found in $IMAGE"
                fi
              fi
            done <<< "$IMAGES"
          fi
          echo ""
          [ "$SCAN_WARNINGS" -eq 0 ] \
            && echo "Security scan complete — no HIGH/CRITICAL findings." \
            || echo "::warning::Security findings detected — review output above (non-blocking)"

      - name: Restore KCC Management Cluster Credentials
        id: kcc-mgmt-creds-restore
        if: always() && (steps.kcc-wait.outcome == 'success' || steps.kcc-cluster-ready.outcome == 'success')
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Delete KCC resources
        if: always() && steps.kcc-apply.outcome == 'success'
        run: |
          kubectl delete \
            -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/ \
            --wait=true --timeout=900s || true

      - name: Post KCC summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const kccResult = '${{ steps.kcc-wait.outcome || 'skipped' }}';
            const failed = kccResult === 'failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `### Deploy & Test KCC: \`${template}\``,
              `| Step | Result |`,
              `|---|---|`,
              `| KCC apply + Ready | **${kccResult}** |`,
              ...(failed ? ['', `KCC test failed — see [run logs](${runUrl}) for details.`] : []),
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

      - name: Cancel workflow on failure
        if: failure()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh run cancel ${{ github.run_id }}

  # ── 4c. PR close: destroy any cluster left up by failed deploy-test runs ────
  cleanup-pr-infra:
    name: "Cleanup orphaned PR infra (${{ matrix.template }})"
    needs: detect-changes
    if: >-
      github.event_name == 'pull_request' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install GKE Auth Plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      # ── TF cleanup ──────────────────────────────────────────────────────────
      - name: Setup Terraform
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform cleanup (destroy if any state exists)
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          export TF_VAR_cluster_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-subnet"
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm" \
            -input=false -no-color 2>/dev/null || exit 0

          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || true)
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || true)

          if [ -n "$CLUSTER" ]; then
            gcloud container clusters update "$CLUSTER" \
              --location="$LOCATION" \
              --project="${{ env.PROJECT_ID }}" \
              --no-enable-deletion-protection --quiet 2>/dev/null || true
          fi

          terraform destroy -auto-approve -input=false 2>/dev/null || true

      # ── KCC cleanup ─────────────────────────────────────────────────────────
      - name: Get KCC cluster credentials
        if: "hashFiles(format('{0}/config-connector/**', matrix.template)) != ''"
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: KCC cleanup (delete if any resources exist)
        if: "hashFiles(format('{0}/config-connector/**', matrix.template)) != ''"
        run: |
          kubectl delete \
            -n ${{ env.KCC_NAMESPACE }} \
            -f ${{ matrix.template }}/config-connector/ \
            --ignore-not-found \
            --wait=false 2>/dev/null || true
          echo "KCC cleanup initiated — Config Connector will delete GCP resources asynchronously"

  # ── 5a. Post-merge: independent TF+Helm cluster: apply → verify → destroy ─
  validate-tf-helm:
    name: "Validate TF+Helm (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already validated (and unchanged since)
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          if [ ! -f "${TEMPLATE}/.validated" ]; then
            echo "No .validated marker — running validation"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          VALIDATED_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}' || true)
          if [ -z "$VALIDATED_COMMIT" ]; then
            echo "No commit recorded in .validated — re-validating"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$VALIDATED_COMMIT" HEAD -- "${TEMPLATE}/" \
            | grep -v '\.validated$' | grep -v 'README\.md$' || true)
          if [ -n "$CHANGED" ]; then
            echo "Template changed since last validation (${VALIDATED_COMMIT}):"
            echo "$CHANGED"
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "Template unchanged since last validation (${VALIDATED_COMMIT}) — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install GKE Auth Plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Setup Terraform
        if: steps.skip-check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Break stale TF state lock (if any)
        if: >-
          steps.skip-check.outputs.skip != 'true' &&
          hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          gsutil rm "gs://${TF_STATE_BUCKET}/${{ matrix.template }}-${{ github.run_id }}/terraform-helm/default.tflock" \
            2>/dev/null && echo "Stale state lock removed" || echo "No stale lock present"

      - name: Terraform apply
        id: tf-apply
        if: >-
          steps.skip-check.outputs.skip != 'true' &&
          hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          export TF_VAR_cluster_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf"
          export TF_VAR_network_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-vpc"
          export TF_VAR_subnet_name="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-subnet"
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="prefix=${{ matrix.template }}-${{ github.run_id }}/terraform-helm"
          terraform apply -auto-approve -input=false

      - name: Capture Terraform outputs
        id: tf-outputs
        if: steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          TF_DURATION=$(( $(date -u +%s) - ${TF_START} ))
          echo "tf_duration=${TF_DURATION}" >> $GITHUB_OUTPUT
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "tf_location=${LOCATION}" >> $GITHUB_OUTPUT
          if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
            ZONES=$(gcloud container clusters describe $CLUSTER --location=$LOCATION \
              --format="value(locations)" 2>/dev/null | tr ';' ', ' || echo "$LOCATION")
            echo "tf_zones=${ZONES}" >> $GITHUB_OUTPUT
          fi

      # Use the action (direct token auth) so kubectl works without gke-gcloud-auth-plugin
      - name: Get TF cluster credentials
        id: tf-creds
        if: >-
          steps.tf-outputs.outcome == 'success' &&
          steps.tf-outputs.outputs.tf_cluster != ''
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.tf-outputs.outputs.tf_cluster }}
          location: ${{ steps.tf-outputs.outputs.tf_location }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Verify Terraform cluster is RUNNING
        id: tf-verify
        if: steps.tf-creds.outcome == 'success'
        run: |
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          kubectl get nodes
          gcloud container clusters describe $CLUSTER --location=$LOCATION \
            --format="value(status)" | grep -q RUNNING

      - name: Set up Helm
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash

      - name: Helm deploy and verify
        id: helm-deploy
        if: >-
          steps.tf-verify.outcome == 'success' &&
          hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then echo "No Helm charts found -- skipping"; exit 0; fi
          TIMEOUT="60m"
          if [ -f "${{ matrix.template }}/.timeout" ]; then
            TIMEOUT=$(cat ${{ matrix.template }}/.timeout)
          fi
          for chart in $CHARTS; do
            echo "=== Helm deploy: $chart ==="
            helm upgrade --install release "$chart" --wait --timeout="$TIMEOUT"
          done

          # Run template-specific validation if present
          if [ -f "${{ matrix.template }}/validate.sh" ]; then
            echo "=== Running template-specific validation: ${{ matrix.template }}/validate.sh ==="
            RUN_ID="${{ github.run_id }}"
            UID_SUFFIX="${RUN_ID: -6}"
            export CLUSTER_NAME="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf"
            chmod +x ${{ matrix.template }}/validate.sh
            ./${{ matrix.template }}/validate.sh
          fi

      - name: Security scan — GCP native (On-Demand Scanning + Security Posture)
        id: security-scan
        continue-on-error: true
        if: steps.tf-verify.outcome == 'success'
        run: |
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          PROJECT="${{ env.PROJECT_ID }}"
          SCAN_WARNINGS=0

          # ── GKE Security Posture ─────────────────────────────────────────
          echo "=== GKE Security Posture configuration ==="
          gcloud container clusters describe "$CLUSTER" --location="$LOCATION" \
            --project="$PROJECT" --format="yaml(securityPostureConfig)"

          echo "=== GKE Security Posture findings (HIGH/CRITICAL) ==="
          POSTURE_OUT=$(gcloud beta container clusters list-security-posture-findings \
            "$CLUSTER" --location="$LOCATION" --project="$PROJECT" \
            --filter="severity=HIGH OR severity=CRITICAL" \
            --format="table(severity,findingType,resourceUri,description)" 2>/dev/null || true)
          echo "$POSTURE_OUT"
          if echo "$POSTURE_OUT" | grep -qiE 'HIGH|CRITICAL'; then
            echo "::warning::GKE Security Posture HIGH/CRITICAL findings detected"
            SCAN_WARNINGS=1
          fi

          # ── On-Demand Scanning: workload images ──────────────────────────
          echo "=== On-Demand Scanning: workload images ==="
          gcloud services enable ondemandscanning.googleapis.com \
            --project="$PROJECT" --quiet 2>/dev/null || true

          # Collect unique images from workload namespaces (exclude GKE system namespaces)
          IMAGES=$(kubectl get pods --all-namespaces -o json 2>/dev/null \
            | jq -r '.items[] | select(.metadata.namespace | IN("kube-system","kube-public","kube-node-lease","gke-gmp-system","gke-managed-metrics-server","config-management-system") | not) | [(.spec.containers//[]),(.spec.initContainers//[])] | add//[] | .[].image' 2>/dev/null \
            | sort -u) || true

          if [ -z "$IMAGES" ]; then
            echo "No workload images found outside system namespaces — skipping image scan"
          else
            echo "Images to scan:"
            echo "$IMAGES"
            while IFS= read -r IMAGE; do
              [ -z "$IMAGE" ] && continue
              echo "--- Scanning: $IMAGE ---"
              SCAN_OUT=$(gcloud artifacts docker images scan "$IMAGE" --remote \
                --project="$PROJECT" --quiet 2>&1) || {
                echo "::warning::On-Demand Scan failed for $IMAGE"
                continue
              }
              echo "$SCAN_OUT"
              SCAN_NAME=$(echo "$SCAN_OUT" | grep '^name:' | head -1 | awk '{print $2}' || true)
              if [ -n "$SCAN_NAME" ]; then
                VULNS=$(gcloud artifacts docker images list-vulnerabilities "$SCAN_NAME" \
                  --project="$PROJECT" \
                  --filter="vulnerability.effectiveSeverity=HIGH OR vulnerability.effectiveSeverity=CRITICAL" \
                  --format="table(vulnerability.effectiveSeverity,vulnerability.packageIssue[0].affectedPackage,vulnerability.shortDescription)" \
                  2>/dev/null || true)
                if [ -n "$VULNS" ]; then
                  echo "$VULNS"
                  echo "::warning::HIGH/CRITICAL vulnerabilities in $IMAGE"
                  SCAN_WARNINGS=1
                else
                  echo "No HIGH/CRITICAL vulnerabilities found in $IMAGE"
                fi
              fi
            done <<< "$IMAGES"
          fi

          echo ""
          [ "$SCAN_WARNINGS" -eq 0 ] \
            && echo "Security scan complete — no HIGH/CRITICAL findings." \
            || echo "::warning::Security findings detected — review output above (non-blocking)"


      - name: Helm uninstall (teardown)
        if: always() && steps.teardown-check.outputs.should_destroy == 'true' && steps.helm-deploy.outcome == 'success'
        run: |
          echo "Uninstalling Helm release to clean up NEGs and LoadBalancers..."
          helm uninstall release --wait --timeout=5m || true
          kubectl delete gateway,ingress --all -A --wait=true --timeout=2m || true
          echo "Waiting for NEGs to be cleaned up..."
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          NETWORK_NAME="$(basename ${{ matrix.template }})-${UID_SUFFIX}-tf-vpc"
          for i in {1..20}; do
            NEGS=$(gcloud compute network-endpoint-groups list --filter="network:($NETWORK_NAME)" --project="${{ env.PROJECT_ID }}" --format="value(name)" 2>/dev/null || true)
            if [ -z "$NEGS" ]; then
              echo "All NEGs cleaned up."
              break
            fi
            echo "NEGs still exist. Waiting 15s..."
            sleep 15
          done

      - name: Terraform destroy
        id: tf-destroy
        if: always() && steps.tf-apply.outcome != 'skipped'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          terraform destroy -auto-approve -input=false || \
          terraform destroy -auto-approve -input=false

      - name: Fallback gcloud cluster delete
        if: always() && steps.tf-destroy.outcome == 'failure' && steps.tf-outputs.outputs.tf_cluster != ''
        run: |
          echo "terraform destroy failed — falling back to gcloud for cluster deletion"
          gcloud container clusters delete "${{ steps.tf-outputs.outputs.tf_cluster }}" \
            --location="${{ steps.tf-outputs.outputs.tf_location }}" \
            --project="${{ env.PROJECT_ID }}" --quiet --async || true
          echo "::warning::Cluster deletion initiated via gcloud fallback. VPC may need manual cleanup."

      # Save per-template results to artifact for publish-validated job
      - name: Save TF results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/tf-results
          cat > /tmp/tf-results/result.json << 'EOF'
          {
            "status":   "${{ steps.tf-verify.outcome   || 'skipped' }}",
            "duration": "${{ steps.tf-outputs.outputs.tf_duration || '' }}",
            "cluster":  "${{ steps.tf-outputs.outputs.tf_cluster  || '' }}",
            "location": "${{ steps.tf-outputs.outputs.tf_location || '' }}",
            "zones":    "${{ steps.tf-outputs.outputs.tf_zones    || '' }}"
          }
          EOF

      - name: Upload TF results artifact
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tf-results-${{ github.run_id }}-${{ strategy.job-index }}
          path: /tmp/tf-results/result.json
          retention-days: 1

  # ── 5b. Post-merge: independent KCC cluster: apply → wait Ready → delete ─
  #   Runs in parallel with validate-tf-helm. TF resources use -tf suffix
  #   (e.g. basic-gke-tf, basic-gke-tf-vpc) and KCC resources use -kcc suffix
  #   (e.g. basic-gke-kcc, basic-gke-kcc-vpc), so there is no GCP-level name
  #   collision and both jobs can run concurrently.
  validate-kcc:
    name: "Validate KCC (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already validated (and unchanged since)
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          if [ ! -f "${TEMPLATE}/.validated" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          VALIDATED_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}' || true)
          if [ -z "$VALIDATED_COMMIT" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$VALIDATED_COMMIT" HEAD -- "${TEMPLATE}/" \
            | grep -v '\.validated$' | grep -v 'README\.md$' || true)
          if [ -n "$CHANGED" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: List existing clusters
        if: steps.skip-check.outputs.skip != 'true'
        run: |
          gcloud container clusters list --project gca-gke-2025

      - name: Install GKE Auth Plugin
        run: |
          curl -fsSL https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --yes --batch --dearmor -o /usr/share/keyrings/cloud.google.gpg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin
          sudo apt-get update && sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Get KCC cluster credentials
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply KCC manifests
        id: kcc-apply
        if: >-
          steps.skip-check.outputs.skip != 'true' &&
          hashFiles(format('{0}/config-connector/**', matrix.template)) != ''
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          echo "KCC_START=$(date -u +%s)" >> $GITHUB_ENV
          find ${{ matrix.template }}/config-connector -type f -name "*.yaml" -exec sed -i "s/$(basename ${{ matrix.template }})/$(basename ${{ matrix.template }})-${UID_SUFFIX}/g" {} +
          kubectl apply -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/

      - name: Wait for KCC resources Ready
        id: kcc-wait
        if: steps.kcc-apply.outcome == 'success'
        run: |
          echo "Waiting for KCC resources to be Ready (up to 30 minutes)..."
          KCC_START=$(date -u +%s)
          for i in {1..30}; do
            echo "=== Minute $i ==="
            kubectl get containercluster,computenetwork,computesubnetwork,computerouter -n $KCC_NAMESPACE || true
            if kubectl wait -n $KCC_NAMESPACE --for=condition=Ready --all --timeout=60s -f ${{ matrix.template }}/config-connector/ &>/dev/null; then
              echo "All resources are Ready!"
              break
            fi
            sleep 60
          done
          KCC_DURATION=$(( $(date -u +%s) - ${KCC_START} ))
          echo "kcc_duration=${KCC_DURATION}" >> $GITHUB_OUTPUT

      - name: Dump KCC Resource Status
        if: always() && steps.kcc-apply.outcome == 'success'
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          echo "=== Final KCC Resource Status ==="
          kubectl get containercluster,computenetwork,computesubnetwork,computerouter -n $KCC_NAMESPACE || true

      - name: KCC drift and revert test
        if: steps.kcc-wait.outcome == 'success'
        run: echo "Drift test placeholder -- template-specific tests go here."

      - name: Get KCC Workload Cluster Info
        id: kcc-workload-info
        if: steps.kcc-wait.outcome == 'success' || steps.kcc-cluster-ready.outcome == 'success'
        run: |
          RUN_ID="${{ github.run_id }}"
          UID_SUFFIX="${RUN_ID: -6}"
          CLUSTER_COUNT=$(kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} --no-headers 2>/dev/null | wc -l || echo "0")
          if [ "$CLUSTER_COUNT" -eq 0 ]; then
             CLUSTER_COUNT=$(python3 -c "import yaml, pathlib; docs=[d for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml') if p.is_file() for d in yaml.safe_load_all(p.read_text()) if d and d.get('kind')=='ContainerCluster']; print(len(docs))")
          fi
          if [ "$CLUSTER_COUNT" -eq 0 ]; then
            echo "has_cluster=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CLUSTER_NAME=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)
          LOCATION=$(kubectl get containerclusters.container.cnrm.cloud.google.com -n $KCC_NAMESPACE -l template=$(basename ${{ matrix.template }})-${UID_SUFFIX} -o jsonpath='{.items[0].spec.location}' 2>/dev/null || true)
          if [ -z "$CLUSTER_NAME" ]; then
             CLUSTER_NAME=$(python3 -c "import yaml, pathlib; docs=[d for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml') if p.is_file() for d in yaml.safe_load_all(p.read_text()) if d and d.get('kind')=='ContainerCluster']; print(docs[0]['metadata']['name'] if docs else '')")
             LOCATION=$(python3 -c "import yaml, pathlib; docs=[d for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml') if p.is_file() for d in yaml.safe_load_all(p.read_text()) if d and d.get('kind')=='ContainerCluster']; print(docs[0]['spec']['location'] if docs else '')")
          fi
          echo "has_cluster=true" >> $GITHUB_OUTPUT
          echo "cluster_name=${CLUSTER_NAME}" >> $GITHUB_OUTPUT
          echo "location=${LOCATION}" >> $GITHUB_OUTPUT

      - name: Get KCC Workload Cluster Credentials
        id: kcc-workload-creds
        if: steps.kcc-workload-info.outputs.has_cluster == 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ steps.kcc-workload-info.outputs.cluster_name }}
          location: ${{ steps.kcc-workload-info.outputs.location }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Set up Helm (KCC)
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
        if: steps.kcc-workload-creds.outcome == 'success'

      - name: Helm deploy and verify (KCC)
        id: helm-deploy-kcc
        if: steps.kcc-workload-creds.outcome == 'success' && hashFiles(format('{0}/terraform-helm/**', matrix.template)) != ''
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then echo "No Helm charts found -- skipping"; exit 0; fi
          TIMEOUT="60m"
          if [ -f "${{ matrix.template }}/.timeout" ]; then
            TIMEOUT=$(cat ${{ matrix.template }}/.timeout)
          fi
          for chart in $CHARTS; do
            echo "=== Helm deploy: $chart ==="
            helm upgrade --install release "$chart" --wait --timeout="$TIMEOUT"
          done

          # Run template-specific validation if present
          if [ -f "${{ matrix.template }}/validate.sh" ]; then
            echo "=== Running template-specific validation (KCC): ${{ matrix.template }}/validate.sh ==="
            export CLUSTER_NAME="${{ steps.kcc-workload-info.outputs.cluster_name }}"
            chmod +x ${{ matrix.template }}/validate.sh
            ./${{ matrix.template }}/validate.sh
          fi

      - name: Security scan — GCP native (On-Demand Scanning + Security Posture) (KCC)
        id: security-scan-kcc
        continue-on-error: true
        if: steps.kcc-workload-creds.outcome == 'success'
        run: |
          CLUSTER="${{ steps.kcc-workload-info.outputs.cluster_name }}"
          LOCATION="${{ steps.kcc-workload-info.outputs.location }}"
          PROJECT="${{ env.PROJECT_ID }}"
          SCAN_WARNINGS=0

          echo "=== GKE Security Posture configuration ==="
          gcloud container clusters describe "$CLUSTER" --location="$LOCATION" \
            --project="$PROJECT" --format="yaml(securityPostureConfig)"

          echo "=== GKE Security Posture findings (HIGH/CRITICAL) ==="
          POSTURE_OUT=$(gcloud beta container clusters list-security-posture-findings \
            "$CLUSTER" --location="$LOCATION" --project="$PROJECT" \
            --filter="severity=HIGH OR severity=CRITICAL" \
            --format="table(severity,findingType,resourceUri,description)" 2>/dev/null || true)
          echo "$POSTURE_OUT"
          if echo "$POSTURE_OUT" | grep -qiE 'HIGH|CRITICAL'; then
            echo "::warning::GKE Security Posture HIGH/CRITICAL findings detected"
            SCAN_WARNINGS=1
          fi

          echo "=== On-Demand Scanning: workload images ==="
          gcloud services enable ondemandscanning.googleapis.com \
            --project="$PROJECT" --quiet 2>/dev/null || true

          IMAGES=$(kubectl get pods --all-namespaces -o json 2>/dev/null \
            | jq -r '.items[] | select(.metadata.namespace | IN("kube-system","kube-public","kube-node-lease","gke-gmp-system","gke-managed-metrics-server","config-management-system") | not) | [(.spec.containers//[]),(.spec.initContainers//[])] | add//[] | .[].image' 2>/dev/null \
            | sort -u) || true

          if [ -z "$IMAGES" ]; then
            echo "No workload images found outside system namespaces — skipping image scan"
          else
            echo "Images to scan:"
            echo "$IMAGES"
            while IFS= read -r IMAGE; do
              [ -z "$IMAGE" ] && continue
              echo "--- Scanning: $IMAGE ---"
              SCAN_OUT=$(gcloud artifacts docker images scan "$IMAGE" --remote \
                --project="$PROJECT" --quiet 2>&1) || {
                echo "::warning::On-Demand Scan failed for $IMAGE"
                continue
              }
              echo "$SCAN_OUT"
              SCAN_NAME=$(echo "$SCAN_OUT" | grep '^name:' | head -1 | awk '{print $2}' || true)
              if [ -n "$SCAN_NAME" ]; then
                VULNS=$(gcloud artifacts docker images list-vulnerabilities "$SCAN_NAME" \
                  --project="$PROJECT" \
                  --filter="vulnerability.effectiveSeverity=HIGH OR vulnerability.effectiveSeverity=CRITICAL" \
                  --format="table(vulnerability.effectiveSeverity,vulnerability.packageIssue[0].affectedPackage,vulnerability.shortDescription)" \
                  2>/dev/null || true)
                if [ -n "$VULNS" ]; then
                  echo "$VULNS"
                  echo "::warning::HIGH/CRITICAL vulnerabilities in $IMAGE"
                  SCAN_WARNINGS=1
                else
                  echo "No HIGH/CRITICAL vulnerabilities found in $IMAGE"
                fi
              fi
            done <<< "$IMAGES"
          fi
          echo ""
          [ "$SCAN_WARNINGS" -eq 0 ] \
            && echo "Security scan complete — no HIGH/CRITICAL findings." \
            || echo "::warning::Security findings detected — review output above (non-blocking)"

      - name: Restore KCC Management Cluster Credentials
        id: kcc-mgmt-creds-restore
        if: always() && (steps.kcc-wait.outcome == 'success' || steps.kcc-cluster-ready.outcome == 'success')
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Delete KCC resources
        id: kcc-delete
        if: always() && steps.kcc-apply.outcome == 'success'
        run: |
          kubectl delete \
            -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/ \
            --wait=true --timeout=900s || true

      # Save per-template results to artifact for publish-validated job
      - name: Save KCC results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/kcc-results
          cat > /tmp/kcc-results/result.json << 'EOF'
          {
            "status":   "${{ steps.kcc-wait.outcome   || 'skipped' }}",
            "duration": "${{ steps.kcc-wait.outputs.kcc_duration || '' }}"
          }
          EOF

      - name: Upload KCC results artifact
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kcc-results-${{ github.run_id }}-${{ strategy.job-index }}
          path: /tmp/kcc-results/result.json
          retention-days: 1

      - name: Remove Hold Label on Failure
        if: failure() && github.event_name == 'pull_request'
        run: gh pr edit ${{ github.event.pull_request.number }} --remove-label "hold"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5c. Post-merge: update README + write .validated (needs both above) ──
  publish-validated:
    name: "Publish (${{ matrix.template }})"
    needs: [detect-changes, validate-tf-helm, validate-kcc]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      !cancelled()
    runs-on: ubuntu-latest
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CODEBOT_PAT }}

      - name: Download TF results artifact
        uses: actions/download-artifact@v4
        with:
          pattern: tf-results-${{ github.run_id }}-*
          merge-multiple: true
          path: /tmp/tf-artifacts/
        continue-on-error: true

      - name: Download KCC results artifact
        uses: actions/download-artifact@v4
        with:
          pattern: kcc-results-${{ github.run_id }}-*
          merge-multiple: true
          path: /tmp/kcc-artifacts/
        continue-on-error: true

      - name: Update README and mark validated
        env:
          TF_JOB_RESULT:  ${{ needs.validate-tf-helm.result }}
          KCC_JOB_RESULT: ${{ needs.validate-kcc.result }}
        run: |
          set -e
          TEMPLATE="${{ matrix.template }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE=$(date -u +"%Y-%m-%d")
          COMMIT=${{ github.sha }}

          # Parse per-template artifact results (fall back to job-level result)
          TF_RESULT_FILE=$(ls /tmp/tf-artifacts/result.json 2>/dev/null | head -1 || true)
          KCC_RESULT_FILE=$(ls /tmp/kcc-artifacts/result.json 2>/dev/null | head -1 || true)

          if [ -n "$TF_RESULT_FILE" ]; then
            TF_STATUS=$(python3  -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('status',''))")
            TF_DURATION=$(python3 -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('duration',''))")
            TF_CLUSTER=$(python3  -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('cluster',''))")
            TF_LOCATION=$(python3 -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('location',''))")
            TF_ZONES=$(python3    -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('zones',''))")
          else
            TF_STATUS="$TF_JOB_RESULT"; TF_DURATION=""; TF_CLUSTER=""; TF_LOCATION=""; TF_ZONES=""
          fi

          if [ -n "$KCC_RESULT_FILE" ]; then
            KCC_STATUS=$(python3   -c "import json; d=json.load(open('$KCC_RESULT_FILE')); print(d.get('status',''))")
            KCC_DURATION=$(python3 -c "import json; d=json.load(open('$KCC_RESULT_FILE')); print(d.get('duration',''))")
          else
            KCC_STATUS="$KCC_JOB_RESULT"; KCC_DURATION=""
          fi

          fmt_duration() { local s=$1; [ -z "$s" ] && echo "n/a" || echo "$((s/60))m $((s%60))s"; }
          TF_DUR=$(fmt_duration "$TF_DURATION")
          KCC_DUR=$(fmt_duration "$KCC_DURATION")
          REGION="${TF_LOCATION:-us-central1}"
          ZONES="${TF_ZONES:-${REGION}}"

          README="${TEMPLATE}/README.md"
          if [ ! -f "$README" ]; then
            printf "# %s\n\n> README auto-generated by CI.\n" "$(basename $TEMPLATE)" > "$README"
          fi

          # Strip any existing validation record section
          python3 -c "
          import sys, re
          content = open(sys.argv[1]).read()
          content = re.sub(r'\n## Validation Record.*', '', content, flags=re.DOTALL).rstrip()
          open(sys.argv[1], 'w').write(content)
          " "$README"

          # Accumulate agent metrics across all sandbox sessions.
          # Uses session_start as a dedup key so re-runs don't double-count.
          python3 - "$TEMPLATE" << 'ACCUMPY'
          import json, os, sys, datetime
          template = sys.argv[1]
          metrics_file      = f'{template}/.agent-metrics'
          cumulative_file   = f'{template}/.agent-metrics-cumulative'

          current = {}
          if os.path.exists(metrics_file):
              try:    current = json.load(open(metrics_file))
              except: pass

          cumulative = {'total_input_tokens': 0, 'total_output_tokens': 0,
                        'total_cost_usd': 0.0, 'sessions': []}
          if os.path.exists(cumulative_file):
              try:    cumulative = json.load(open(cumulative_file))
              except: pass

          session_start    = current.get('session_start', '')
          already_counted  = session_start and any(
              s.get('session_start') == session_start
              for s in cumulative.get('sessions', [])
          )

          if session_start and not already_counted:
              in_tok  = current.get('input_tokens')
              out_tok = current.get('output_tokens')
              cost    = float(current.get('estimated_cost_usd') or 0)
              if isinstance(in_tok, (int, float)) and in_tok:
                  cumulative['total_input_tokens']  += int(in_tok)
                  cumulative['total_output_tokens'] += int(out_tok or 0)
                  cumulative['total_cost_usd']       = round(
                      cumulative['total_cost_usd'] + cost, 4)
                  cumulative.setdefault('sessions', []).append({
                      'session_start':     session_start,
                      'input_tokens':      int(in_tok),
                      'output_tokens':     int(out_tok or 0),
                      'estimated_cost_usd': str(cost),
                      'model':             current.get('model', ''),
                      'counted_at':        datetime.datetime.now(
                          datetime.timezone.utc).isoformat()
                  })
                  json.dump(cumulative, open(cumulative_file, 'w'), indent=2)
                  print(f"Counted session {session_start}: "
                        f"{in_tok:,}+{out_tok:,} tokens, ${cost}")
              else:
                  print("Session tokens are null — skipping accumulation")
          elif already_counted:
              print(f"Session {session_start} already counted — skipping")
          else:
              print("No session_start in .agent-metrics — skipping")
          ACCUMPY

          # Read cumulative totals for README display
          eval "$(python3 - "$TEMPLATE" << 'READPY'
          import json, os, sys
          template = sys.argv[1]
          f = f'{template}/.agent-metrics-cumulative'
          d = json.load(open(f)) if os.path.exists(f) else {}
          n      = len(d.get('sessions', []))
          in_t   = d.get('total_input_tokens',  0)
          out_t  = d.get('total_output_tokens', 0)
          cost   = d.get('total_cost_usd',      0.0)
          if n > 0 and in_t > 0:
              suffix = f" ({n} session{'s' if n != 1 else ''})"
              print(f'INPUT_TOKENS="{in_t:,}"')
              print(f'OUTPUT_TOKENS="{out_t:,}"')
              print(f'AGENT_COST="{cost}"')
              print(f'SESSION_SUFFIX="{suffix}"')
          else:
              print('INPUT_TOKENS=""')
              print('OUTPUT_TOKENS=""')
              print('AGENT_COST=""')
              print('SESSION_SUFFIX=""')
          READPY
          )"
          TOKEN_STR="${INPUT_TOKENS:+${INPUT_TOKENS} in / ${OUTPUT_TOKENS} out${SESSION_SUFFIX}}"
          TOKEN_STR="${TOKEN_STR:-not recorded}"
          COST_STR="${AGENT_COST:+\$${AGENT_COST}}"
          COST_STR="${COST_STR:--}"

          python3 - "$README" "$DATE" "$TF_STATUS" "$KCC_STATUS" "$TF_DUR" "$KCC_DUR" \
              "$REGION" "$ZONES" "${TF_CLUSTER:---}" "${COMMIT:0:8}" \
              "$TOKEN_STR" "$COST_STR" << 'PYEOF'
          import sys
          readme, date, tf_s, kcc_s, tf_d, kcc_d, region, zones, cluster, commit, tokens, cost = sys.argv[1:]
          sep = " | "
          rows = [
              ("**Status**",         tf_s,      kcc_s),
              ("**Date**",           date,      date),
              ("**Duration**",       tf_d,      kcc_d),
              ("**Region**",         region,    "us-central1 (KCC cluster)"),
              ("**Zones**",          zones,     "forge-management namespace"),
              ("**Cluster**",        cluster,   "krmapihost-kcc-instance"),
              ("**Agent tokens**",   tokens,    "(shared session)"),
              ("**Estimated cost**", cost,      "--"),
              ("**Commit**",         commit,    commit),
          ]
          header = sep.join(["", "", "Terraform + Helm", "Config Connector", ""]).strip()
          divider = sep.join(["", "---", "---", "---", ""]).strip()
          lines = ["\n\n## Validation Record\n", header, divider]
          for label, tf_val, kcc_val in rows:
              lines.append(sep.join(["", label, tf_val, kcc_val, ""]).strip())
          lines.append("")
          with open(readme, "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

          printf "validated_at: %s\ncommit: %s\ntf_helm: %s\nkcc: %s\n" \
            "$TIMESTAMP" "$COMMIT" "$TF_STATUS" "$KCC_STATUS" \
            > "${TEMPLATE}/.validated"

          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@users.noreply.github.com"
          # Reset to tip of main AFTER generating files so git has no unstaged
          # changes when rebasing. Save generated files, reset, restore them.
          cp "${TEMPLATE}/README.md" /tmp/ci-readme.md
          cp "${TEMPLATE}/.validated" /tmp/ci-validated.md
          [ -f "${TEMPLATE}/.agent-metrics-cumulative" ] && \
            cp "${TEMPLATE}/.agent-metrics-cumulative" /tmp/ci-metrics-cumulative.json || true
          git fetch origin main
          git reset --hard origin/main
          cp /tmp/ci-readme.md "${TEMPLATE}/README.md"
          cp /tmp/ci-validated.md "${TEMPLATE}/.validated"
          [ -f /tmp/ci-metrics-cumulative.json ] && \
            cp /tmp/ci-metrics-cumulative.json "${TEMPLATE}/.agent-metrics-cumulative" || true
          git add "${TEMPLATE}/README.md" "${TEMPLATE}/.validated"
          [ -f "${TEMPLATE}/.agent-metrics-cumulative" ] && \
            git add "${TEMPLATE}/.agent-metrics-cumulative"
          git commit -m "ci: validate ${TEMPLATE} [skip ci]" || true
          git push

name: Sandbox Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"

jobs:
  # ── 1. Detect which templates changed ────────────────────────────────────
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.find.outputs.templates }}
      has_templates: ${{ steps.find.outputs.has_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed template directories
        id: find
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_HEAD="${{ github.event.pull_request.head.sha }}"
            BASE=$(git merge-base "origin/${{ github.base_ref }}" "$PR_HEAD")
            DIFF_HEAD="$PR_HEAD"
          else
            BASE=${{ github.event.before }}
            DIFF_HEAD=${{ github.sha }}
          fi
          DIRS=$(git diff --name-only "$BASE" "$DIFF_HEAD" \
            | grep '^templates/' \
            | awk -F/ '{print $1"/"$2}' \
            | sort -u \
            | jq -Rnc '[inputs | select(length>0)]')
          echo "templates=$DIRS" >> $GITHUB_OUTPUT
          echo "has_templates=$([ "$DIRS" = "[]" ] && echo false || echo true)" >> $GITHUB_OUTPUT
          echo "Changed templates: $DIRS"

  # ── 2. Lint / static analysis (PR + push) ────────────────────────────────
  lint:
    name: "Lint (${{ matrix.template }})"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true   # stop linting other templates the moment one fails
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Terraform fmt + validate
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          terraform init -backend=false -input=false
          terraform fmt -check -recursive
          terraform validate

      - name: Enforce both terraform-helm/ and config-connector/ exist
        run: |
          TEMPLATE="${{ matrix.template }}"
          MISSING=""
          [ ! -d "${TEMPLATE}/terraform-helm" ] && MISSING="${MISSING} terraform-helm/"
          [ ! -d "${TEMPLATE}/config-connector" ] && MISSING="${MISSING} config-connector/"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Template '${TEMPLATE}' is missing required directories:${MISSING}"
            echo "Every template must provide both deployment paths:"
            echo "  terraform-helm/   (Terraform + Helm)"
            echo "  config-connector/ (Config Connector / KCC)"
            exit 1
          fi
          echo "Both deployment paths present: terraform-helm/ ✓  config-connector/ ✓"
          # Fail if non-standard Helm/TF directories exist (agents sometimes use wrong names)
          for bad in Terraform_HELM terraform_helm terraform-HELM helm Helm terraform manifests; do
            if [ -d "${TEMPLATE}/${bad}" ]; then
              echo "ERROR: Found non-standard directory '${bad}/' -- use 'terraform-helm/' and 'config-connector/' per template spec"
              exit 1
            fi
          done

      - name: Helm lint
        if: "hashFiles(format('{0}/terraform-helm', matrix.template)) != ''"
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then
            echo "No Helm charts found under terraform-helm/ -- skipping"
            exit 0
          fi
          for chart in $CHARTS; do
            echo "=== helm lint: $chart ==="
            helm lint "$chart"
          done

      - name: Helm template (render + validate YAML)
        if: "hashFiles(format('{0}/terraform-helm', matrix.template)) != ''"
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then exit 0; fi
          for chart in $CHARTS; do
            echo "=== helm template: $chart ==="
            helm template release "$chart" > /tmp/helm-rendered.yaml
            # Validate the rendered YAML parses cleanly
            python3 -c "
          import yaml, sys
          docs = list(yaml.safe_load_all(open('/tmp/helm-rendered.yaml')))
          docs = [d for d in docs if d]
          print(f'Rendered {len(docs)} Kubernetes objects from chart')
          kinds = sorted(set(d.get(\"kind\",\"Unknown\") for d in docs))
          print('Kinds:', ', '.join(kinds))
            "
          done

      - name: KCC manifest syntax check
        if: "hashFiles(format('{0}/config-connector', matrix.template)) != ''"
        run: |
          # Basic YAML syntax validation
          python3 -c "
          import yaml, sys, pathlib, os
          errors = []
          for p in pathlib.Path('${{ matrix.template }}/config-connector').rglob('*.yaml'):
              try:
                  yaml.safe_load_all(p.read_text())
              except yaml.YAMLError as e:
                  errors.append(str(p) + ': ' + str(e))
          if errors:
              print('YAML errors found:')
              for e in errors: print(' ', e)
              sys.exit(1)
          print('All KCC manifests parse OK')
          "

      - name: Check deletion_protection = false
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        run: |
          if grep -r 'google_container_cluster' ${{ matrix.template }}/terraform-helm/ >/dev/null 2>&1; then
            if ! grep -r 'deletion_protection.*=.*false' ${{ matrix.template }}/terraform-helm/ >/dev/null 2>&1; then
              echo "ERROR: google_container_cluster found without deletion_protection = false"
              exit 1
            fi
          fi

      - name: Check no KCC abandon annotations
        if: "hashFiles(format('{0}/config-connector', matrix.template)) != ''"
        run: |
          if grep -r 'deletion-policy.*abandon' ${{ matrix.template }}/config-connector/ >/dev/null 2>&1; then
            echo "ERROR: cnrm.cloud.google.com/deletion-policy: abandon found -- this orphans GCP resources"
            exit 1
          fi

      - name: Report lint failure to PR
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                `### CI Lint failure: \`${template}\``,
                ``,
                `One or more lint checks failed — see [run logs](${runUrl}) for the exact error.`,
                ``,
                `**Common causes:**`,
                `- Template directory named \`Terraform_HELM/\` or similar instead of \`terraform-helm/\``,
                `- \`google_container_cluster\` missing \`deletion_protection = false\``,
                `- Terraform fmt or validate error`,
                `- KCC manifest YAML syntax error`,
                ``,
                `Please investigate the lint failure, fix the issue, and push a new commit.`,
              ].join('\n'),
            });

  # ── 3. PR deploy-and-test: full apply+verify+destroy ─────────────────────
  deploy-and-test:
    name: "Deploy & Test (${{ matrix.template }})"
    needs: [ detect-changes, lint ]
    if: >-
      github.event_name == 'pull_request' &&
      needs.detect-changes.outputs.has_templates == 'true' &&
      needs.lint.result == 'success'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        run: sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        id: tf-apply
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="prefix=${{ matrix.template }}/terraform-helm"
          terraform apply -auto-approve -input=false

      - name: Capture Terraform outputs
        id: tf-outputs
        if: steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          TF_DURATION=$(( $(date -u +%s) - ${TF_START} ))
          echo "tf_duration=${TF_DURATION}" >> $GITHUB_OUTPUT
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "tf_location=${LOCATION}" >> $GITHUB_OUTPUT

      - name: Verify Terraform cluster is RUNNING
        id: tf-verify
        if: steps.tf-outputs.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
            gcloud container clusters get-credentials "$CLUSTER" --location="$LOCATION"
            kubectl get nodes
            gcloud container clusters describe "$CLUSTER" --location="$LOCATION" \
              --format="value(status)" | grep -q RUNNING
          fi

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Helm deploy and verify
        id: helm-deploy
        if: >-
          steps.tf-verify.outcome == 'success' &&
          hashFiles(format('{0}/terraform-helm', matrix.template)) != ''
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then echo "No Helm charts found -- skipping"; exit 0; fi
          for chart in $CHARTS; do
            echo "=== Helm deploy: $chart ==="
            helm upgrade --install release "$chart" --wait --timeout=10m
          done

      - name: Security scan — Trivy (workload images)
        id: security-scan
        continue-on-error: true
        if: steps.tf-verify.outcome == 'success'
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          echo "Trivy $(trivy --version | head -1)"

          # Authenticate Docker for private registries (GAR, GCR)
          gcloud auth configure-docker us-docker.pkg.dev,gcr.io --quiet 2>/dev/null || true

          # Scan cluster workloads — exclude GKE system namespaces
          echo "=== Trivy: scanning cluster workload images (HIGH + CRITICAL) ==="
          trivy k8s \
            --severity HIGH,CRITICAL \
            --report summary \
            --format table \
            --timeout 10m \
            --exclude-namespaces kube-system,kube-public,kube-node-lease,gke-gmp-system,gke-managed-metrics-server,config-management-system \
            cluster 2>&1 && TRIVY_EXIT=0 || TRIVY_EXIT=$?

          # GKE Security Posture config
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
            echo "=== GKE Security Posture configuration ==="
            gcloud container clusters describe "$CLUSTER" --location="$LOCATION" \
              --format="yaml(securityPostureConfig,workloadVulnerabilityMode)" 2>/dev/null || true
          fi

          [ "$TRIVY_EXIT" -eq 0 ] || echo "::warning::HIGH/CRITICAL vulnerabilities found — review Trivy output above"

      - name: Terraform destroy
        if: always() && steps.tf-apply.outcome != 'skipped'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: terraform destroy -auto-approve -input=false

      # Restore KCC cluster credentials — Verify Terraform cluster overwrites
      # the kubeconfig context; we must switch back before kubectl apply.
      - name: Restore KCC cluster credentials
        if: "hashFiles(format('{0}/config-connector', matrix.template)) != ''"
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply KCC manifests
        id: kcc-apply
        if: "hashFiles(format('{0}/config-connector', matrix.template)) != ''"
        run: |
          echo "KCC_START=$(date -u +%s)" >> $GITHUB_ENV
          kubectl apply -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/

      - name: Wait for KCC resources Ready
        id: kcc-wait
        if: steps.kcc-apply.outcome == 'success'
        run: |
          kubectl wait \
            -n $KCC_NAMESPACE \
            --for=condition=Ready \
            --all \
            --timeout=600s \
            -f ${{ matrix.template }}/config-connector/ || true
          echo "kcc_duration=$(( $(date -u +%s) - ${KCC_START} ))" >> $GITHUB_OUTPUT

      - name: Delete KCC resources
        if: always() && steps.kcc-apply.outcome == 'success'
        run: |
          kubectl delete \
            -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/ \
            --wait=true --timeout=300s || true

      - name: Post deploy summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const tfResult = '${{ steps.tf-verify.outcome || 'skipped' }}';
            const helmResult = '${{ steps.helm-deploy.outcome || 'skipped' }}';
            const kccResult = '${{ steps.kcc-wait.outcome || 'skipped' }}';
            const failed = [tfResult, helmResult, kccResult].some(r => r === 'failure');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `### Deploy & Test: \`${template}\``,
              `| Path | Result |`,
              `|---|---|`,
              `| Terraform apply + cluster verify | **${tfResult}** |`,
              `| Helm deploy + verify | **${helmResult}** |`,
              `| KCC apply + Ready | **${kccResult}** |`,
              ...(failed ? ['', `One or more deployment tests failed — see [run logs](${runUrl}) for details.`, 'Please investigate the failure, fix the issue, and push a new commit.'] : []),
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── 4a. Post-merge: independent TF+Helm cluster: apply → verify → destroy ─
  validate-tf-helm:
    name: "Validate TF+Helm (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already validated (and unchanged since)
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          if [ ! -f "${TEMPLATE}/.validated" ]; then
            echo "No .validated marker — running validation"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          VALIDATED_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}' || true)
          if [ -z "$VALIDATED_COMMIT" ]; then
            echo "No commit recorded in .validated — re-validating"
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$VALIDATED_COMMIT" HEAD -- "${TEMPLATE}/" \
            | grep -v '\.validated$' | grep -v 'README\.md$' || true)
          if [ -n "$CHANGED" ]; then
            echo "Template changed since last validation (${VALIDATED_COMMIT}):"
            echo "$CHANGED"
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "Template unchanged since last validation (${VALIDATED_COMMIT}) — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        if: steps.skip-check.outputs.skip != 'true'
        run: sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Setup Terraform
        if: steps.skip-check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3

      - name: Terraform apply
        id: tf-apply
        if: >-
          steps.skip-check.outputs.skip != 'true' &&
          hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="prefix=${{ matrix.template }}/terraform-helm"
          terraform apply -auto-approve -input=false

      - name: Capture Terraform outputs
        id: tf-outputs
        if: steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          TF_DURATION=$(( $(date -u +%s) - ${TF_START} ))
          echo "tf_duration=${TF_DURATION}" >> $GITHUB_OUTPUT
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "tf_location=${LOCATION}" >> $GITHUB_OUTPUT
          if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
            ZONES=$(gcloud container clusters describe $CLUSTER --location=$LOCATION \
              --format="value(locations)" 2>/dev/null | tr ';' ', ' || echo "$LOCATION")
            echo "tf_zones=${ZONES}" >> $GITHUB_OUTPUT
          fi

      - name: Verify Terraform cluster is RUNNING
        id: tf-verify
        if: steps.tf-outputs.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
            gcloud container clusters get-credentials $CLUSTER --location=$LOCATION
            kubectl get nodes
            gcloud container clusters describe $CLUSTER --location=$LOCATION \
              --format="value(status)" | grep -q RUNNING
          fi

      - name: Security scan — Trivy (workload images)
        id: security-scan
        continue-on-error: true
        if: steps.tf-verify.outcome == 'success'
        run: |
          # Install Trivy
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          echo "Trivy $(trivy --version | head -1)"

          # Authenticate Docker for private registries (GAR, GCR)
          gcloud auth configure-docker us-docker.pkg.dev,gcr.io --quiet 2>/dev/null || true

          # Scan cluster workloads — exclude GKE system namespaces
          echo "=== Trivy: scanning cluster workload images (HIGH + CRITICAL) ==="
          trivy k8s \
            --severity HIGH,CRITICAL \
            --report summary \
            --format table \
            --timeout 10m \
            --exclude-namespaces kube-system,kube-public,kube-node-lease,gke-gmp-system,gke-managed-metrics-server,config-management-system \
            cluster 2>&1 && TRIVY_EXIT=0 || TRIVY_EXIT=$?

          # GKE Security Posture config
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
            echo "=== GKE Security Posture configuration ==="
            gcloud container clusters describe "$CLUSTER" --location="$LOCATION" \
              --format="yaml(securityPostureConfig,workloadVulnerabilityMode)" 2>/dev/null || true
          fi

          [ "$TRIVY_EXIT" -eq 0 ] || echo "::warning::HIGH/CRITICAL vulnerabilities found — review Trivy output above"

      - name: Terraform destroy
        if: always() && steps.tf-apply.outcome != 'skipped'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: terraform destroy -auto-approve -input=false

      # Save per-template results to artifact for publish-validated job
      - name: Save TF results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/tf-results
          cat > /tmp/tf-results/result.json << 'EOF'
          {
            "status":   "${{ steps.tf-verify.outcome   || 'skipped' }}",
            "duration": "${{ steps.tf-outputs.outputs.tf_duration || '' }}",
            "cluster":  "${{ steps.tf-outputs.outputs.tf_cluster  || '' }}",
            "location": "${{ steps.tf-outputs.outputs.tf_location || '' }}",
            "zones":    "${{ steps.tf-outputs.outputs.tf_zones    || '' }}"
          }
          EOF

      - name: Upload TF results artifact
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: tf-results-${{ github.run_id }}-${{ strategy.job-index }}
          path: /tmp/tf-results/result.json
          retention-days: 1

  # ── 4b. Post-merge: independent KCC cluster: apply → wait Ready → delete ─
  #   Runs after validate-tf-helm completes (same resource names must not
  #   overlap in GCP simultaneously).
  validate-kcc:
    name: "Validate KCC (${{ matrix.template }})"
    needs: [detect-changes, validate-tf-helm]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Skip if already validated (and unchanged since)
        id: skip-check
        run: |
          TEMPLATE="${{ matrix.template }}"
          if [ ! -f "${TEMPLATE}/.validated" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          VALIDATED_COMMIT=$(grep '^commit:' "${TEMPLATE}/.validated" | awk '{print $2}' || true)
          if [ -z "$VALIDATED_COMMIT" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=$(git diff --name-only "$VALIDATED_COMMIT" HEAD -- "${TEMPLATE}/" \
            | grep -v '\.validated$' | grep -v 'README\.md$' || true)
          if [ -n "$CHANGED" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        if: steps.skip-check.outputs.skip != 'true'
        run: sudo apt-get install -y google-cloud-cli-gke-gcloud-auth-plugin

      - name: Get KCC cluster credentials
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply KCC manifests
        id: kcc-apply
        if: >-
          steps.skip-check.outputs.skip != 'true' &&
          hashFiles(format('{0}/config-connector', matrix.template)) != ''
        run: |
          echo "KCC_START=$(date -u +%s)" >> $GITHUB_ENV
          kubectl apply -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/

      - name: Wait for KCC resources Ready
        id: kcc-wait
        if: steps.kcc-apply.outcome == 'success'
        run: |
          kubectl wait \
            -n $KCC_NAMESPACE \
            --for=condition=Ready \
            --all \
            --timeout=600s \
            -f ${{ matrix.template }}/config-connector/ || true
          KCC_DURATION=$(( $(date -u +%s) - ${KCC_START} ))
          echo "kcc_duration=${KCC_DURATION}" >> $GITHUB_OUTPUT

      - name: KCC drift and revert test
        if: steps.kcc-wait.outcome == 'success'
        run: echo "Drift test placeholder -- template-specific tests go here."

      - name: Delete KCC resources
        id: kcc-delete
        if: always() && steps.kcc-apply.outcome == 'success'
        run: |
          kubectl delete \
            -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/ \
            --wait=true --timeout=300s || true

      # Save per-template results to artifact for publish-validated job
      - name: Save KCC results
        if: always() && steps.skip-check.outputs.skip != 'true'
        run: |
          mkdir -p /tmp/kcc-results
          cat > /tmp/kcc-results/result.json << 'EOF'
          {
            "status":   "${{ steps.kcc-wait.outcome   || 'skipped' }}",
            "duration": "${{ steps.kcc-wait.outputs.kcc_duration || '' }}"
          }
          EOF

      - name: Upload KCC results artifact
        if: always() && steps.skip-check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: kcc-results-${{ github.run_id }}-${{ strategy.job-index }}
          path: /tmp/kcc-results/result.json
          retention-days: 1

  # ── 4c. Post-merge: update README + write .validated (needs both above) ──
  publish-validated:
    name: "Publish (${{ matrix.template }})"
    needs: [detect-changes, validate-tf-helm, validate-kcc]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.has_templates == 'true' &&
      !cancelled()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Download TF results artifact
        uses: actions/download-artifact@v4
        with:
          pattern: tf-results-${{ github.run_id }}-*
          merge-multiple: true
          path: /tmp/tf-artifacts/
        continue-on-error: true

      - name: Download KCC results artifact
        uses: actions/download-artifact@v4
        with:
          pattern: kcc-results-${{ github.run_id }}-*
          merge-multiple: true
          path: /tmp/kcc-artifacts/
        continue-on-error: true

      - name: Update README and mark validated
        env:
          TF_JOB_RESULT:  ${{ needs.validate-tf-helm.result }}
          KCC_JOB_RESULT: ${{ needs.validate-kcc.result }}
        run: |
          set -e
          TEMPLATE="${{ matrix.template }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE=$(date -u +"%Y-%m-%d")
          COMMIT=${{ github.sha }}

          # Parse per-template artifact results (fall back to job-level result)
          TF_RESULT_FILE=$(ls /tmp/tf-artifacts/result.json 2>/dev/null | head -1 || true)
          KCC_RESULT_FILE=$(ls /tmp/kcc-artifacts/result.json 2>/dev/null | head -1 || true)

          if [ -n "$TF_RESULT_FILE" ]; then
            TF_STATUS=$(python3  -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('status',''))")
            TF_DURATION=$(python3 -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('duration',''))")
            TF_CLUSTER=$(python3  -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('cluster',''))")
            TF_LOCATION=$(python3 -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('location',''))")
            TF_ZONES=$(python3    -c "import json; d=json.load(open('$TF_RESULT_FILE')); print(d.get('zones',''))")
          else
            TF_STATUS="$TF_JOB_RESULT"; TF_DURATION=""; TF_CLUSTER=""; TF_LOCATION=""; TF_ZONES=""
          fi

          if [ -n "$KCC_RESULT_FILE" ]; then
            KCC_STATUS=$(python3   -c "import json; d=json.load(open('$KCC_RESULT_FILE')); print(d.get('status',''))")
            KCC_DURATION=$(python3 -c "import json; d=json.load(open('$KCC_RESULT_FILE')); print(d.get('duration',''))")
          else
            KCC_STATUS="$KCC_JOB_RESULT"; KCC_DURATION=""
          fi

          fmt_duration() { local s=$1; [ -z "$s" ] && echo "n/a" || echo "$((s/60))m $((s%60))s"; }
          TF_DUR=$(fmt_duration "$TF_DURATION")
          KCC_DUR=$(fmt_duration "$KCC_DURATION")
          REGION="${TF_LOCATION:-us-central1}"
          ZONES="${TF_ZONES:-${REGION}}"

          README="${TEMPLATE}/README.md"
          if [ ! -f "$README" ]; then
            printf "# %s\n\n> README auto-generated by CI.\n" "$(basename $TEMPLATE)" > "$README"
          fi

          # Strip any existing validation record section
          python3 -c "
          import sys, re
          content = open(sys.argv[1]).read()
          content = re.sub(r'\n## Validation Record.*', '', content, flags=re.DOTALL).rstrip()
          open(sys.argv[1], 'w').write(content)
          " "$README"

          # Accumulate agent metrics across all sandbox sessions.
          # Uses session_start as a dedup key so re-runs don't double-count.
          python3 - "$TEMPLATE" << 'ACCUMPY'
          import json, os, sys, datetime
          template = sys.argv[1]
          metrics_file      = f'{template}/.agent-metrics'
          cumulative_file   = f'{template}/.agent-metrics-cumulative'

          current = {}
          if os.path.exists(metrics_file):
              try:    current = json.load(open(metrics_file))
              except: pass

          cumulative = {'total_input_tokens': 0, 'total_output_tokens': 0,
                        'total_cost_usd': 0.0, 'sessions': []}
          if os.path.exists(cumulative_file):
              try:    cumulative = json.load(open(cumulative_file))
              except: pass

          session_start    = current.get('session_start', '')
          already_counted  = session_start and any(
              s.get('session_start') == session_start
              for s in cumulative.get('sessions', [])
          )

          if session_start and not already_counted:
              in_tok  = current.get('input_tokens')
              out_tok = current.get('output_tokens')
              cost    = float(current.get('estimated_cost_usd') or 0)
              if isinstance(in_tok, (int, float)) and in_tok:
                  cumulative['total_input_tokens']  += int(in_tok)
                  cumulative['total_output_tokens'] += int(out_tok or 0)
                  cumulative['total_cost_usd']       = round(
                      cumulative['total_cost_usd'] + cost, 4)
                  cumulative.setdefault('sessions', []).append({
                      'session_start':     session_start,
                      'input_tokens':      int(in_tok),
                      'output_tokens':     int(out_tok or 0),
                      'estimated_cost_usd': str(cost),
                      'model':             current.get('model', ''),
                      'counted_at':        datetime.datetime.now(
                          datetime.timezone.utc).isoformat()
                  })
                  json.dump(cumulative, open(cumulative_file, 'w'), indent=2)
                  print(f"Counted session {session_start}: "
                        f"{in_tok:,}+{out_tok:,} tokens, ${cost}")
              else:
                  print("Session tokens are null — skipping accumulation")
          elif already_counted:
              print(f"Session {session_start} already counted — skipping")
          else:
              print("No session_start in .agent-metrics — skipping")
          ACCUMPY

          # Read cumulative totals for README display
          eval "$(python3 - "$TEMPLATE" << 'READPY'
          import json, os, sys
          template = sys.argv[1]
          f = f'{template}/.agent-metrics-cumulative'
          d = json.load(open(f)) if os.path.exists(f) else {}
          n      = len(d.get('sessions', []))
          in_t   = d.get('total_input_tokens',  0)
          out_t  = d.get('total_output_tokens', 0)
          cost   = d.get('total_cost_usd',      0.0)
          if n > 0 and in_t > 0:
              suffix = f" ({n} session{'s' if n != 1 else ''})"
              print(f'INPUT_TOKENS="{in_t:,}"')
              print(f'OUTPUT_TOKENS="{out_t:,}"')
              print(f'AGENT_COST="{cost}"')
              print(f'SESSION_SUFFIX="{suffix}"')
          else:
              print('INPUT_TOKENS=""')
              print('OUTPUT_TOKENS=""')
              print('AGENT_COST=""')
              print('SESSION_SUFFIX=""')
          READPY
          )"
          TOKEN_STR="${INPUT_TOKENS:+${INPUT_TOKENS} in / ${OUTPUT_TOKENS} out${SESSION_SUFFIX}}"
          TOKEN_STR="${TOKEN_STR:-not recorded}"
          COST_STR="${AGENT_COST:+\$${AGENT_COST}}"
          COST_STR="${COST_STR:--}"

          python3 - "$README" "$DATE" "$TF_STATUS" "$KCC_STATUS" "$TF_DUR" "$KCC_DUR" \
              "$REGION" "$ZONES" "${TF_CLUSTER:---}" "${COMMIT:0:8}" \
              "$TOKEN_STR" "$COST_STR" << 'PYEOF'
          import sys
          readme, date, tf_s, kcc_s, tf_d, kcc_d, region, zones, cluster, commit, tokens, cost = sys.argv[1:]
          sep = " | "
          rows = [
              ("**Status**",         tf_s,      kcc_s),
              ("**Date**",           date,      date),
              ("**Duration**",       tf_d,      kcc_d),
              ("**Region**",         region,    "us-central1 (KCC cluster)"),
              ("**Zones**",          zones,     "forge-management namespace"),
              ("**Cluster**",        cluster,   "krmapihost-kcc-instance"),
              ("**Agent tokens**",   tokens,    "(shared session)"),
              ("**Estimated cost**", cost,      "--"),
              ("**Commit**",         commit,    commit),
          ]
          header = sep.join(["", "", "Terraform + Helm", "Config Connector", ""]).strip()
          divider = sep.join(["", "---", "---", "---", ""]).strip()
          lines = ["\n\n## Validation Record\n", header, divider]
          for label, tf_val, kcc_val in rows:
              lines.append(sep.join(["", label, tf_val, kcc_val, ""]).strip())
          lines.append("")
          with open(readme, "a") as f:
              f.write("\n".join(lines) + "\n")
          PYEOF

          printf "validated_at: %s\ncommit: %s\ntf_helm: %s\nkcc: %s\n" \
            "$TIMESTAMP" "$COMMIT" "$TF_STATUS" "$KCC_STATUS" \
            > "${TEMPLATE}/.validated"

          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@users.noreply.github.com"
          git pull --rebase origin main
          git add "${TEMPLATE}/README.md" "${TEMPLATE}/.validated"
          [ -f "${TEMPLATE}/.agent-metrics-cumulative" ] && \
            git add "${TEMPLATE}/.agent-metrics-cumulative"
          git commit -m "ci: validate ${TEMPLATE} [skip ci]" || true
          git push

name: Sandbox Validation

on:
  push:
    branches: [ main, 'feature/**' ]
  pull_request:
    branches: [ main ]

jobs:
  create-infra:
    name: Create Infrastructure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Init
        run: terraform init
        working-directory: agent-infra
        
      - name: Terraform Apply
        run: terraform apply -auto-approve
        working-directory: agent-infra
        
  deploy-helm:
    name: Deploy Helm Charts
    needs: create-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: gcp-template-forge
          location: us-central1
          
      - name: Deploy Helm
        run: |
          for dir in templates/*/helm; do
            if [ -d "$dir" ]; then
              echo "Deploying Helm charts from $dir"
              for chart in "$dir"/*; do
                if [ -d "$chart" ]; then
                  helm upgrade --install $(basename "$chart") "$chart"
                fi
              done
            fi
          done
          
  deploy-kcc:
    name: Deploy KCC Manifests
    needs: create-infra
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: gcp-template-forge
          location: us-central1
          
      - name: Install KCC Operator
        run: |
          gcloud storage cp gs://configconnector-operator/latest/release-bundle.tar.gz release-bundle.tar.gz
          tar zxvf release-bundle.tar.gz
          kubectl apply -f operator-system/configconnector-operator.yaml
          
          # Create ConfigConnector resource
          cat <<EOF | kubectl apply -f -
          apiVersion: core.cnrm.cloud.google.com/v1beta1
          kind: ConfigConnector
          metadata:
            name: configconnector.core.cnrm.cloud.google.com
          spec:
            mode: namespaced
            stateIntoSpec: Absent
          EOF

      - name: Deploy KCC
        run: |
          for dir in templates/*/kcc; do
            if [ -d "$dir" ]; then
              echo "Applying KCC manifests from $dir"
              kubectl apply -f "$dir"/
              kubectl annotate namespace hello-world cnrm.cloud.google.com/project-id=gca-gke-2025 --overwrite
            fi
          done
          
  verify:
    name: Verify Deployment
    needs: [deploy-helm, deploy-kcc]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: gcp-template-forge
          location: us-central1
          
      - name: Run Verification
        run: |
          echo "Running verification tests..."
          # Add actual verification commands here, e.g., checking pods status
          kubectl get pods -A
          
  teardown:
    name: Teardown Infrastructure
    needs: verify
    runs-on: ubuntu-latest
    if: success()
    steps:
      - uses: actions/checkout@v4
      
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}
          
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        
      - name: Terraform Init
        run: terraform init
        working-directory: agent-infra
        
      - name: Terraform Destroy
        run: terraform destroy -auto-approve
        working-directory: agent-infra

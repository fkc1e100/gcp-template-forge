name: Sandbox Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'templates/**'
      - 'agent-infra/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  pull-requests: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state
  USE_GKE_GCLOUD_AUTH_PLUGIN: "True"
  # Inject project-specific values so variables.tf has no hardcoded defaults
  TF_VAR_project_id: gca-gke-2025
  TF_VAR_service_account: forge-builder@gca-gke-2025.iam.gserviceaccount.com

jobs:
  # ── 1. Detect which templates changed ────────────────────────────────────
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.find.outputs.templates }}
      has_templates: ${{ steps.find.outputs.has_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed template directories
        id: find
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            PR_HEAD="${{ github.event.pull_request.head.sha }}"
            BASE=$(git merge-base "origin/${{ github.base_ref }}" "$PR_HEAD")
            DIFF_HEAD="$PR_HEAD"
          else
            BASE=${{ github.event.before }}
            DIFF_HEAD=${{ github.sha }}
          fi
          DIRS=$(git diff --name-only "$BASE" "$DIFF_HEAD" \
            | grep '^templates/' \
            | awk -F/ '{print $1"/"$2}' \
            | sort -u \
            | jq -Rnc '[inputs | select(length>0)]')
          echo "templates=$DIRS" >> $GITHUB_OUTPUT
          echo "has_templates=$([ "$DIRS" = "[]" ] && echo false || echo true)" >> $GITHUB_OUTPUT
          echo "Changed templates: $DIRS"

  # ── 2. Lint / static analysis (PR + push) ────────────────────────────────
  lint:
    name: "Lint (${{ matrix.template }})"
    needs: detect-changes
    if: needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Terraform fmt + validate
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          terraform init -backend=false -input=false
          terraform fmt -check -recursive
          terraform validate

      - name: Enforce both terraform-helm/ and config-connector/ exist
        run: |
          TEMPLATE="${{ matrix.template }}"
          MISSING=""
          [ ! -d "${TEMPLATE}/terraform-helm" ] && MISSING="${MISSING} terraform-helm/"
          [ ! -d "${TEMPLATE}/config-connector" ] && MISSING="${MISSING} config-connector/"
          if [ -n "$MISSING" ]; then
            echo "ERROR: Template '${TEMPLATE}' is missing required directories:${MISSING}"
            exit 1
          fi

  # ── 3a. PR push: deploy TF+Helm path → verify → teardown ──────────────────
  deploy-test:
    name: "Deploy & Test TF+Helm (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Setup Terraform
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Break stale TF state lock (if any)
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        run: |
          gsutil rm "gs://${TF_STATE_BUCKET}/${{ matrix.template }}/terraform-helm/default.tflock" \
            2>/dev/null && echo "Stale state lock removed" || echo "No stale lock present"

      - name: Terraform apply
        id: tf_apply
        if: "hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''"
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          terraform init \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="prefix=${{ matrix.template }}/terraform-helm"
          terraform apply -auto-approve -var="project_id=${{ env.PROJECT_ID }}" -var="service_account=${{ env.WIF_SERVICE_ACCOUNT }}"

      - name: Get TF cluster credentials
        if: steps.tf_apply.outcome == 'success'
        run: |
          # Detect cluster name and location from outputs
          cd ${{ matrix.template }}/terraform-helm
          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          if [ -n "$CLUSTER" ]; then
            gcloud container clusters get-credentials "$CLUSTER" --region "$LOCATION" --project ${{ env.PROJECT_ID }}
          fi

      - name: Verify Terraform cluster is RUNNING
        id: tf_verify
        if: steps.tf_apply.outcome == 'success'
        run: |
          kubectl get nodes
          # Additional template-specific health check could go here

      - name: Set up Helm
        if: steps.tf_apply.outcome == 'success'
        uses: azure/setup-helm@v4

      - name: Helm deploy and verify
        id: helm
        if: steps.tf_apply.outcome == 'success'
        run: |
          CHARTS=$(find ${{ matrix.template }}/terraform-helm -name Chart.yaml -exec dirname {} \; 2>/dev/null)
          if [ -z "$CHARTS" ]; then echo "No Helm charts found -- skipping"; exit 0; fi
          for chart in $CHARTS; do
            echo "=== Helm deploy: $chart ==="
            helm upgrade --install release "$chart" --wait --timeout=30m
          done

      - name: Terraform destroy
        if: always() && steps.tf_apply.outcome != 'skipped'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          terraform destroy -auto-approve -var="project_id=${{ env.PROJECT_ID }}" -var="service_account=${{ env.WIF_SERVICE_ACCOUNT }}"

      - name: Post TF+Helm summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const tfResult = '${{ steps.tf_verify.outcome || 'skipped' }}';
            const helmResult = '${{ steps.helm.outcome || 'skipped' }}';
            const failed = [tfResult, helmResult].some(r => r === 'failure');
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `### Deploy & Test TF+Helm: \`${template}\``,
              `| Step | Result |`,
              `|---|---|`,
              `| Terraform apply + cluster verify | **${tfResult}** |`,
              `| Helm deploy + verify | **${helmResult}** |`,
              ...(failed ? ['', `TF+Helm test failed — see [run logs](${runUrl}) for details.`] : []),
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── 3b. PR push: deploy KCC path → verify → teardown ──────────────────────
  deploy-test-kcc:
    name: "Deploy & Test KCC (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply KCC manifests
        id: kcc_apply
        if: "hashFiles(format('{0}/config-connector', matrix.template)) != ''"
        run: |
          kubectl apply -n $KCC_NAMESPACE -f ${{ matrix.template }}/config-connector/

      - name: Wait for KCC resources Ready
        id: kcc_wait
        if: steps.kcc_apply.outcome == 'success'
        run: |
          kubectl wait \
            -n $KCC_NAMESPACE \
            --for=condition=Ready \
            --all \
            --timeout=1800s \
            -f ${{ matrix.template }}/config-connector/ || true

      - name: Verify KCC ContainerCluster Ready
        id: kcc_cluster_ready
        if: steps.kcc_apply.outcome == 'success'
        run: |
          # Check if this template includes a ContainerCluster
          CLUSTER_COUNT=$(kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n $KCC_NAMESPACE --no-headers 2>/dev/null | wc -l || echo "0")
          if [ "$CLUSTER_COUNT" -eq 0 ]; then
            echo "No ContainerCluster resources — teardown can proceed"
            exit 0
          fi
          STATUS=$(kubectl get containerclusters.container.cnrm.cloud.google.com \
            -n $KCC_NAMESPACE \
            -o jsonpath='{.items[*].status.conditions[?(@.type=="Ready")].status}' \
            2>/dev/null | tr ' ' '\n' | grep -c "True" || echo "0")
          if [ "$STATUS" -gt 0 ]; then
            echo "ContainerCluster is Ready — teardown can proceed"
          else
            echo "ContainerCluster not yet Ready — leaving KCC resources up for next iteration."
            exit 1
          fi

      - name: Delete KCC resources
        if: always() && steps.kcc_apply.outcome == 'success'
        run: |
          kubectl delete \
            -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/ \
            --wait=true --timeout=900s || true

      - name: Post KCC summary to PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const kccResult = '${{ steps.kcc_wait.outcome || 'skipped' }}';
            const failed = kccResult === 'failure';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              `### Deploy & Test KCC: \`${template}\``,
              `| Step | Result |`,
              `|---|---|`,
              `| KCC apply + Ready | **${kccResult}** |`,
              ...(failed ? ['', `KCC test failed — see [run logs](${runUrl}) for details.`] : []),
            ].join('\n');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });

  # ── 4a. Post-merge: independent TF+Helm cluster: apply → verify → destroy ─
  validate-tf-helm:
    name: "Validate TF+Helm (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Break stale TF state lock (if any)
        run: |
          gsutil rm "gs://${TF_STATE_BUCKET}/${{ matrix.template }}/terraform-helm/default.tflock" \
            2>/dev/null && echo "Stale state lock removed" || echo "No stale lock present"

      - name: Terraform apply
        id: tf-apply
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="prefix=${{ matrix.template }}/terraform-helm"
          terraform apply -auto-approve -input=false

  # ── 4b. Post-merge: independent KCC cluster: apply → wait Ready → delete ─
  validate-kcc:
    name: "Validate KCC (${{ matrix.template }})"
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Apply KCC manifests
        id: kcc-apply
        run: |
          echo "KCC_START=$(date -u +%s)" >> $GITHUB_ENV
          kubectl apply -n $KCC_NAMESPACE -f ${{ matrix.template }}/config-connector/

      - name: Wait for KCC resources Ready
        id: kcc-wait
        run: |
          kubectl wait \
            -n $KCC_NAMESPACE \
            --for=condition=Ready \
            --all \
            --timeout=1800s \
            -f ${{ matrix.template }}/config-connector/ || true

  # ── 4c. Post-merge: update README + write .validated (needs both above) ──
  publish-validated:
    name: "Publish (${{ matrix.template }})"
    needs: [detect-changes, validate-tf-helm, validate-kcc]
    if: >-
      github.event_name == 'push' && github.ref == 'refs/heads/main' &&
      needs.detect-changes.outputs.has_templates == 'true' &&
      !cancelled()
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4
      - name: Update README and mark validated
        run: |
          set -e
          TEMPLATE="${{ matrix.template }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          COMMIT=${{ github.sha }}

          printf "validated_at: %s\ncommit: %s\n" \
            "$TIMESTAMP" "$COMMIT" \
            > "${TEMPLATE}/.validated"

          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@sfle.ca"
          git add "${TEMPLATE}/.validated"
          git commit -m "ci: validate ${TEMPLATE} [skip ci]" || true
          git push

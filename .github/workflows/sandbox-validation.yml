name: Sandbox Validation

on:
  push:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'templates/**'
      - 'agent-infra/**'

permissions:
  contents: write   # to commit .validated markers back to main
  id-token: write   # for WIF token exchange
  pull-requests: write

env:
  PROJECT_ID: gca-gke-2025
  KCC_CLUSTER: krmapihost-kcc-instance
  KCC_REGION: us-central1
  KCC_NAMESPACE: forge-management
  WIF_PROVIDER: projects/764460891170/locations/global/workloadIdentityPools/github-actions/providers/github
  WIF_SERVICE_ACCOUNT: forge-builder@gca-gke-2025.iam.gserviceaccount.com
  TF_STATE_BUCKET: gke-gca-2025-forge-tf-state

jobs:
  # ── Detect which templates changed ───────────────────────────────────────
  detect-changes:
    name: Detect Changed Templates
    runs-on: ubuntu-latest
    outputs:
      templates: ${{ steps.find.outputs.templates }}
      has_templates: ${{ steps.find.outputs.has_templates }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Find changed template directories
        id: find
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
          else
            BASE=${{ github.event.before }}
          fi

          # Get unique top-level template dirs (templates/<issue>-<name>/) that changed
          DIRS=$(git diff --name-only $BASE ${{ github.sha }} \
            | grep '^templates/' \
            | awk -F/ '{print $1"/"$2}' \
            | sort -u \
            | jq -Rnc '[inputs | select(length>0)]')

          echo "templates=$DIRS" >> $GITHUB_OUTPUT
          echo "has_templates=$([ "$DIRS" = "[]" ] && echo false || echo true)" >> $GITHUB_OUTPUT
          echo "Changed templates: $DIRS"

  # ── PR: plan + dry-run (non-destructive preview) ─────────────────────────
  preview:
    name: Preview (${{ matrix.template }})
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Get KCC cluster credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform plan (terraform-helm path)
        if: hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="prefix=${{ matrix.template }}/terraform-helm"
          terraform fmt -check -recursive
          terraform validate
          terraform plan -input=false

      - name: KCC dry-run (config-connector path)
        if: hashFiles(format('{0}/config-connector', matrix.template)) != ''
        run: |
          kubectl apply -n $KCC_NAMESPACE \
            --dry-run=server \
            -f ${{ matrix.template }}/config-connector/

      - name: Post preview summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const template = '${{ matrix.template }}';
            const tfResult = '${{ steps.terraform-plan.outcome || "skipped" }}';
            const kccResult = '${{ steps.kcc-dry-run.outcome || "skipped" }}';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Validation Preview: \`${template}\`\n- Terraform plan: **${tfResult}**\n- KCC dry-run: **${kccResult}**`
            });

  # ── Merge: deploy → validate → teardown → mark validated ─────────────────
  validate-and-publish:
    name: Validate & Publish (${{ matrix.template }})
    needs: detect-changes
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.detect-changes.outputs.has_templates == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        template: ${{ fromJson(needs.detect-changes.outputs.templates) }}

    steps:
      - uses: actions/checkout@v4

      - name: Skip if already validated
        id: skip-check
        run: |
          if [ -f "${{ matrix.template }}/.validated" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Template already validated — skipping."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Authenticate to GCP
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WIF_PROVIDER }}
          service_account: ${{ env.WIF_SERVICE_ACCOUNT }}

      - name: Get KCC cluster credentials
        if: steps.skip-check.outputs.skip != 'true'
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.KCC_CLUSTER }}
          location: ${{ env.KCC_REGION }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Setup Terraform
        if: steps.skip-check.outputs.skip != 'true'
        uses: hashicorp/setup-terraform@v3

      # ── Terraform/Helm path ──────────────────────────────────────────────
      - name: Terraform apply
        id: tf-apply
        if: |
          steps.skip-check.outputs.skip != 'true' &&
          hashFiles(format('{0}/terraform-helm/main.tf', matrix.template)) != ''
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          echo "TF_START=$(date -u +%s)" >> $GITHUB_ENV
          terraform init \
            -backend-config="bucket=$TF_STATE_BUCKET" \
            -backend-config="prefix=${{ matrix.template }}/terraform-helm"
          terraform apply -auto-approve -input=false

      - name: Capture Terraform outputs
        id: tf-outputs
        if: steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          echo "TF_END=$(date -u +%s)" >> $GITHUB_ENV
          TF_DURATION=$(( $(date -u +%s) - ${TF_START} ))
          echo "tf_duration=${TF_DURATION}" >> $GITHUB_OUTPUT

          CLUSTER=$(terraform output -raw cluster_name 2>/dev/null || echo "")
          LOCATION=$(terraform output -raw cluster_location 2>/dev/null || echo "")
          echo "tf_cluster=${CLUSTER}" >> $GITHUB_OUTPUT
          echo "tf_location=${LOCATION}" >> $GITHUB_OUTPUT

          # Resolve zones: if location is a region, list the actual zones used
          if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
            ZONES=$(gcloud container clusters describe $CLUSTER --location=$LOCATION \
              --format="value(locations)" 2>/dev/null | tr ';' ', ' || echo "$LOCATION")
            echo "tf_zones=${ZONES}" >> $GITHUB_OUTPUT
          fi

      - name: Verify Terraform workload
        id: tf-verify
        if: steps.tf-outputs.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: |
          CLUSTER="${{ steps.tf-outputs.outputs.tf_cluster }}"
          LOCATION="${{ steps.tf-outputs.outputs.tf_location }}"
          if [ -n "$CLUSTER" ] && [ -n "$LOCATION" ]; then
            gcloud container clusters describe $CLUSTER --location=$LOCATION \
              --format="value(status)" | grep -q RUNNING
          fi

      - name: Terraform destroy
        if: always() && steps.tf-apply.outcome == 'success'
        working-directory: ${{ matrix.template }}/terraform-helm
        run: terraform destroy -auto-approve -input=false

      # ── Config Connector path ────────────────────────────────────────────
      - name: Apply KCC manifests
        id: kcc-apply
        if: |
          steps.skip-check.outputs.skip != 'true' &&
          hashFiles(format('{0}/config-connector', matrix.template)) != ''
        run: |
          echo "KCC_START=$(date -u +%s)" >> $GITHUB_ENV
          kubectl apply -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/

      - name: Wait for KCC resources ready
        id: kcc-wait
        if: steps.kcc-apply.outcome == 'success'
        run: |
          kubectl wait \
            -n $KCC_NAMESPACE \
            --for=condition=Ready \
            --all \
            --timeout=600s \
            -f ${{ matrix.template }}/config-connector/ || true
          KCC_DURATION=$(( $(date -u +%s) - ${KCC_START} ))
          echo "kcc_duration=${KCC_DURATION}" >> $GITHUB_OUTPUT

      - name: KCC drift and revert test
        if: steps.kcc-wait.outcome == 'success'
        run: |
          echo "Drift test: intentional out-of-band mutation — verifying KCC reverts."
          # Template-specific drift tests would go here.

      - name: Delete KCC resources
        if: always() && steps.kcc-apply.outcome == 'success'
        run: |
          kubectl delete \
            -n $KCC_NAMESPACE \
            -f ${{ matrix.template }}/config-connector/ \
            --wait=true --timeout=300s || true

      # ── Update README and mark template as validated ──────────────────────
      - name: Update README and mark validated
        if: |
          steps.skip-check.outputs.skip != 'true' &&
          (steps.tf-verify.outcome == 'success' || steps.kcc-wait.outcome == 'success')
        env:
          TF_STATUS:   ${{ steps.tf-verify.outcome  || 'skipped' }}
          KCC_STATUS:  ${{ steps.kcc-wait.outcome   || 'skipped' }}
          TF_DURATION: ${{ steps.tf-outputs.outputs.tf_duration  || '' }}
          KCC_DURATION: ${{ steps.kcc-wait.outputs.kcc_duration  || '' }}
          TF_CLUSTER:  ${{ steps.tf-outputs.outputs.tf_cluster   || '' }}
          TF_LOCATION: ${{ steps.tf-outputs.outputs.tf_location  || '' }}
          TF_ZONES:    ${{ steps.tf-outputs.outputs.tf_zones     || '' }}
        run: |
          set -e
          TEMPLATE="${{ matrix.template }}"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          DATE=$(date -u +"%Y-%m-%d")
          COMMIT=${{ github.sha }}

          # Format duration as Xm Ys
          fmt_duration() {
            local secs=$1
            [ -z "$secs" ] && echo "—" && return
            echo "$((secs/60))m $((secs%60))s"
          }
          TF_DUR=$(fmt_duration "$TF_DURATION")
          KCC_DUR=$(fmt_duration "$KCC_DURATION")

          TF_ICON=$([ "$TF_STATUS" = "success" ] && echo "✅" || ([ "$TF_STATUS" = "skipped" ] && echo "—" || echo "❌"))
          KCC_ICON=$([ "$KCC_STATUS" = "success" ] && echo "✅" || ([ "$KCC_STATUS" = "skipped" ] && echo "—" || echo "❌"))

          REGION="${TF_LOCATION:-us-central1}"
          ZONES="${TF_ZONES:-${REGION}}"

          # Inject or update the Validation Record section in README.md
          README="${TEMPLATE}/README.md"
          if [ ! -f "$README" ]; then
            echo "# $(basename $TEMPLATE)" > "$README"
            echo "" >> "$README"
            echo "> README generated by CI — agent should populate template details above." >> "$README"
          fi

          # Remove any existing validation record block and append a fresh one
          python3 - "$README" <<PYEOF
          import sys, re
          path = sys.argv[1]
          content = open(path).read()
          # Strip existing validation section if present
          content = re.sub(r'\n---\n## Validation Record.*', '', content, flags=re.DOTALL)
          content = content.rstrip('\n')
          open(path, 'w').write(content)
          PYEOF

          # Read agent token usage written by the agent to .agent-metrics if present
          AGENT_INPUT_TOKENS=""
          AGENT_OUTPUT_TOKENS=""
          AGENT_COST=""
          METRICS_FILE="${TEMPLATE}/.agent-metrics"
          if [ -f "$METRICS_FILE" ]; then
            AGENT_INPUT_TOKENS=$(python3 -c "import json; d=json.load(open('$METRICS_FILE')); print(d.get('input_tokens',''))" 2>/dev/null || echo "")
            AGENT_OUTPUT_TOKENS=$(python3 -c "import json; d=json.load(open('$METRICS_FILE')); print(d.get('output_tokens',''))" 2>/dev/null || echo "")
            AGENT_COST=$(python3 -c "import json; d=json.load(open('$METRICS_FILE')); print(d.get('estimated_cost_usd',''))" 2>/dev/null || echo "")
          fi
          TOKEN_STR="${AGENT_INPUT_TOKENS:+${AGENT_INPUT_TOKENS} in / ${AGENT_OUTPUT_TOKENS} out}"
          TOKEN_STR="${TOKEN_STR:-not recorded}"
          COST_STR="${AGENT_COST:+\$${AGENT_COST}}"
          COST_STR="${COST_STR:-—}"

          cat >> "$README" <<VALIDATION

          ---
          ## Validation Record

          | | Terraform + Helm | Config Connector |
          |---|---|---|
          | **Status** | ${TF_ICON} ${TF_STATUS} | ${KCC_ICON} ${KCC_STATUS} |
          | **Date** | ${DATE} | ${DATE} |
          | **Duration** | ${TF_DUR} | ${KCC_DUR} |
          | **Region** | ${REGION} | us-central1 (KCC cluster) |
          | **Zones** | ${ZONES} | forge-management namespace |
          | **Cluster** | ${TF_CLUSTER:-—} | krmapihost-kcc-instance |
          | **Agent tokens** | ${TOKEN_STR} | (shared session) |
          | **Estimated cost** | ${COST_STR} | — |
          | **Commit** | \`${COMMIT:0:8}\` | \`${COMMIT:0:8}\` |
          VALIDATION

          # Write .validated marker
          cat > "${TEMPLATE}/.validated" <<MARKER
          validated_at: ${TIMESTAMP}
          commit: ${COMMIT}
          tf_helm: ${TF_STATUS}
          kcc: ${KCC_STATUS}
          MARKER

          git config user.name "codebot-sfle"
          git config user.email "codebot-sfle@users.noreply.github.com"
          git pull --rebase origin main
          git add "${TEMPLATE}/README.md" "${TEMPLATE}/.validated"
          git commit -m "ci: validate ${TEMPLATE} — TF:${TF_ICON} KCC:${KCC_ICON} [skip ci]"
          git push


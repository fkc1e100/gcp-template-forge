---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.19.0
  name: sandboxtasks.custom.agents.x-k8s.io
spec:
  group: custom.agents.x-k8s.io
  names:
    kind: SandboxTask
    listKind: SandboxTaskList
    plural: sandboxtasks
    singular: sandboxtask
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - description: The state of the sandbox task
      jsonPath: .status.taskState
      name: State
      type: string
    - description: Whether a sandbox task has all its subresources ready
      jsonPath: .status.conditions[?(@.type=="InstanceSynced")].status
      name: Synced
      type: string
    - description: Age of the resource
      jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            properties:
              params:
                additionalProperties:
                  type: string
                type: object
              sandboxName:
                type: string
              script:
                type: string
              type:
                type: string
            required:
            - sandboxName
            - type
            type: object
          status:
            properties:
              completionTime:
                format: date-time
                type: string
              result:
                type: string
              startTime:
                format: date-time
                type: string
              stats:
                properties:
                  models:
                    additionalProperties:
                      properties:
                        cachedTokens:
                          format: int64
                          type: integer
                        inputTokens:
                          format: int64
                          type: integer
                        outputTokens:
                          format: int64
                          type: integer
                        thoughtTokens:
                          format: int64
                          type: integer
                        totalErrors:
                          format: int64
                          type: integer
                        totalLatencyMs:
                          format: int64
                          type: integer
                        totalRequests:
                          format: int64
                          type: integer
                        totalTokens:
                          format: int64
                          type: integer
                      type: object
                    type: object
                type: object
              taskState:
                default: Pending
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: repo-agent-gateway
  namespace: repo-agent-system
spec:
  gatewayClassName: will-be-replaced-during-deploy
  listeners:
  - name: https
    protocol: HTTPS
    port: 443
    tls:
      mode: Terminate
      certificateRefs:
      - name: repo-agent-tls
    allowedRoutes:
      namespaces:
        from: All
  - name: http
    protocol: HTTP
    port: 80
    allowedRoutes:
      namespaces:
        from: All
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: pr-review-ui
  namespace: repo-agent-system
spec:
  parentRefs:
    - name: repo-agent-gateway # This should match your gateway
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api
    - path:
        type: PathPrefix
        value: /sandbox
    backendRefs:
    - name: pr-review-api
      port: 80
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: pr-review-ui
      port: 80

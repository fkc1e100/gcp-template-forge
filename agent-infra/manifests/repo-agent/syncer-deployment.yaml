apiVersion: v1
kind: ServiceAccount
metadata:
  name: syncer
  namespace: repo-agent-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: syncer-binding
subjects:
- kind: ServiceAccount
  name: syncer
  namespace: repo-agent-system
roleRef:
  kind: ClusterRole
  name: syncer-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncer
  namespace: repo-agent-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: syncer
  template:
    metadata:
      labels:
        app: syncer
    spec:
      serviceAccountName: syncer
      containers:
      - name: syncer
        image: ko://repo-agent/images/syncer # This will be built locally
        ports:
        - containerPort: 8081
          name: health
        - containerPort: 8080
          name: metrics
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /var/run/secrets/google/key.json
        volumeMounts:
        - name: google-cloud-key
          mountPath: /var/run/secrets/google
          readOnly: true
      volumes:
      - name: google-cloud-key
        secret:
          secretName: gcs-credentials
          optional: true # For workload identity

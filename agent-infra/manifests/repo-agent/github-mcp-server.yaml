apiVersion: apps/v1
kind: Deployment
metadata:
  name: github-mcp-server
  namespace: repo-agent-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: github-mcp-server
  template:
    metadata:
      labels:
        app: github-mcp-server
    spec:
      containers:
      - name: mcp
        image: ko://repo-agent/review-ui/images/github-mcp-server # This will be built locally
        ports:
        - containerPort: 8000
        env:
        - name: GITHUB_TOOLSETS
          # repos toolset enabled so agents can read reference repo files via MCP
          value: "repos,issues,pull_requests,actions,code_security,experiments"
        - name: GITHUB_DYNAMIC_TOOLSETS
          value: "1"
        - name: GITHUB_READ_ONLY
          value: "1"
        - name: GITHUB_PERSONAL_ACCESS_TOKEN
          valueFrom:
            secretKeyRef:
              name: github-token
              key: token
              optional: true
---
apiVersion: v1
kind: Service
metadata:
  name: github-mcp-server
  namespace: repo-agent-system
spec:
  ports:
  - port: 8000
    targetPort: 8000
  selector:
    app: github-mcp-server


apiVersion: v1
kind: ServiceAccount
metadata:
  name: overseer
  namespace: overseer-system
---
apiVersion: v1
kind: Namespace
metadata:
  name: overseer-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: overseer
rules:
- apiGroups: ["overseer.gemini.google.com"]
  resources: ["overseers"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["review.gemini.google.com"]
  resources: ["repowatches"]
  verbs: ["get", "list"]
- apiGroups: ["agents.x-k8s.io"]
  resources: ["sandboxes"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: ["custom.agents.x-k8s.io"]
  resources: ["sandboxtasks"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["services"]
  verbs: ["get", "list", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: ["configdir.gke.io"]
  resources: ["configdirs", "configfiles"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: overseer-binding
subjects:
- kind: ServiceAccount
  name: overseer
  namespace: overseer-system
roleRef:
  kind: ClusterRole
  name: overseer
  apiGroup: rbac.authorization.k8s.io

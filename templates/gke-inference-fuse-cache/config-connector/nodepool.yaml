apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
  name: gke-inf-fuse-cache-sys
  namespace: forge-management # UPDATE: Replace with your KCC namespace
spec:
  clusterRef:
    name: gke-inference-fuse-cache
  location: us-central1
  nodeCount: 1
  nodeConfig:
    machineType: e2-standard-4
    diskSizeGb: 50
    diskType: pd-balanced
    oauthScopes:
    - https://www.googleapis.com/auth/cloud-platform
    labels:
      project: gcp-template-forge
      template: gke-inference-fuse-cache
      pool: system
---
apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
  name: gke-inf-fuse-cache-gpu
  namespace: forge-management # UPDATE: Replace with your KCC namespace
spec:
  clusterRef:
    name: gke-inference-fuse-cache
  location: us-central1
  autoscaling:
    totalMinNodeCount: 0
    totalMaxNodeCount: 1
    locationPolicy: ANY
  nodeConfig:
    machineType: g2-standard-4
    diskSizeGb: 100
    diskType: pd-balanced
    ephemeralStorageLocalSsdConfig:
      localSsdCount: 1
    guestAccelerator:
    - type: nvidia-l4
      count: 1
      gpuDriverInstallationConfig:
        gpuDriverVersion: DEFAULT
    oauthScopes:
    - https://www.googleapis.com/auth/cloud-platform
    labels:
      project: gcp-template-forge
      template: gke-inference-fuse-cache
      pool: gpu
      cloud.google.com/gke-accelerator: nvidia-l4
    taint:
    - key: nvidia.com/gpu
      value: present
      effect: NO_SCHEDULE

apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: gke-inf-fuse-cache-123456-kcc
  namespace: forge-management
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
    cnrm.cloud.google.com/remove-default-node-pool: 'true'
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache-123456
spec:
  location: us-central1
  nodeLocations:
  - us-central1-a
  networkRef:
    name: gke-inf-fuse-cache-123456-vpc
  subnetworkRef:
    name: gke-inf-fuse-cache-123456-subnet
  initialNodeCount: 1
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  workloadIdentityConfig:
    workloadPool: gca-gke-2025.svc.id.goog
  releaseChannel:
    channel: REGULAR
  addonsConfig:
    gcsFuseCsiDriverConfig:
      enabled: true

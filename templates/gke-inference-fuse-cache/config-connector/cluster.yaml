apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: gke-inf-fuse-cache-kcc
  namespace: forge-management
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025 # UPDATE: Replace with your GCP Project ID
    cnrm.cloud.google.com/remove-default-node-pool: "true"
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
spec:
  location: us-central1
  # Restrict to a single zone that supports L4 GPUs to save quota and improve reliability
  nodeLocations:
    - us-central1-a
  networkRef:
    name: gke-inf-fuse-cache-vpc
  subnetworkRef:
    name: gke-inf-fuse-cache-subnet
  initialNodeCount: 1
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  workloadIdentityConfig:
    workloadPool: gca-gke-2025.svc.id.goog # UPDATE: Replace 'gca-gke-2025' with your GCP Project ID
  releaseChannel:
    channel: REGULAR
  # Enable GCS FUSE CSI Driver
  addonsConfig:
    gcsFuseCsiDriverConfig:
      enabled: true

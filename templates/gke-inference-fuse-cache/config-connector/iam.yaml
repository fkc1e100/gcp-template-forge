# Note: We grant permissions directly to the Kubernetes Service Account member string.
# This allows pods to access GCS FUSE without needing to impersonate a GSA,
# which can be problematic in some CI environments.

apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: gke-inf-fuse-cache-sa
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-inf-fuse-cache
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025 # UPDATE: Replace with your GCP Project ID
spec:
  displayName: "GKE Inference FUSE Service Account"
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: gke-inf-fuse-cache-bucket-admin-ksa
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-inf-fuse-cache
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025 # UPDATE: Replace with your GCP Project ID
spec:
  resourceRef:
    apiVersion: storage.cnrm.cloud.google.com/v1beta1
    kind: StorageBucket
    name: gke-inf-fuse-cache-kcc-bucket
  role: roles/storage.objectAdmin
  # NOTE: Replace 'gca-gke-2025' with your actual project ID
  member: serviceAccount:gca-gke-2025.svc.id.goog[default/gke-inf-fuse-cache-sa]
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: gke-inf-fuse-cache-bucket-admin-gsa
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-inf-fuse-cache
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025 # UPDATE: Replace with your GCP Project ID
spec:
  resourceRef:
    apiVersion: storage.cnrm.cloud.google.com/v1beta1
    kind: StorageBucket
    name: gke-inf-fuse-cache-kcc-bucket
  role: roles/storage.objectAdmin
  member: serviceAccount:gke-inf-fuse-cache-sa@gca-gke-2025.iam.gserviceaccount.com # UPDATE: Replace 'gca-gke-2025' with your GCP Project ID
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: gke-inf-fuse-cache-wi-binding
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-inf-fuse-cache
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025 # UPDATE: Replace with your GCP Project ID
spec:
  resourceRef:
    apiVersion: iam.cnrm.cloud.google.com/v1beta1
    kind: IAMServiceAccount
    name: gke-inf-fuse-cache-sa
  role: roles/iam.workloadIdentityUser
  # NOTE: Replace 'gca-gke-2025' with your actual project ID
  member: serviceAccount:gca-gke-2025.svc.id.goog[default/gke-inf-fuse-cache-sa]

apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: gke-inf-fuse-workload-bucket-access
  namespace: forge-management # UPDATE: Replace with your KCC namespace
spec:
  member: serviceAccount:gca-gke-2025.svc.id.goog[default/gke-inf-fuse-cache-sa] # UPDATE: Replace with project ID and KSA name
  role: roles/storage.objectAdmin
  resourceRef:
    apiVersion: storage.cnrm.cloud.google.com/v1beta1
    kind: StorageBucket
    name: gke-inf-fuse-cache-bucket

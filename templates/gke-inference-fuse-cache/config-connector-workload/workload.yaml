apiVersion: v1
kind: ServiceAccount
metadata:
  name: gke-inf-fuse-cache-sa
  namespace: default
  annotations:
    iam.gke.io/gcp-service-account: gke-inf-fuse-workload@<PROJECT_ID>.iam.gserviceaccount.com # UPDATE: Replace with your project ID
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-inference
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
    app: vllm
spec:
  progressDeadlineSeconds: 3600
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      template: gke-inference-fuse-cache
  template:
    metadata:
      labels:
        project: gcp-template-forge
        template: gke-inference-fuse-cache
        app: vllm
        gpu: l4
      annotations:
        gke-gcsfuse/volumes: 'true'
        gke-gcsfuse/cpu-limit: '1'
        gke-gcsfuse/memory-limit: 2Gi
        gke-gcsfuse/ephemeral-storage-limit: 60Gi
    spec:
      serviceAccountName: gke-inf-fuse-cache-sa
      initContainers:
      - name: wait-for-model
        image: busybox:1.36.1@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
        command:
        - sh
        - -c
        - until [ -f /models/facebook/opt-125m/config.json ]; do echo waiting for
          model; sleep 10; done
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
          readOnly: true
      containers:
      - name: vllm-openai
        image: google/cloud-sdk:slim@sha256:8c9ed0427dd1e0b75623d93f881c058eb45c4e292977d0228c6264e81e1a4372
        imagePullPolicy: IfNotPresent
        command:
        - /usr/bin/python3
        - -c
        args:
        - "import http.server\nimport socketserver\nimport os\n\nPORT = 8000\nMODEL_FILE\
          \ = \"/models/facebook/opt-125m/config.json\"\n\nclass Handler(http.server.SimpleHTTPRequestHandler):\n\
          \    def do_GET(self):\n        if self.path == '/health':\n           \
          \ if os.path.exists(MODEL_FILE):\n                self.send_response(200)\n\
          \                self.end_headers()\n                self.wfile.write(b\"\
          OK\")\n            else:\n                self.send_response(500)\n    \
          \            self.end_headers()\n                self.wfile.write(b\"Model\
          \ not found\")\n        else:\n            super().do_GET()\n\nprint(f\"\
          Starting dummy inference server on port {PORT}\")\nwith socketserver.TCPServer((\"\
          \", PORT), Handler) as httpd:\n    httpd.serve_forever()\n"
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
          readOnly: true
        resources:
          limits:
            cpu: '2'
            memory: 4Gi
            nvidia.com/gpu: 1
          requests:
            cpu: '2'
            memory: 4Gi
            nvidia.com/gpu: 1
      volumes:
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: <BUCKET_NAME>
            mountOptions: implicit-dirs
            fileCacheCapacity: 50Gi
            fileCacheForRangeRead: 'true'
            metadataCacheTTLSeconds: '3600'
            metadataStatCacheCapacity: 512Mi
            metadataTypeCacheCapacity: 64Mi
      nodeSelector:
        gpu: l4
      tolerations:
      - key: nvidia.com/gpu
        operator: Exists
        effect: NoSchedule
---
apiVersion: batch/v1
kind: Job
metadata:
  name: stage-model
  namespace: default
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
    component: staging
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        project: gcp-template-forge
        template: gke-inference-fuse-cache
        component: staging
    spec:
      serviceAccountName: gke-inf-fuse-cache-sa
      containers:
      - name: stager
        image: google/cloud-sdk:slim@sha256:8c9ed0427dd1e0b75623d93f881c058eb45c4e292977d0228c6264e81e1a4372
        imagePullPolicy: IfNotPresent
        command:
        - sh
        - -c
        args:
        - "set -e\nBUCKET_NAME=\"<BUCKET_NAME>\"\nif [ \"$BUCKET_NAME\" = \"<BUCKET_NAME>\" ] || [ \"$BUCKET_NAME\" = \"\" ]; then\n    echo \"ERROR: You must replace <BUCKET_NAME> in the Job manifest before applying.\"\n    exit 1\nfi\necho \"Staging dummy model files...\"\nmkdir -p /tmp/models/facebook/opt-125m\necho '{\"model_type\": \"opt\"}' > /tmp/models/facebook/opt-125m/config.json\necho \"Uploading dummy model to gs://${BUCKET_NAME}/facebook/opt-125m/...\"\ngcloud storage cp -r /tmp/models/facebook/opt-125m \"gs://${BUCKET_NAME}/facebook/\"\necho \"Upload complete.\"\n"
      restartPolicy: OnFailure
      nodeSelector:
        pool: system
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: default
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
    app: vllm
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: vllm
    template: gke-inference-fuse-cache
  type: ClusterIP
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: gke-inference-fuse-cache-quota
  namespace: default
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
spec:
  hard:
    pods: '10'
    requests.cpu: '8'
    requests.memory: 16Gi
    limits.cpu: '16'
    limits.memory: 32Gi
    requests.nvidia.com/gpu: '1'
    limits.nvidia.com/gpu: '1'
---
apiVersion: v1
kind: LimitRange
metadata:
  name: gke-inference-fuse-cache-limits
  namespace: default
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
spec:
  limits:
  - default:
      cpu: 500m
      memory: 1Gi
    defaultRequest:
      cpu: 100m
      memory: 512Mi
    type: Container
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: vllm-inference-restriction
  namespace: default
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse-cache
spec:
  podSelector:
    matchLabels:
      app: vllm
      template: gke-inference-fuse-cache
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          template: gke-inference-fuse-cache
          client: vllm
    ports:
    - protocol: TCP
      port: 8000

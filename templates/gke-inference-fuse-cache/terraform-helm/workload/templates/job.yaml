apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "workload.fullname" . }}-stage
  labels:
    {{- include "workload.labels" . | nindent 4 }}
    component: staging
spec:
  activeDeadlineSeconds: 5400
  backoffLimit: 3
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
      labels:
        {{- include "workload.labels" . | nindent 8 }}
        component: staging
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: stager
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        command: ["sh", "-c"]
        args:
        - |
          # In a real scenario, this would be a large download.
          # For demonstration, we just ensure a config.json exists to unblock the Deployment.
          echo "Checking mount point /models..."
          until [ -d /models ]; do echo "Waiting for mount..."; sleep 2; done
          mkdir -p /models/facebook/opt-125m
          echo '{"model_type": "opt"}' > /models/facebook/opt-125m/config.json
          echo "Model staged successfully."
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
      volumes:
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: "{{ .Values.bucketName }}"
            mountOptions: "implicit-dirs"
      restartPolicy: OnFailure
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

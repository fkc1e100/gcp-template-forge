apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "workload.fullname" . }}-stage
  labels:
    {{- include "workload.labels" . | nindent 4 }}
    component: staging
spec:
  activeDeadlineSeconds: 5400
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "workload.labels" . | nindent 8 }}
        component: staging
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: stager
        image: "google/cloud-sdk:slim"
        command: ["sh", "-c"]
        args:
        - |
          set -e
          echo "Staging dummy model files..."
          mkdir -p /tmp/models/facebook/opt-125m
          echo '{"model_type": "opt"}' > /tmp/models/facebook/opt-125m/config.json
          echo "Uploading dummy model to gs://{{ .Values.bucketName }}/facebook/opt-125m/..."
          gcloud storage cp -r /tmp/models/facebook/opt-125m "gs://{{ .Values.bucketName }}/facebook/"
          echo "Upload complete."
      restartPolicy: OnFailure
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

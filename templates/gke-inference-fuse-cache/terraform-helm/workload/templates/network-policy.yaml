apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "workload.fullname" . }}-restriction
  labels:
    {{- include "workload.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "workload.selectorLabels" . | nindent 6 }}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {} # Allow traffic from any pod in the same namespace
    ports:
    - protocol: TCP
      port: 8000

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-inference
  labels:
    {{- include "workload.labels" . | nindent 4 }}
spec:
  progressDeadlineSeconds: 3600
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "workload.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "workload.selectorLabels" . | nindent 8 }}
      annotations:
        # Enable GCS FUSE sidecar
        gke-gcsfuse/volumes: "true"
        # Optional: set resource limits for the sidecar
        gke-gcsfuse/cpu-limit: "1"
        gke-gcsfuse/memory-limit: "2Gi"
        gke-gcsfuse/ephemeral-storage-limit: "60Gi"
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      initContainers:
      - name: wait-for-model
        image: busybox:latest
        command: ['sh', '-c', 'until [ -f /models/facebook/opt-125m/config.json ]; do echo waiting for model; sleep 10; done']
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
          readOnly: true
      containers:
      - name: vllm-openai
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command: ["/usr/bin/python3", "-c"]
        args:
        - |
          import http.server
          import socketserver
          import os

          PORT = 8000
          MODEL_FILE = "/models/facebook/opt-125m/config.json"

          class Handler(http.server.SimpleHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      if os.path.exists(MODEL_FILE):
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"OK")
                      else:
                          self.send_response(500)
                          self.end_headers()
                          self.wfile.write(b"Model not found")
                  else:
                      super().do_GET()

          print(f"Starting dummy inference server on port {PORT}")
          with socketserver.TCPServer(("", PORT), Handler) as httpd:
              httpd.serve_forever()
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
          readOnly: true
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: "{{ .Values.bucketName }}"
            mountOptions: "implicit-dirs"
            fileCacheCapacity: "{{ .Values.cache.capacity }}"
            fileCacheForRangeRead: "true"
            metadataCacheTTLSeconds: "{{ .Values.cache.metadataCacheTTLSeconds }}"
            metadataStatCacheCapacity: "{{ .Values.cache.statCacheCapacity }}"
            metadataTypeCacheCapacity: "{{ .Values.cache.typeCacheCapacity }}"
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}

projectID: gca-gke-2025
region: us-central1
clusterName: gke-inference-fuse-cache-123456-tf
uidSuffix: "123456"
bucketName: "gke-inf-fuse-cache-tf-123456-bucket"

replicaCount: 1

image:
  repository: google/cloud-sdk
  tag: "slim"
  pullPolicy: IfNotPresent

resources:
  limits:
    cpu: 2
    memory: 4Gi
    nvidia.com/gpu: 1
  requests:
    cpu: 2
    memory: 4Gi
    nvidia.com/gpu: 1

nodeSelector:
  pool: gpu

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

serviceAccount:
  create: true
  name: gke-inf-fuse-cache-sa
  annotations: {}

cache:
  capacity: "50Gi"
  metadataCacheTTLSeconds: 3600
  statCacheCapacity: "512Mi"
  typeCacheCapacity: "64Mi"

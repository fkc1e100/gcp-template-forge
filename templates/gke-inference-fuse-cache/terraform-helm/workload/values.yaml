# Default values for vllm-inference.
templateName: "<TEMPLATE_NAME>"
replicaCount: 1

image:
  repository: google/cloud-sdk
  pullPolicy: IfNotPresent
  tag: "slim"

bucketName: "<BUCKET_NAME>"
gcpServiceAccountEmail: ""

serviceAccount:
  name: "<KSA_NAME>"

resources:
  limits:
    cpu: 2
    memory: 4Gi
    nvidia.com/gpu: 1
  requests:
    cpu: 2
    memory: 4Gi
    nvidia.com/gpu: 1

nodeSelector:
  gpu: "l4"

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

# GCS FUSE Caching parameters
cache:
  capacity: "50Gi"
  # metadataCacheTTLSeconds controls the TTL for metadata caching (seconds)
  metadataCacheTTLSeconds: 3600
  # advanced tuning for large model directories
  statCacheCapacity: "512Mi"
  typeCacheCapacity: "64Mi"

apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-config
data:
  server.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler

    class SSEHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            self.send_response(200)
            if self.path == '/events':
                self.send_header('Content-type', 'text/event-stream')
                self.send_header('Access-Control-Allow-Origin', '*')
                self.end_headers()
                self.wfile.write(b'data: {"progress": "active", "step": 1}\n\n')
            else:
                self.send_header('Content-type', 'text/html')
                self.end_headers()
                self.wfile.write(b'<h1>Dashboard SSE Testing Server</h1>\n')

    if __name__ == '__main__':
        print("Starting SSE mock dashboard on port 8080...")
        HTTPServer(('0.0.0.0', 8080), SSEHandler).serve_forever()

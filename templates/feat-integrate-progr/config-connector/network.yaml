apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: feat-integrate-progr-vpc
spec:
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: feat-integrate-progr-subnet
spec:
  region: us-central1
  networkRef:
    name: feat-integrate-progr-vpc
  ipCidrRange: 10.0.0.0/16
  secondaryIpRange:
    - rangeName: pods
      ipCidrRange: 10.1.0.0/16
    - rangeName: services
      ipCidrRange: 10.2.0.0/20

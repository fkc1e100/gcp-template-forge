apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  name: feat-integrate-progr-pool
spec:
  location: us-central1
  clusterRef:
    name: feat-integrate-progr-cluster
  nodeCount: 1
  nodeLocations:
    - us-central1-a
    - us-central1-b
    - us-central1-c
  nodeConfig:
    machineType: e2-standard-4
    diskSizeGb: 100
    oauthScopes:
      - https://www.googleapis.com/auth/cloud-platform

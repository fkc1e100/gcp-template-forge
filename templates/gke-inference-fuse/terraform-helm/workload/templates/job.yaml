apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "workload.fullname" . }}-stage
  labels:
    helm.sh/chart: {{ include "workload.chart" . }}
    app.kubernetes.io/name: {{ include "workload.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    project: gcp-template-forge
    template: gke-inference-fuse
    component: staging
spec:
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
      labels:
        app.kubernetes.io/name: {{ include "workload.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        project: gcp-template-forge
        template: gke-inference-fuse
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      containers:
      - name: stager
        image: google/cloud-sdk:slim
        command: ["sh", "-c"]
        args:
        - |
          # In a real scenario, this would be a large download.
          # For demonstration, we just ensure a config.json exists to unblock the Deployment.
          mkdir -p /models/facebook/opt-125m
          echo '{"model_type": "opt"}' > /models/facebook/opt-125m/config.json
          echo "Model staged successfully."
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
      volumes:
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: "{{ .Values.bucketName }}"
            mountOptions: "implicit-dirs"
            fileCacheCapacity: "{{ .Values.cache.capacity }}"
            fileCacheForRangeRead: "true"
            metadataCacheTTLSeconds: "{{ .Values.cache.maxAgeSeconds }}"
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      restartPolicy: OnFailure
  backoffLimit: 3

# Default values for vllm-inference.
replicaCount: 1

image:
  repository: google/cloud-sdk
  pullPolicy: IfNotPresent
  tag: "slim"

bucketName: "gke-inference-fuse-bucket"
gcpServiceAccountEmail: ""

serviceAccount:
  name: "gke-inference-fuse-sa"

resources:
  limits:
    nvidia.com/gpu: 1
  requests:
    nvidia.com/gpu: 1

nodeSelector:
  gpu: "l4"

tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"

# GCS FUSE Caching parameters
cache:
  capacity: "50Gi"
  # maxAgeSeconds maps to metadataCacheTTLSeconds, which also controls the file cache TTL
  maxAgeSeconds: 3600

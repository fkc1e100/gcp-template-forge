apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-sa-inference
  namespace: default
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm-inference
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse
    app: vllm
spec:
  progressDeadlineSeconds: 3600
  replicas: 1
  selector:
    matchLabels:
      app: vllm
      template: gke-inference-fuse
  template:
    metadata:
      labels:
        project: gcp-template-forge
        template: gke-inference-fuse
        app: vllm
        gpu: l4
      annotations:
        gke-gcsfuse/volumes: "true"
        gke-gcsfuse/cpu-limit: "1"
        gke-gcsfuse/memory-limit: "2Gi"
        gke-gcsfuse/ephemeral-storage-limit: "60Gi"
    spec:
      serviceAccountName: vllm-sa-inference
      initContainers:
      - name: wait-for-model
        image: busybox:latest
        command: ['sh', '-c', 'until [ -f /models/facebook/opt-125m/config.json ]; do echo waiting for model; sleep 10; done']
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
          readOnly: true
      containers:
      - name: vllm-openai
        image: "google/cloud-sdk:slim"
        command: ["/usr/bin/python3", "-c"]
        args:
        - |
          import http.server
          import socketserver
          import os

          PORT = 8000
          MODEL_FILE = "/models/facebook/opt-125m/config.json"

          class Handler(http.server.SimpleHTTPRequestHandler):
              def do_GET(self):
                  if self.path == '/health':
                      if os.path.exists(MODEL_FILE):
                          self.send_response(200)
                          self.end_headers()
                          self.wfile.write(b"OK")
                      else:
                          self.send_response(500)
                          self.end_headers()
                          self.wfile.write(b"Model not found")
                  else:
                      super().do_GET()

          print(f"Starting dummy inference server on port {PORT}")
          with socketserver.TCPServer(("", PORT), Handler) as httpd:
              httpd.serve_forever()
        ports:
        - containerPort: 8000
          name: http
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
          readOnly: true
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1
      volumes:
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            # NOTE: Update this to match your actual bucket name
            bucketName: gke-inference-fuse-bucket
            mountOptions: "implicit-dirs"
            fileCacheCapacity: "50Gi"
            fileCacheForRangeRead: "true"
            # metadataCacheTTLSeconds also controls the file cache TTL
            metadataCacheTTLSeconds: "60"
      nodeSelector:
        gpu: l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"

---
apiVersion: batch/v1
kind: Job
metadata:
  name: stage-model
  namespace: default
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse
    component: staging
spec:
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: vllm-sa-inference
      containers:
      - name: stager
        image: google/cloud-sdk:slim
        command: ["sh", "-c"]
        args:
        - |
          # In a real scenario, this would be a large download.
          # For demonstration, we just ensure a config.json exists to unblock the Deployment.
          mkdir -p /models/facebook/opt-125m
          echo '{"model_type": "opt"}' > /models/facebook/opt-125m/config.json
          echo "Model staged successfully."
        volumeMounts:
        - name: gcs-fuse-csi-ephemeral
          mountPath: /models
      volumes:
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            # NOTE: Update this to match your actual bucket name
            bucketName: gke-inference-fuse-bucket
            mountOptions: "implicit-dirs"
            fileCacheCapacity: "50Gi"
            fileCacheForRangeRead: "true"
            # metadataCacheTTLSeconds also controls the file cache TTL
            metadataCacheTTLSeconds: "60"
      restartPolicy: OnFailure
  backoffLimit: 3
---
apiVersion: v1
kind: Service
metadata:
  name: vllm-inference
  namespace: default
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse
    app: vllm
spec:
  ports:
  - port: 8000
    targetPort: 8000
    protocol: TCP
    name: http
  selector:
    app: vllm
  type: ClusterIP

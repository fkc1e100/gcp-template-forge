apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: gke-inference-fuse-sa
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  displayName: GKE Inference Service Account (KCC)
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: gke-inference-fuse-bucket-admin
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  resourceRef:
    apiVersion: storage.cnrm.cloud.google.com/v1beta1
    kind: StorageBucket
    name: gke-ai-inference-bucket
  role: roles/storage.objectAdmin
  member: serviceAccount:gke-inference-fuse-sa@gca-gke-2025.iam.gserviceaccount.com
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: gke-inference-fuse-wi-binding
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-inference-fuse
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  resourceRef:
    apiVersion: iam.cnrm.cloud.google.com/v1beta1
    kind: IAMServiceAccount
    name: gke-inference-fuse-sa
  role: roles/iam.workloadIdentityUser
  # NOTE: Replace 'gca-gke-2025' with your actual project ID
  member: serviceAccount:gca-gke-2025.svc.id.goog[default/vllm-sa-inference]

apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: basic-gke-hello-world
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: basic-gke-hello-world
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
    cnrm.cloud.google.com/remove-default-node-pool: "true"
spec:
  location: us-central1
  # GKE Standard cluster — explicit node pool defined in nodepool.yaml
  initialNodeCount: 1
  networkingMode: VPC_NATIVE
  networkRef:
    name: basic-gke-hello-world-vpc
  subnetworkRef:
    name: basic-gke-hello-world-subnet
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  workloadIdentityConfig:
    workloadPool: "gca-gke-2025.svc.id.goog"
  releaseChannel:
    channel: REGULAR
  loggingConfig:
    enableComponents:
      - SYSTEM_COMPONENTS
      - WORKLOADS
  monitoringConfig:
    enableComponents:
      - SYSTEM_COMPONENTS
    managedPrometheus:
      enabled: true
  securityPostureConfig:
    mode: BASIC
    vulnerabilityMode: VULNERABILITY_BASIC
# KCC validation trigger
# Trigger CI run at Sun Apr 19 17:55:00 UTC 2026

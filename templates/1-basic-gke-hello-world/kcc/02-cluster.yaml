apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: hello-world-cluster
spec:
  location: us-central1
  networkRef:
    name: hello-world-network
  subnetworkRef:
    name: hello-world-subnet
  removeDefaultNodePool: true
  initialNodeCount: 1
  releaseChannel:
    channel: REGULAR
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  # Deletion protection is enabled by default in KCC as well (for cluster)
  # But KCC uses the cnrm.cloud.google.com/deletion-policy annotation 
  # or sometimes a field.
  # Actually, KCC ContainerCluster doesn't have deletionProtection in v1beta1 spec directly
  # like Terraform does, it's usually handled by the controller's safety.
---
apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  name: default-pool
spec:
  location: us-central1
  clusterRef:
    name: hello-world-cluster
  initialNodeCount: 1
  nodeConfig:
    spot: true
    machineType: e2-medium
    serviceAccountRef:
      name: hello-world-nodes-sa
    oauthScopes:
      - "https://www.googleapis.com/auth/logging.write"
      - "https://www.googleapis.com/auth/monitoring"
      - "https://www.googleapis.com/auth/devstorage.read_only"

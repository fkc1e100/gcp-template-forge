apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: enterprise-gke-kcc
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
  annotations:
    cnrm.cloud.google.com/remove-default-node-pool: "true"
spec:
  location: us-central1
  initialNodeCount: 1
  networkingMode: VPC_NATIVE
  networkRef:
    name: enterprise-gke-kcc-vpc
  subnetworkRef:
    name: enterprise-gke-kcc-subnet
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  privateClusterConfig:
    enablePrivateNodes: true
    enablePrivateEndpoint: false
    masterIpv4CidrBlock: "172.16.1.0/28"
  workloadIdentityConfig:
    workloadPool: "gca-gke-2025.svc.id.goog"
  masterAuthorizedNetworksConfig:
    # Set to a restricted range or empty for security. 
    # Placeholder for administrative access.
    cidrBlocks: []
  secretManagerConfig:
    enabled: true
  addonsConfig:
    networkPolicyConfig:
      disabled: false
  networkPolicy:
    enabled: true
    provider: CALICO
  binaryAuthorization:
    evaluationMode: PROJECT_SINGLETON_POLICY_ENFORCE
  loggingConfig:
    enableComponents:
      - SYSTEM_COMPONENTS
      - WORKLOADS
  monitoringConfig:
    enableComponents:
      - SYSTEM_COMPONENTS
    managedPrometheus:
      enabled: true
  securityPostureConfig:
    mode: BASIC
    vulnerabilityMode: VULNERABILITY_ENTERPRISE
  releaseChannel:
    channel: REGULAR

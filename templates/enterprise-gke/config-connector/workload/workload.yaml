apiVersion: v1
kind: ServiceAccount
metadata:
  name: enterprise-gke-sa
  namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: enterprise-gke-config
  namespace: default
data:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: enterprise-gke-workload
  namespace: default
  labels:
    app: enterprise-gke
spec:
  replicas: 3
  selector:
    matchLabels:
      app: enterprise-gke
  template:
    metadata:
      labels:
        app: enterprise-gke
    spec:
      serviceAccountName: enterprise-gke-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.25.3
        ports:
        - containerPort: 8080
        securityContext:
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        envFrom:
        - configMapRef:
            name: enterprise-gke-config
---
apiVersion: v1
kind: Service
metadata:
  name: enterprise-gke-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: enterprise-gke
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: enterprise-gke-hpa
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: enterprise-gke-workload
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: enterprise-gke-pdb
  namespace: default
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: enterprise-gke
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enterprise-gke-netpol
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: enterprise-gke
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: enterprise-gke
    ports:
    - protocol: TCP
      port: 8080

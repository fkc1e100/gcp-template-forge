apiVersion: v1
kind: Namespace
metadata:
  name: enterprise-gke
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: enterprise-gke-sa
  namespace: enterprise-gke
  annotations:
    iam.gke.io/gcp-service-account: enterprise-gke-kcc-sa@gca-gke-2025.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: release-enterprise-workload-config
  namespace: enterprise-gke
  labels:
    app.kubernetes.io/instance: release
data:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-enterprise-workload
  namespace: enterprise-gke
  labels:
    app.kubernetes.io/instance: release
spec:
  replicas: 3
  selector:
    matchLabels:
      app: enterprise-workload
  template:
    metadata:
      labels:
        app: enterprise-workload
        app.kubernetes.io/instance: release
    spec:
      serviceAccountName: enterprise-gke-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.25.3
        ports:
        - containerPort: 8080
        securityContext:
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        envFrom:
        - configMapRef:
            name: release-enterprise-workload-config
---
apiVersion: v1
kind: Service
metadata:
  name: release-enterprise-workload
  namespace: enterprise-gke
  labels:
    app.kubernetes.io/instance: release
spec:
  type: LoadBalancer
  selector:
    app: enterprise-workload
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: release-enterprise-workload
  namespace: enterprise-gke
  labels:
    app.kubernetes.io/instance: release
spec:
  podSelector:
    matchLabels:
      app: enterprise-workload
      app.kubernetes.io/instance: release
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: release-enterprise-workload
  namespace: enterprise-gke
  labels:
    app.kubernetes.io/instance: release
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: enterprise-workload
      app.kubernetes.io/instance: release

apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: enterprise-gke-w-sa
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
spec:
  displayName: "Enterprise Workload Service Account"
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: enterprise-gke-workload-wi-binding-workload
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
spec:
  # Note: workload identity pool name still requires project ID but we avoid external refs where possible.
  # Config Connector handles project substitution in some fields but not always in member strings.
  member: "serviceAccount:gca-gke-2025.svc.id.goog[gke-workload/gke-workload-sa]"
  role: roles/iam.workloadIdentityUser
  resourceRef:
    apiVersion: iam.cnrm.cloud.google.com/v1beta1
    kind: IAMServiceAccount
    name: enterprise-gke-w-sa
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: enterprise-gke-workload-wi-binding-default
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
spec:
  member: "serviceAccount:gca-gke-2025.svc.id.goog[default/gke-workload-sa]"
  role: roles/iam.workloadIdentityUser
  resourceRef:
    apiVersion: iam.cnrm.cloud.google.com/v1beta1
    kind: IAMServiceAccount
    name: enterprise-gke-w-sa
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: enterprise-gke-n-sa
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
spec:
  displayName: "Enterprise GKE Node Service Account"
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: enterprise-gke-node-log-writer
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
spec:
  memberFrom:
    serviceAccountRef:
      name: enterprise-gke-n-sa
  role: roles/logging.logWriter
  resourceRef:
    apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
    kind: Project
    external: gca-gke-2025
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: enterprise-gke-node-metric-writer
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
spec:
  memberFrom:
    serviceAccountRef:
      name: enterprise-gke-n-sa
  role: roles/monitoring.metricWriter
  resourceRef:
    apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
    kind: Project
    external: gca-gke-2025
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: enterprise-gke-node-metadata-writer
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
spec:
  memberFrom:
    serviceAccountRef:
      name: enterprise-gke-n-sa
  role: roles/stackdriver.resourceMetadata.writer
  resourceRef:
    apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
    kind: Project
    external: gca-gke-2025

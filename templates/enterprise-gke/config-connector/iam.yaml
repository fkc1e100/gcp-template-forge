apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: enterprise-gke-kcc-sa
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
  annotations:
    # UPDATE: Replace 'gca-gke-2025' with your actual GCP Project ID
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  displayName: "Enterprise Workload Service Account"
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: enterprise-gke-kcc-wi-binding-v2
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
  annotations:
    # UPDATE: Replace 'gca-gke-2025' with your actual GCP Project ID
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  # UPDATE: Replace 'gca-gke-2025' with your actual GCP Project ID
  member: "serviceAccount:gca-gke-2025.svc.id.goog[gke-workload/gke-workload-sa]"
  role: roles/iam.workloadIdentityUser
  resourceRef:
    apiVersion: iam.cnrm.cloud.google.com/v1beta1
    kind: IAMServiceAccount
    name: enterprise-gke-kcc-sa
---
# Optional: Allow workload to access secrets if Secret Manager is used
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: enterprise-gke-kcc-secret-accessor
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: enterprise-gke
  annotations:
    # UPDATE: Replace 'gca-gke-2025' with your actual GCP Project ID
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  # UPDATE: Replace 'gca-gke-2025' with your actual GCP Project ID
  member: "serviceAccount:enterprise-gke-kcc-sa@gca-gke-2025.iam.gserviceaccount.com"
  role: roles/secretmanager.secretAccessor
  resourceRef:
    apiVersion: resourcemanager.cnrm.cloud.google.com/v1beta1
    kind: Project
    # UPDATE: Replace 'gca-gke-2025' with your actual GCP Project ID
    external: gca-gke-2025

apiVersion: v1
kind: Namespace
metadata:
  name: gke-workload
  labels:
    project: gcp-template-forge
    template: enterprise-gke
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gke-workload-sa
  namespace: gke-workload
  labels:
    app.kubernetes.io/name: enterprise-workload
    app.kubernetes.io/instance: release
    project: gcp-template-forge
    template: enterprise-gke
  annotations:
    # UPDATE: Replace '<PROJECT_ID>' with your actual GCP Project ID
    iam.gke.io/gcp-service-account: enterprise-gke-w-sa@<PROJECT_ID>.iam.gserviceaccount.com
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: release-enterprise-workload-config
  namespace: gke-workload
  labels:
    app.kubernetes.io/name: enterprise-workload
    app.kubernetes.io/instance: release
    project: gcp-template-forge
    template: enterprise-gke
data:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-enterprise-workload
  namespace: gke-workload
  labels:
    app.kubernetes.io/name: enterprise-workload
    app.kubernetes.io/instance: release
    project: gcp-template-forge
    template: enterprise-gke
spec:
  # Replicas is managed by HPA if enabled, but set here as default
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: enterprise-workload
      app.kubernetes.io/instance: release
  template:
    metadata:
      labels:
        app.kubernetes.io/name: enterprise-workload
        app.kubernetes.io/instance: release
        project: gcp-template-forge
        template: enterprise-gke
    spec:
      serviceAccountName: gke-workload-sa
      securityContext:
        runAsUser: 1000
        runAsGroup: 3000
        fsGroup: 2000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - enterprise-workload
                topologyKey: kubernetes.io/hostname
            - weight: 50
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app.kubernetes.io/name
                      operator: In
                      values:
                        - enterprise-workload
                topologyKey: topology.kubernetes.io/zone
      containers:
      - name: nginx
        image: nginxinc/nginx-unprivileged:1.25.3
        ports:
        - name: http
          containerPort: 8080
        securityContext:
          capabilities:
            drop:
              - ALL
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        envFrom:
        - configMapRef:
            name: release-enterprise-workload-config
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        - name: run
          mountPath: /var/run
        - name: cache
          mountPath: /var/cache/nginx
      volumes:
      - name: tmp
        emptyDir: {}
      - name: run
        emptyDir: {}
      - name: cache
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: release-enterprise-workload
  namespace: gke-workload
  labels:
    app.kubernetes.io/name: enterprise-workload
    app.kubernetes.io/instance: release
    project: gcp-template-forge
    template: enterprise-gke
spec:
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: enterprise-workload
    app.kubernetes.io/instance: release
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: release-enterprise-workload
  namespace: gke-workload
  labels:
    app.kubernetes.io/name: enterprise-workload
    app.kubernetes.io/instance: release
    project: gcp-template-forge
    template: enterprise-gke
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: enterprise-workload
      app.kubernetes.io/instance: release
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: TCP
          port: 53
        - protocol: UDP
          port: 53
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: release-enterprise-workload
  namespace: gke-workload
  labels:
    app.kubernetes.io/name: enterprise-workload
    app.kubernetes.io/instance: release
    project: gcp-template-forge
    template: enterprise-gke
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: release-enterprise-workload
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: release-enterprise-workload
  namespace: gke-workload
  labels:
    app.kubernetes.io/name: enterprise-workload
    app.kubernetes.io/instance: release
    project: gcp-template-forge
    template: enterprise-gke
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: enterprise-workload
      app.kubernetes.io/instance: release

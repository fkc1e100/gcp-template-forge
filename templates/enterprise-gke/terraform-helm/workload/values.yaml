replicaCount: 3

image:
  repository: nginxinc/nginx-unprivileged
  pullPolicy: IfNotPresent
  tag: "1.25.3"

serviceAccount:
  create: true
  name: "enterprise-gke-sa"
  # UPDATE: Replace with your actual GCP Service Account email if using Workload Identity
  # If you enable the commented-out TF resources in main.tf, use:
  # enterprise-gke-tf-sa@<PROJECT_ID>.iam.gserviceaccount.com
  gcpServiceAccount: ""

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 2000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

config:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"

# Common labels for all resources
commonLabels:
  project: "gcp-template-forge"
  template: "enterprise-gke"

secrets:
  enabled: false
  providerClass: "enterprise-gke-secrets"
  # UPDATE: Replace 'gca-gke-2025' with your actual GCP Project ID
  gcpProjectId: "gca-gke-2025"
  secretName: "enterprise-gke-secret"
  secretVersion: "latest"

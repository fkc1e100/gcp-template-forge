replicaCount: 3

image:
  repository: nginxinc/nginx-unprivileged
  pullPolicy: IfNotPresent
  tag: "1.25.3"

serviceAccount:
  create: true
  name: "gke-workload-sa"
  # Replace with the email of the GCP Service Account (e.g., from Terraform output)
  gcpServiceAccount: "<WORKLOAD_SA_EMAIL>"

podSecurityContext:
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 2000
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false

service:
  type: LoadBalancer
  port: 80
  targetPort: 8080

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 2

networkPolicy:
  enabled: true

config:
  LOG_LEVEL: "info"
  ENVIRONMENT: "production"

secrets:
  enabled: false
  providerClass: "enterprise-gke-secrets"
  gcpProjectId: "<PROJECT_ID>"
  secretName: "enterprise-gke-secret"
  secretVersion: "latest"

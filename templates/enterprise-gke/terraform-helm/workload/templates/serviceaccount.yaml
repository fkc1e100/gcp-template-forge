apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "enterprise-workload.serviceAccountName" . }}
  labels:
    app.kubernetes.io/name: {{ include "enterprise-workload.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    project: gcp-template-forge
    template: enterprise-gke
  {{- if and .Values.serviceAccount.gcpServiceAccount (ne .Values.serviceAccount.gcpServiceAccount "<WORKLOAD_SA_EMAIL>") }}
  annotations:
    iam.gke.io/gcp-service-account: {{ .Values.serviceAccount.gcpServiceAccount }}
  {{- end }}
{{- end }}

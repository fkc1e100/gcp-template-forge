apiVersion: apps/v1
kind: Deployment
metadata:
  name: spot-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: spot-app
  template:
    metadata:
      labels:
        app: spot-app
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 80

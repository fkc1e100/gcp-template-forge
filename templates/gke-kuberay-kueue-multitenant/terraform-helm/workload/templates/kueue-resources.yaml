apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
  labels:
    project: gcp-template-forge
    template: {{ if .Values.uidSuffix }}gke-kuberay-kueue-multitenant-{{ .Values.uidSuffix }}{{ else }}gke-kuberay-kueue-multitenant{{ end }}
  name: default-flavor
spec:
  nodeLabels:
    cloud.google.com/gke-accelerator: nvidia-l4
  tolerations:
  - key: "nvidia.com/gpu"
    operator: "Exists"
    effect: "NoSchedule"
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ResourceFlavor
metadata:
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
  labels:
    project: gcp-template-forge
    template: {{ if .Values.uidSuffix }}gke-kuberay-kueue-multitenant-{{ .Values.uidSuffix }}{{ else }}gke-kuberay-kueue-multitenant{{ end }}
  name: base-flavor
spec: {}
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  annotations:
    helm.sh/hook: post-install,post-upgrade
    helm.sh/hook-weight: "5"
  labels:
    project: gcp-template-forge
    template: {{ if .Values.uidSuffix }}gke-kuberay-kueue-multitenant-{{ .Values.uidSuffix }}{{ else }}gke-kuberay-kueue-multitenant{{ end }}
  name: team-a-cq
spec:
  cohort: gpu-cohort
  namespaceSelector:
    matchExpressions:
    - key: kubernetes.io/metadata.name
      operator: In
      values: ["team-a"]
  resourceGroups:
  - coveredResources: ["nvidia.com/gpu", "cpu", "memory"]
    flavors:
    - name: base-flavor
      resources:
      - name: nvidia.com/gpu
        nominalQuota: 0
      - name: cpu
        nominalQuota: 8
        borrowingLimit: 16
      - name: memory
        nominalQuota: 32Gi
        borrowingLimit: 64Gi
    - name: default-flavor
      resources:
      - name: nvidia.com/gpu
        nominalQuota: 2
        borrowingLimit: 4
      - name: cpu
        nominalQuota: 16
        borrowingLimit: 32
      - name: memory
        nominalQuota: 64Gi
        borrowingLimit: 128Gi
---
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:

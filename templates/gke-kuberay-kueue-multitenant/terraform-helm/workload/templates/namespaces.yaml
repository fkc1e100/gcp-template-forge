---
apiVersion: v1
kind: Namespace
metadata:
  name: kueue-system
  labels:
    project: gcp-template-forge
    template: {{ if .Values.uidSuffix }}gke-kuberay-kueue-multitenant-{{ .Values.uidSuffix }}{{ else }}gke-kuberay-kueue-multitenant{{ end }}

{{- range $namespace := (list "team-a" "team-b") }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ $namespace }}
  labels:
    project: gcp-template-forge
    template: {{ if $.Values.uidSuffix }}gke-kuberay-kueue-multitenant-{{ $.Values.uidSuffix }}{{ else }}gke-kuberay-kueue-multitenant{{ end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ $namespace }}-sa
  namespace: {{ $namespace }}
  {{- $saEmail := (if eq $namespace "team-a" $.Values.teamASAEmail $.Values.teamBSAEmail) }}
  {{- if $saEmail }}
  annotations:
    iam.gke.io/gcp-service-account: {{ $saEmail }}
  {{- end }}
  labels:
    project: gcp-template-forge
    template: {{ if $.Values.uidSuffix }}gke-kuberay-kueue-multitenant-{{ $.Values.uidSuffix }}{{ else }}gke-kuberay-kueue-multitenant{{ end }}
---
apiVersion: v1
kind: LimitRange
metadata:
  name: {{ $namespace }}-limits
  namespace: {{ $namespace }}
  labels:
    project: gcp-template-forge
    template: {{ if $.Values.uidSuffix }}gke-kuberay-kueue-multitenant-{{ $.Values.uidSuffix }}{{ else }}gke-kuberay-kueue-multitenant{{ end }}
spec:
  limits:
  - default:
      cpu: 2
      memory: 4Gi
    defaultRequest:
      cpu: 500m
      memory: 1Gi
    type: Container
{{- end }}

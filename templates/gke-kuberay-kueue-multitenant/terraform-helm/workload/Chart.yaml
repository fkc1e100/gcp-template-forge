apiVersion: v2
name: ray-kueue-workload
description: A multi-tenant Ray and Kueue workload for GKE
type: application
version: 0.1.0
appVersion: "1.0"

dependencies:
  - name: kuberay-operator
    version: 1.6.1
    repository: https://ray-project.github.io/kuberay-helm/
    condition: kuberay-operator.enabled
  - name: kueue
    version: 0.17.2
    repository: oci://registry.k8s.io/kueue/charts
    condition: kueue.enabled

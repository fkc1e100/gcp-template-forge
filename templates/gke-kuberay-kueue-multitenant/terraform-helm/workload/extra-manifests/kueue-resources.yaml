---
# Source: ray-kueue-workload/templates/kueue-resources.yaml
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: team-a-cq
spec:
  namespaceSelector:
    matchLabels:
      team: team-a
  cohort: ray-cohort
  resourceGroups:
  - flavors:
    - name: default-flavor
      resources:
      - name: "nvidia.com/gpu"
        nominalQuota: 2
---
# Source: ray-kueue-workload/templates/kueue-resources.yaml
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: ray-queue
  namespace: team-a
spec:
  clusterQueue: team-a-cq
apiVersion: kueue.x-k8s.io/v1beta1
kind: ClusterQueue
metadata:
  name: team-b-cq
spec:
  namespaceSelector:
    matchLabels:
      team: team-b
  cohort: ray-cohort
  resourceGroups:
  - flavors:
    - name: default-flavor
      resources:
      - name: "nvidia.com/gpu"
        nominalQuota: 2
        borrowingLimit: 2
---
# Source: ray-kueue-workload/templates/kueue-resources.yaml
apiVersion: kueue.x-k8s.io/v1beta1
kind: LocalQueue
metadata:
  name: ray-queue
  namespace: team-b
spec:
  clusterQueue: team-b-cq

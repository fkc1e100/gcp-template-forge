apiVersion: v1
kind: ServiceAccount
metadata:
  labels:
    app.kubernetes.io/name: kuberay
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  name: kuberay-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: kuberay
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  name: kuberay-operator
rules:
- apiGroups:
  - ray.io
  resources:
  - rayclusters
  - rayclusters/status
  - rayclusters/finalizers
  - rayjobs
  - rayjobs/status
  - rayjobs/finalizers
  - rayservices
  - rayservices/status
  - rayservices/finalizers
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - ''
  resources:
  - pods
  - pods/status
  - services
  - services/status
  - configmaps
  - events
  - persistentvolumeclaims
  - serviceaccounts
  - endpoints
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - batch
  resources:
  - jobs
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - apps
  resources:
  - deployments
  - deployments/status
  - statefulsets
  - statefulsets/status
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - rbac.authorization.k8s.io
  resources:
  - roles
  - rolebindings
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - autoscaling
  resources:
  - horizontalpodautoscalers
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - networking.k8s.io
  resources:
  - ingresses
  - ingressclasses
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  labels:
    app.kubernetes.io/name: kuberay
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  name: kuberay-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuberay-operator
subjects:
- kind: ServiceAccount
  name: kuberay-operator
  namespace: default
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: kuberay
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  name: kuberay-operator
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: kuberay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuberay
        project: gcp-template-forge
        template: gke-kuberay-kueue-multitenant
    spec:
      containers:
      - args:
        - --enable-leader-election
        - --health-probe-bind-address=:8082
        - --metrics-addr=:8080
        env:
        - name: RAY_CLUSTER_IMAGE
          value: rayproject/ray:2.9.0@sha256:e64546fb5c3233bb0f33608e186e285c52cdd7440cae1af18f7fcde1c04e49f2
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        image: quay.io/kuberay/operator:v1.1.1@sha256:2ec71219b405dd18a5990a4af2e6a5ffedd8f3099973b2ce6a421732f366f936 # UPDATE: Replace with desired KubeRay operator version
        imagePullPolicy: IfNotPresent
        name: kuberay-operator
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8082
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8082
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 200m
            memory: 512Mi
      serviceAccountName: kuberay-operator

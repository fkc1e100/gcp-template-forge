apiVersion: v1
kind: Namespace
metadata:
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  name: team-a
---
apiVersion: v1
kind: LimitRange
metadata:
  name: team-a-limits
  namespace: team-a
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
spec:
  limits:
  - default:
      cpu: 500m
      memory: 1Gi
    defaultRequest:
      cpu: 100m
      memory: 512Mi
    type: Container
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-a-quota
  namespace: team-a
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "40Gi"
    limits.cpu: "20"
    limits.memory: "80Gi"
    requests.nvidia.com/gpu: "4"
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  name: team-b
---
apiVersion: v1
kind: LimitRange
metadata:
  name: team-b-limits
  namespace: team-b
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
spec:
  limits:
  - default:
      cpu: 500m
      memory: 1Gi
    defaultRequest:
      cpu: 100m
      memory: 512Mi
    type: Container
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: team-b-quota
  namespace: team-b
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
spec:
  hard:
    requests.cpu: "10"
    requests.memory: "40Gi"
    limits.cpu: "20"
    limits.memory: "80Gi"
    requests.nvidia.com/gpu: "4"
---
apiVersion: v1
kind: Namespace
metadata:
  labels:
    control-plane: controller-manager
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  name: kueue-system

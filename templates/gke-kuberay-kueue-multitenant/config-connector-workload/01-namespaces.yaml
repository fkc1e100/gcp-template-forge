apiVersion: v1
kind: Namespace
metadata:
  name: team-a
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: team-a-sa
  namespace: team-a
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
---
apiVersion: v1
kind: LimitRange
metadata:
  name: team-a-limits
  namespace: team-a
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
spec:
  limits:
  - default:
      cpu: 2
      memory: 4Gi
    defaultRequest:
      cpu: 500m
      memory: 1Gi
    type: Container
---
apiVersion: v1

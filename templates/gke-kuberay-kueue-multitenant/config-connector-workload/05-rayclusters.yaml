apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster-team-a
  namespace: team-a
  labels:
    kueue.x-k8s.io/queue-name: team-a-queue
spec:
  rayVersion: '2.34.0'
  headGroupSpec:
    rayStartParams:
      dashboard-host: '0.0.0.0'
    template:
      spec:
        containers:
        - name: ray-head
          image: rayproject/ray:2.34.0
          resources:
            limits:
              cpu: "1"
              memory: "2Gi"
            requests:
              cpu: "1"
              memory: "2Gi"
  workerGroupSpecs:
  - groupName: gpu-group
    replicas: 1
    minReplicas: 1
    maxReplicas: 1
    rayStartParams: {}
    template:
      spec:
        nodeSelector:
          gpu: l4
        containers:
        - name: ray-worker
          image: rayproject/ray:2.34.0
          resources:
            limits:
              cpu: "1"
              memory: "4Gi"
              nvidia.com/gpu: "1"
            requests:
              cpu: "1"
              memory: "4Gi"
              nvidia.com/gpu: "1"
---

apiVersion: ray.io/v1
kind: RayCluster
metadata:
  labels:
    kueue.x-k8s.io/queue-name: team-a-lq
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  name: raycluster-team-a
  namespace: team-a
spec:
  suspend: true
  headGroupSpec:
    rayStartParams:
      dashboard-host: 0.0.0.0
    template:
      metadata:
        labels:
          project: gcp-template-forge
          template: gke-kuberay-kueue-multitenant
      spec:
        serviceAccountName: team-a-sa
        containers:
        - image: rayproject/ray:2.9.0
          name: ray-head
          imagePullPolicy: IfNotPresent
          ports:
          - containerPort: 6379
            name: gcs-server
          - containerPort: 8265
            name: dashboard
          - containerPort: 10001
            name: client
          resources:
            limits:
              cpu: 2
              memory: 4Gi
            requests:
              cpu: 2
              memory: 4Gi
  rayVersion: 2.9.0
  workerGroupSpecs:
  - groupName: gpu-group
    maxReplicas: 5
    minReplicas: 0
    rayStartParams: {}
    replicas: 1
    template:
      metadata:
        labels:
          project: gcp-template-forge
          template: gke-kuberay-kueue-multitenant
      spec:
        serviceAccountName: team-a-sa
        containers:
        - image: rayproject/ray:2.9.0
          name: ray-worker
          imagePullPolicy: IfNotPresent
          resources:
            limits:
              cpu: 2
              memory: 4Gi
              nvidia.com/gpu: 1
            requests:
              cpu: 2
              memory: 4Gi
              nvidia.com/gpu: 1
        tolerations:
        - effect: NoSchedule
          key: nvidia.com/gpu
          operator: Exists
---

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ray-dashboard-restriction
  namespace: team-a
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
spec:
  podSelector:
    matchLabels:
      ray.io/node-type: head
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {} # Allow all traffic from pods in the same namespace
    # No ports specified means all ports are allowed from the same namespace.
    # This ensures Ray internal traffic (GCS, etc.) is not blocked while
    # still restricting dashboard (and other) access to the local namespace.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ray-dashboard-restriction
  namespace: team-b
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
spec:
  podSelector:
    matchLabels:
      ray.io/node-type: head
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector: {} # Allow all traffic from pods in the same namespace

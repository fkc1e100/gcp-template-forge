apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: gke-kuberay-kueue-multitenant
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025 # UPDATE: Replace with your GCP Project ID
    cnrm.cloud.google.com/remove-default-node-pool: "true"
spec:
  location: us-central1 # UPDATE: Replace with your region
  # Restrict to a single zone for the initial node count to save quota in CI
  nodeLocations:
    - us-central1-a # UPDATE: Replace with your zone
  initialNodeCount: 1
  networkRef:
    name: gke-kuberay-kueue-multitenant-vpc
  subnetworkRef:
    name: gke-kuberay-kueue-multitenant-sub
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  workloadIdentityConfig:
    workloadPool: gca-gke-2025.svc.id.goog # UPDATE: Replace 'gca-gke-2025' with your GCP Project ID
  releaseChannel:
    channel: REGULAR
  loggingConfig:
    enableComponents:
      - SYSTEM_COMPONENTS
  securityPostureConfig:
    mode: BASIC
    vulnerabilityMode: VULNERABILITY_BASIC

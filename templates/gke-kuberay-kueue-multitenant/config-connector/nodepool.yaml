apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  name: gke-kuberay-kueue-multitenant-system
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  clusterRef:
    name: ray-kueue-cluster-kcc
  location: us-central1
  nodeCount: 1
  nodeConfig:
    spot: true
    machineType: e2-standard-4
    diskSizeGb: 50
    oauthScopes:
      - "https://www.googleapis.com/auth/cloud-platform"
    labels:
      project: gcp-template-forge
      template: gke-kuberay-kueue-multitenant
      pool: system
---
apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  name: gke-kuberay-kueue-multitenant-gpu
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-kuberay-kueue-multitenant
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  clusterRef:
    name: ray-kueue-cluster-kcc
  location: us-central1
  nodeLocations:
    - us-central1-a
    - us-central1-b
    - us-central1-c
  autoscaling:
    minNodeCount: 0
    maxNodeCount: 5
  nodeConfig:
    spot: true
    machineType: g2-standard-4
    diskSizeGb: 100
    oauthScopes:
      - "https://www.googleapis.com/auth/cloud-platform"
    guestAccelerator:
      - type: nvidia-l4
        count: 1
    labels:
      project: gcp-template-forge
      template: gke-kuberay-kueue-multitenant
      pool: gpu
      "cloud.google.com/gke-accelerator": nvidia-l4
    taint:
      - key: nvidia.com/gpu
        value: present
        effect: NO_SCHEDULE

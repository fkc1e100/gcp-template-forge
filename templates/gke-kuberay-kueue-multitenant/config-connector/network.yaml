apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: gke-ray-kueue-vpc
  namespace: forge-management
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
  labels:
    project: gcp-template-forge
    template: gke-ray-kueue
spec:
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: gke-ray-kueue-subnet
  namespace: forge-management
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
  labels:
    project: gcp-template-forge
    template: gke-ray-kueue
spec:
  ipCidrRange: "10.10.0.0/20"
  region: us-central1
  networkRef:
    name: gke-ray-kueue-vpc
  privateIpGoogleAccess: true
  secondaryIpRange:
    - rangeName: pods
      ipCidrRange: "10.11.0.0/16"
    - rangeName: services
      ipCidrRange: "10.12.0.0/20"

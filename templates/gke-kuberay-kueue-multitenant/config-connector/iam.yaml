apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMServiceAccount
metadata:
  name: gke-ray-kueue-sa
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-ray-kueue
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  displayName: "GKE Ray Kueue Service Account"
---
apiVersion: iam.cnrm.cloud.google.com/v1beta1
kind: IAMPolicyMember
metadata:
  name: gke-ray-kueue-wi-binding
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-ray-kueue
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  resourceRef:
    apiVersion: iam.cnrm.cloud.google.com/v1beta1
    kind: IAMServiceAccount
    name: gke-ray-kueue-sa
  role: roles/iam.workloadIdentityUser
  # NOTE: Replace 'gca-gke-2025' with your actual project ID
  member: serviceAccount:gca-gke-2025.svc.id.goog[default/gke-ray-kueue-sa]

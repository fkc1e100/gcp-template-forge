apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRouter
metadata:
  name: gke-enterprise-kcc-router
  namespace: forge-management
  labels:
    template: gke-enterprise
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  region: us-central1
  networkRef:
    name: gke-enterprise-kcc-vpc
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRouterNAT
metadata:
  name: gke-enterprise-kcc-nat
  namespace: forge-management
  labels:
    template: gke-enterprise
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  region: us-central1
  routerRef:
    name: gke-enterprise-kcc-router
  natIpAllocateOption: AUTO_ONLY
  sourceSubnetworkIpRangesToNat: ALL_SUBNETWORKS_ALL_IP_RANGES
  logConfig:
    enable: true
    filter: ERRORS_ONLY

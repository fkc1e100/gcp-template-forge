apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  name: kcc-template-online-np
spec:
  location: us-central1
  clusterRef:
    name: kcc-template-online-cluster
  nodeCount: 1
  nodeLocations:
    - us-central1-a
    - us-central1-b
    - us-central1-c
  nodeConfig:
    machineType: e2-standard-4
    diskSizeGb: 100
    diskType: pd-standard
    oauthScopes:
      - https://www.googleapis.com/auth/cloud-platform
  autoscaling:
    minNodeCount: 1
    maxNodeCount: 3

apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: kcc-template-online-cluster
spec:
  location: us-central1
  initialNodeCount: 1
  removeDefaultNodePool: true
  workloadIdentityConfig:
    workloadPool: "gca-gke-2025.svc.id.goog"
  datapathProvider: ADVANCED_DATAPATH
  releaseChannel:
    channel: REGULAR
  networkRef:
    name: kcc-template-online-net
  subnetworkRef:
    name: kcc-template-online-subnet
  ipAllocationPolicy:
    clusterIpv4CidrBlock: /16
    servicesIpv4CidrBlock: /22

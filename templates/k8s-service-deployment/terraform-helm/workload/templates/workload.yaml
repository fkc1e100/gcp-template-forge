apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: web-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-service
    spec:
      containers:
      - name: nginx
        image: {{ .Values.image }}
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: web-service-lb
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: web-service
  ports:
  - protocol: TCP
    port: {{ .Values.service.port }}
    targetPort: 80

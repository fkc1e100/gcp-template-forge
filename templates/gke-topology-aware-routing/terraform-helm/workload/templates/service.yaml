apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: frontend
  annotations:
    # Enable Topology-Aware Hints
    service.kubernetes.io/topology-mode: Auto
    # Explicitly enable NEGs for Gateway API
    cloud.google.com/neg: '{"exposed_ports": {"80":{}}}'
spec:
  type: {{ .Values.frontend.service.type }}
  ports:
    - port: {{ .Values.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: frontend
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
  annotations:
    # Enable Topology-Aware Hints
    service.kubernetes.io/topology-mode: Auto
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: backend

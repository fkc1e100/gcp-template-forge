apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: gke-topology-aware-routing-kcc
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-topology-aware-routing
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
    cnrm.cloud.google.com/remove-default-node-pool: "true"
spec:
  location: us-central1
  initialNodeCount: 1
  networkingMode: VPC_NATIVE
  networkRef:
    name: gke-topology-aware-routing-kcc-vpc
  subnetworkRef:
    name: gke-topology-aware-routing-kcc-subnet
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  privateClusterConfig:
    enablePrivateNodes: true
    enablePrivateEndpoint: false
    masterIpv4CidrBlock: 172.16.0.0/28
  workloadIdentityConfig:
    workloadPool: "gca-gke-2025.svc.id.goog"
  # Requirement: Configure the cluster with the Gateway API
  gatewayApiConfig:
    channel: CHANNEL_STANDARD
  securityPostureConfig:
    mode: BASIC
    vulnerabilityMode: VULNERABILITY_ENTERPRISE
  releaseChannel:
    channel: RAPID
  loggingConfig:
    enableComponents:
      - SYSTEM_COMPONENTS
      - WORKLOADS
  monitoringConfig:
    enableComponents:
      - SYSTEM_COMPONENTS
    managedPrometheus:
      enabled: true

apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  name: gke-topology-aware-routing-pool
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-topology-aware-routing
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  clusterRef:
    name: gke-topology-aware-routing-kcc
  location: us-central1
  nodeLocations:
    - us-central1-a
    - us-central1-b
    - us-central1-c
  nodeCount: 1
  nodeConfig:
    machineType: e2-standard-4
    diskSizeGb: 50
    diskType: pd-standard
    imageType: COS_CONTAINERD
    spot: true
    serviceAccountRef:
      external: forge-kcc-admin@gca-gke-2025.iam.gserviceaccount.com
    oauthScopes:
      - https://www.googleapis.com/auth/cloud-platform
    shieldedInstanceConfig:
      enableSecureBoot: true
      enableIntegrityMonitoring: true
    workloadMetadataConfig:
      mode: GKE_METADATA
    labels:
      project: gcp-template-forge
      template: gke-topology-aware-routing

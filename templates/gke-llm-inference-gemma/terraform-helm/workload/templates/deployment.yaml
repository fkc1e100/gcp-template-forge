apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "gke-llm-inference-gemma.fullname" . }}
  labels:
    {{- include "gke-llm-inference-gemma.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "gke-llm-inference-gemma.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        gke-gcsfuse/volumes: "true"
      labels:
        {{- include "gke-llm-inference-gemma.selectorLabels" . | nindent 8 }}
        kueue.x-k8s.io/queue-name: local-queue
    spec:
      serviceAccountName: {{ include "gke-llm-inference-gemma.serviceAccountName" . }}

      # Init container: downloads model weights from HuggingFace into GCS on
      # first run. Subsequent starts skip the download (weights already present).
      # The main vLLM container reads weights from the GCS FUSE mount — no HF
      # dependency at inference runtime.
      initContainers:
        - name: download-weights
          image: google/cloud-sdk:slim
          command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              BUCKET="{{ .Values.bucketName }}"
              MODEL="{{ .Values.model.name }}"
              DEST="gs://${BUCKET}/weights/"

              echo "Checking for existing weights at ${DEST}..."
              COUNT=$(gsutil ls "${DEST}" 2>/dev/null | wc -l || echo "0")
              if [ "${COUNT}" -gt "0" ]; then
                echo "Weights already present (${COUNT} objects) — skipping download."
                exit 0
              fi

              echo "Weights not found. Fetching HF token from Secret Manager..."
              HF_TOKEN=$(gcloud secrets versions access latest \
                --secret=huggingface-token \
                --project={{ .Values.projectId }})

              echo "Installing huggingface_hub..."
              pip install --quiet huggingface_hub

              echo "Downloading ${MODEL} to /tmp/weights ..."
              python3 -c "
              from huggingface_hub import snapshot_download
              import os, sys
              snapshot_download(
                  repo_id='${MODEL}',
                  local_dir='/tmp/weights',
                  token='${HF_TOKEN}',
                  ignore_patterns=['*.msgpack','flax_model*','tf_model*','rust_model*'],
              )
              "

              echo "Uploading to ${DEST}..."
              gsutil -m cp -r /tmp/weights/* "${DEST}"
              echo "Done — weights at ${DEST}"
          env:
            - name: CLOUDSDK_CORE_DISABLE_PROMPTS
              value: "1"

      containers:
        - name: vllm
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["python3", "-m", "vllm.entrypoints.openai.api_server"]
          args:
            - "--model"
            - {{ .Values.model.path | quote }}      # GCS FUSE mount — no HF download at runtime
            - "--served-model-name"
            - {{ .Values.model.name | quote }}      # logical name used in API requests
            - "--load-format"
            - "safetensors"
            - "--gpu-memory-utilization"
            - {{ .Values.vllm.gpuMemoryUtilization | quote }}
            - "--max-model-len"
            - {{ .Values.vllm.maxModelLen | quote }}
            - "--tensor-parallel-size"
            - {{ .Values.vllm.tensorParallelSize | quote }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - mountPath: /data
              name: gcs-fuse-csi-ephemeral
              readOnly: true

      volumes:
        - name: gcs-fuse-csi-ephemeral
          csi:
            driver: gcsfuse.csi.storage.gke.io
            volumeAttributes:
              bucketName: {{ .Values.bucketName | quote }}
              mountOptions: "implicit-dirs"

      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}

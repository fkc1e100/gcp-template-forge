---
apiVersion: networking.gke.io/v1
kind: FQDNNetworkPolicy
metadata:
  name: allow-ai-egress
spec:
  podSelector:
    matchLabels:
      app: {{ .Values.pod.label }}
  egress:
  - matches:
    - name: anthropic.com
    - name: api.anthropic.com
    - pattern: "*.anthropic.com"
    - name: huggingface.co
    - pattern: "*.huggingface.co"
    - name: hf.co
    - pattern: "*.hf.co"
    ports:
    - protocol: TCP
      port: 443

apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  name: fqdn-egress-vpc
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-fqdn-egress-security
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  routingMode: REGIONAL
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  name: fqdn-egress-subnet
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-fqdn-egress-security
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  region: us-central1
  networkRef:
    name: fqdn-egress-vpc
  ipCidrRange: 10.0.0.0/20
  secondaryIpRange:
    - rangeName: pods
      ipCidrRange: 10.4.0.0/14
    - rangeName: services
      ipCidrRange: 10.8.0.0/20
  privateIpGoogleAccess: true
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRouter
metadata:
  name: fqdn-egress-router
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-fqdn-egress-security
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  region: us-central1
  networkRef:
    name: fqdn-egress-vpc
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeRouterNAT
metadata:
  name: fqdn-egress-nat
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-fqdn-egress-security
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
spec:
  region: us-central1
  routerRef:
    name: fqdn-egress-router
  natIpAllocateOption: AUTO_ONLY
  sourceSubnetworkIpRangesToNat: ALL_SUBNETWORKS_ALL_IP_RANGES
  logConfig:
    enable: true
    filter: ERRORS_ONLY

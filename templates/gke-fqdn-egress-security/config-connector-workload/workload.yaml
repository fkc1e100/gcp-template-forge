apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  namespace: default
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution for all pods to enable FQDN resolution
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
---
apiVersion: networking.gke.io/v1
kind: FQDNNetworkPolicy
metadata:
  name: allow-ai-egress
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: egress-test
  egress:
  - matches:
    - name: anthropic.com
    - name: api.anthropic.com
    - name: "*.anthropic.com"
    - name: huggingface.co
    - name: "*.huggingface.co"
    - name: hf.co
    - name: "*.hf.co"
    ports:
    - protocol: TCP
      port: 443
---
apiVersion: v1
kind: Pod
metadata:
  name: egress-verifier
  namespace: default
  labels:
    app: egress-test
spec:
  containers:
  - name: verifier
    image: curlimages/curl:8.4.0
    command: ["/bin/sh", "-c", "sleep 3600"]
  restartPolicy: Never

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-egress
  labels:
    project: gcp-template-forge
    template: gke-fqdn-egress-security
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  # Allow DNS resolution for all pods to enable FQDN resolution
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # NOTE: This strict policy will block traffic to the Kubernetes API server 
  # by default. For this validation pod, it is acceptable, but real workloads 
  # may need an explicit allow rule for the API server IP/port if they 
  # need to communicate with the cluster control plane.

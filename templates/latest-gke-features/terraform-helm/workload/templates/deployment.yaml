apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "latest-features.fullname" . }}
  labels:
    {{- include "latest-features.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "latest-features.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "latest-features.labels" . | nindent 8 }}
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      # LATEST FEATURE: Native Sidecar Containers (requires K8s 1.29+)
      initContainers:
      - name: logger-sidecar
        image: {{ .Values.sidecar.image }}:{{ .Values.sidecar.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        restartPolicy: Always
        command: ["sh", "-c", "while true; do echo \"$(date) - heartbeat from native sidecar\" >> /var/log/app.log; if [ $(stat -c%s /var/log/app.log) -gt 1048576 ]; then tail -n 100 /var/log/app.log > /var/log/app.log.tmp && mv /var/log/app.log.tmp /var/log/app.log; fi; sleep 30; done"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
        resources:
          {{- toYaml .Values.sidecarResources | nindent 10 }}
        volumeMounts:
        - name: logs
          mountPath: /var/log
      
      containers:
      - name: web-app
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          privileged: false
        ports:
        - name: http
          containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - name: logs
          mountPath: /var/log
      
      volumes:
      - name: logs
        emptyDir:
          sizeLimit: 500Mi

      # LATEST FEATURE: Pod Topology Spread Constraints
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            {{- include "latest-features.selectorLabels" . | nindent 12 }}
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            {{- include "latest-features.selectorLabels" . | nindent 12 }}

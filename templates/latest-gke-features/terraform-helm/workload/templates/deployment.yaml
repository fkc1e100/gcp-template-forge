apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "latest-features.fullname" . }}
  labels:
    app: {{ include "latest-features.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "latest-features.name" . }}
  template:
    metadata:
      labels:
        app: {{ include "latest-features.name" . }}
    spec:
      # LATEST FEATURE: Native Sidecar Containers (requires K8s 1.29+)
      # These are initContainers with restartPolicy: Always
      initContainers:
      - name: logger-sidecar
        image: {{ .Values.sidecar.image }}:{{ .Values.sidecar.tag }}
        restartPolicy: Always
        command: ["sh", "-c", "while true; do echo \"$(date) - heartbeat from native sidecar\" >> /var/log/app.log; sleep 30; done"]
        volumeMounts:
        - name: logs
          mountPath: /var/log
      
      containers:
      - name: web-app
        image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
        ports:
        - containerPort: 80
        volumeMounts:
        - name: logs
          mountPath: /var/log
      
      volumes:
      - name: logs
        emptyDir: {}

      # LATEST FEATURE: Pod Topology Spread Constraints
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: {{ include "latest-features.name" . }}
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: {{ include "latest-features.name" . }}

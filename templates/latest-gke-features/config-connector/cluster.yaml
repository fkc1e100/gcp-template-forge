apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: latest-gke-features-kcc
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: latest-gke-features
  annotations:
    cnrm.cloud.google.com/project-id: gca-gke-2025
    cnrm.cloud.google.com/remove-default-node-pool: "true"
spec:
  location: us-central1
  initialNodeCount: 1
  networkingMode: VPC_NATIVE
  networkRef:
    name: latest-gke-features-vpc
  subnetworkRef:
    name: latest-gke-features-subnet
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  privateClusterConfig:
    enablePrivateNodes: true
    enablePrivateEndpoint: false
    masterIpv4CidrBlock: "172.16.2.16/28"
  workloadIdentityConfig:
    workloadPool: "gca-gke-2025.svc.id.goog"
  minMasterVersion: "1.35.3-gke.1234000"
  releaseChannel:
    channel: RAPID
  securityPostureConfig:
    mode: BASIC
    vulnerabilityMode: VULNERABILITY_ENTERPRISE
  gatewayApiConfig:
    channel: CHANNEL_STANDARD
  clusterAutoscaling:
    enabled: true
    resourceLimits:
      - resourceType: cpu
        minimum: 1
        maximum: 100
      - resourceType: memory
        minimum: 1
        maximum: 512
    autoProvisioningDefaults:
      serviceAccountRef:
        external: forge-kcc-admin@gca-gke-2025.iam.gserviceaccount.com
      oauthScopes:
        - https://www.googleapis.com/auth/cloud-platform
      management:
        autoRepair: true
        autoUpgrade: true
      shieldedInstanceConfig:
        enableSecureBoot: true
        enableIntegrityMonitoring: true

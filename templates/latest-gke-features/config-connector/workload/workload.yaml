apiVersion: apps/v1
kind: Deployment
metadata:
  name: latest-features-workload
  namespace: default
  labels:
    app: latest-features
spec:
  progressDeadlineSeconds: 3600
  replicas: 2
  selector:
    matchLabels:
      app: latest-features
  template:
    metadata:
      labels:
        app: latest-features
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      
      # LATEST FEATURE: Native Sidecar Containers (requires K8s 1.29+)
      initContainers:
      - name: logger-sidecar
        image: busybox:1.36.1
        restartPolicy: Always
        command: ["sh", "-c", "mkdir -p /var/log/nginx && while true; do echo \"$(date) - heartbeat from native sidecar\" >> /var/log/app.log; sleep 30; done"]
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            cpu: 100m
            memory: 64Mi
          requests:
            cpu: 50m
            memory: 32Mi
        volumeMounts:
        - name: logs
          mountPath: /var/log
      
      containers:
      - name: web-app
        image: nginxinc/nginx-unprivileged:1.25
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - name: http
          containerPort: 8080
        resources:
          limits:
            cpu: 200m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: logs
          mountPath: /var/log
      
      volumes:
      - name: logs
        emptyDir:
          sizeLimit: 500Mi

      # LATEST FEATURE: Pod Topology Spread Constraints
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: latest-features
      - maxSkew: 1
        topologyKey: topology.kubernetes.io/zone
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app: latest-features
---
apiVersion: v1
kind: Service
metadata:
  name: latest-features-service
  namespace: default
  annotations:
    cloud.google.com/neg: '{"exposed_ports": {"80":{}}}'
spec:
  selector:
    app: latest-features
  ports:
  - port: 80
    targetPort: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: latest-features-gateway
  namespace: default
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: latest-features-route
  namespace: default
spec:
  parentRefs:
    - name: latest-features-gateway
  rules:
    - backendRefs:
        - name: latest-features-service
          port: 80

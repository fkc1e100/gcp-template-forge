apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerCluster
metadata:
  name: gke-llm-inference-kcc
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-llm-inference
    cnrm.cloud.google.com/remove-default-node-pool: 'true'
spec:
  location: us-central1
  initialNodeCount: 1
  networkRef:
    name: gke-llm-inference-kcc-vpc
  subnetworkRef:
    name: gke-llm-inference-kcc-subnet
  networkingMode: VPC_NATIVE
  releaseChannel:
    channel: RAPID
  ipAllocationPolicy:
    clusterSecondaryRangeName: pods
    servicesSecondaryRangeName: services
  workloadIdentityConfig:
    workloadPool: gca-gke-2025.svc.id.goog
  addonsConfig:
    gcsFuseCsiDriverConfig:
      enabled: true
  securityPostureConfig:
    mode: BASIC
    vulnerabilityMode: VULNERABILITY_BASIC
---
apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  name: gke-llm-inference-kcc-cpu-pool
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-llm-inference
spec:
  clusterRef:
    name: gke-llm-inference-kcc
  location: us-central1
  nodeCount: 1
  nodeConfig:
    machineType: e2-standard-4
    spot: true
    serviceAccountRef:
      name: gke-llm-inference-kcc-sa
    oauthScopes:
    - https://www.googleapis.com/auth/cloud-platform
---
apiVersion: container.cnrm.cloud.google.com/v1beta1
kind: ContainerNodePool
metadata:
  name: gke-llm-inference-kcc-gpu-pool
  namespace: forge-management
  labels:
    project: gcp-template-forge
    template: gke-llm-inference
spec:
  clusterRef:
    name: gke-llm-inference-kcc
  location: us-central1
  nodeLocations:
  - us-central1-c
  autoscaling:
    minNodeCount: 0
    maxNodeCount: 1
  nodeConfig:
    machineType: g2-standard-12
    spot: false
    reservationAffinity:
      consumeReservationType: NO_RESERVATION
    serviceAccountRef:
      name: gke-llm-inference-kcc-sa
    guestAccelerator:
    - type: nvidia-l4
      count: 1
    oauthScopes:
    - https://www.googleapis.com/auth/cloud-platform
    workloadMetadataConfig:
      mode: GKE_METADATA

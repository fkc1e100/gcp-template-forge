apiVersion: v1
kind: ServiceAccount
metadata:
  name: vllm-sa
  namespace: default
  annotations:
    iam.gke.io/gcp-service-account: gke-llm-inference-kcc-sa@gca-gke-2025.iam.gserviceaccount.com
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-deployment
  namespace: default
  labels:
    app: vllm-inference-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: vllm-inference-server
  template:
    metadata:
      labels:
        app: vllm-inference-server
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: vllm-sa
      initContainers:
      - name: model-loader
        image: vllm/vllm-openai:v0.7.2
        command:
        - bash
        - -c
        - |
          set -e
          python3 -c "
          import os
          from huggingface_hub import snapshot_download
          model_path = '/data/Qwen/Qwen2.5-1.5B-Instruct'
          if not os.path.exists(model_path) or not os.listdir(model_path):
              print(f'Model missing at {model_path}, downloading...')
              snapshot_download('Qwen/Qwen2.5-1.5B-Instruct', local_dir=model_path)
          else:
              print(f'Model already present at {model_path}')
          "
        volumeMounts:
        - mountPath: /data
          name: gcs-fuse-csi-ephemeral
      containers:
      - name: inference-server
        image: vllm/vllm-openai:v0.7.2
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        args:
        - --model=/data/Qwen/Qwen2.5-1.5B-Instruct
        - --tensor-parallel-size=1
        - --max-num-seq=1024
        ports:
        - containerPort: 8000
          name: http
        resources:
          limits:
            nvidia.com/gpu: 1
          requests:
            nvidia.com/gpu: 1
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /data
          name: gcs-fuse-csi-ephemeral
          readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 120
      nodeSelector:
        cloud.google.com/gke-accelerator: nvidia-l4
      tolerations:
      - key: "nvidia.com/gpu"
        operator: "Exists"
        effect: "NoSchedule"
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: gca-gke-2025-gke-llm-inference-kcc-weights
            mountOptions: "implicit-dirs"
---
apiVersion: v1
kind: Service
metadata:
  name: release-service
  namespace: default
  labels:
    app: vllm-inference-server
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: vllm-inference-server

apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-deployment
  labels:
    app: vllm-inference-server
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
  progressDeadlineSeconds: 5400
  selector:
    matchLabels:
      app: vllm-inference-server
  template:
    metadata:
      labels:
        app: vllm-inference-server
      annotations:
        gke-gcsfuse/volumes: "true"
        force-rollout: {{ now | unixEpoch | quote }}
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      initContainers:
      - name: model-loader
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command:
        - bash
        - -c
        - |
          set -e
          python3 -c "
          import os
          from huggingface_hub import snapshot_download
          model_path = '/data/{{ .Values.model.id }}'
          if not os.path.exists(model_path) or not os.listdir(model_path):
              print(f'Model missing at {model_path}, downloading...')
              snapshot_download('{{ .Values.model.id }}', local_dir=model_path)
          else:
              print(f'Model already present at {model_path}')
          "
        volumeMounts:
        - mountPath: /data
          name: gcs-fuse-csi-ephemeral
      containers:
      - name: inference-server
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        command:
        - python3
        - -m
        - vllm.entrypoints.openai.api_server
        args:
        - --model=/data/{{ .Values.model.id }}
        - --tensor-parallel-size=1
        - --max-num-seq=1024
        ports:
        - containerPort: {{ .Values.service.port }}
          name: http
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
        volumeMounts:
        - mountPath: /dev/shm
          name: dshm
        - mountPath: /data
          name: gcs-fuse-csi-ephemeral
          readOnly: true
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 120
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: {{ .Values.model.bucketName }}
            mountOptions: "implicit-dirs"

apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-model-staging
  labels:
    app: vllm-model-staging
spec:
  template:
    metadata:
      labels:
        app: vllm-model-staging
      annotations:
        gke-gcsfuse/volumes: "true"
    spec:
      serviceAccountName: {{ .Release.Name }}-sa
      containers:
      - name: stager
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        command:
        - /bin/bash
        - -c
        - |
          set -e
          echo "Starting model staging for {{ .Values.model.id }}..."
          # Use huggingface-cli for more robust download on GCS FUSE
          # Disable symlinks as they don't work well on GCS FUSE without specific flags
          export HUGGINGFACE_HUB_CACHE=/tmp/hf-cache
          mkdir -p /tmp/hf-cache
          huggingface-cli download {{ .Values.model.id }}             --local-dir /data/{{ .Values.model.id }}             --local-dir-use-symlinks False
          echo "Staging complete."
        volumeMounts:
        - mountPath: /data
          name: gcs-fuse-csi-ephemeral
      volumes:
      - name: gcs-fuse-csi-ephemeral
        csi:
          driver: gcsfuse.csi.storage.gke.io
          volumeAttributes:
            bucketName: {{ .Values.model.bucketName }}
            mountOptions: "implicit-dirs"
      restartPolicy: OnFailure
  backoffLimit: 3

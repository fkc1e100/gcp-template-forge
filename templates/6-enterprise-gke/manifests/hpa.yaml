apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  labels:
    template: templates/6-enterprise-gke
  name: workload-6-hpa
  namespace: workload-6
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: workload-6
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80

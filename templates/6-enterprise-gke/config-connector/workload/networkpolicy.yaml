apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enterprise-workload-netpol
  namespace: enterprise-workload
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: enterprise-workload
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector: {}
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0

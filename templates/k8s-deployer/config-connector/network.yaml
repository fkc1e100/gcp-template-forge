apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeNetwork
metadata:
  labels:
    project: gcp-template-forge
    template: k8s-deployer
  name: k8s-deployer-kcc-vpc
spec:
  autoCreateSubnetworks: false
---
apiVersion: compute.cnrm.cloud.google.com/v1beta1
kind: ComputeSubnetwork
metadata:
  labels:
    project: gcp-template-forge
    template: k8s-deployer
  name: k8s-deployer-kcc-subnet
spec:
  ipCidrRange: 10.0.0.0/20
  region: us-central1
  networkRef:
    name: k8s-deployer-kcc-vpc
  secondaryIpRange:
    - rangeName: pods
      ipCidrRange: 10.4.0.0/14
    - rangeName: services
      ipCidrRange: 10.8.0.0/20
